      el("span",{style:{textAlign:"center"}},"Carga inicial"),
      el("span",{style:{textAlign:"center"}},ser+"×"+rep),
      el("span",{style:{textAlign:"center"}},"Perfil")
    ),
    ...athletes.map(a=>el("div",{key:a.id,style:{display:"grid",gridTemplateColumns:cols,padding:"8px 14px",borderTop:"1px solid "+T.border,alignItems:"center"}},
      el(Avatar,{name:a.name,photo:a.photo,size:28}),
      el("div",null,
        el("div",{style:{fontSize:13,fontWeight:700,color:T.text}},a.nickname||a.name.split(" ")[0]),
        el("div",{style:{fontSize:10,color:T.muted,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},a.name)
      ),
      el("div",{style:{textAlign:"center",fontSize:11,fontWeight:700,color:T.sub}},a.position||"—"),
      el("div",{style:{textAlign:"center"}},
        a.rx&&a.rx.load
          ? el("span",{style:{background:zone.color+"18",color:zone.color,border:"1.5px solid "+zone.color+"44",borderRadius:7,padding:"4px 12px",fontWeight:900,fontSize:16,display:"inline-block"}},a.rx.load+" kg")
          : el("span",{style:{color:T.muted}},"—")
      ),
      el("div",{style:{textAlign:"center",fontSize:12,color:T.sub,fontWeight:600}},ser+"×"+rep),
      el("div",{style:{textAlign:"center"}},
        a.rx&&a.rx.method==="reg" ? el(Badge,{color:"#2563EB",xs:true},"R²="+a.rx.r2)
        : a.rx&&a.rx.method==="reg_low" ? el(Badge,{color:"#D69E2E",xs:true},"R²="+a.rx.r2)
        : a.rx&&a.rx.method==="gen" ? el(Badge,{color:"#DD6B20",xs:true},"eq. geral")
        : a.rx&&a.rx.method==="max" ? el(Badge,{color:"#DD6B20",xs:true},"máx. obs.")
        : a.rx&&a.rx.method==="pc" ? el(Badge,{color:"#8B5CF6",xs:true},"%PC")
        : el(Badge,{color:T.muted,xs:true},"sem perfil")
      )
    ))
  );
}

// ── REPORT MODAL ─────────────────────────────────────────────────────────────
function ReportModal({grouped,zone,vel,ser,rep,bars,date,snapshots,savePresencaSessao,loadPresencaSessao,onClose}) {
  const el=React.createElement;
  const tRef=useRef();
  const [saving,setSaving]=useState(false);
  const [copied,setCopied]=useState(false);
  // Presença: {athleteId: 'presente'|'ausente'}
  const [presencaMap, setPresencaMap] = useState({});
  const [showPresenca, setShowPresenca] = useState(false);
  const [savingPresenca, setSavingPresenca] = useState(false);

  const RED="#C8102E", BLACK="#111111", WHITE="#FFFFFF", LGRAY="#F4F4F4", MGRAY="#E0E0E0", DGRAY="#444444";

  const dateObj=new Date((date||localDateStr(new Date()))+"T12:00:00");
  const dateStr=dateObj.toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit",year:"numeric"});

  const barW=ex=>ex==="Trap Bar Deadlift"?(bars.trapbar_kg||bars.trapbar||30):(bars.olympic_kg||bars.olympic||20);
  const fmtLoad=(load,ex)=>{
    if(!load) return null;
    const b=barW(ex),total=roundToPlates(load,b),lado=(total-b)/2;
    return {total,lado};
  };
  // Usar velocidade real selecionada, não o meio da zona
  const targetVel = vel;
  const groupKeys=Object.keys(grouped).filter(k=>grouped[k]&&grouped[k].length>0);

  const rows=[];
  groupKeys.forEach((grp,gi)=>{
    grouped[grp].forEach((a,ai)=>{
      const prof=resolveProfile(a.name,window._vbtProfiles||{});
      const rxSq=prescribe(prof&&prof["Back Squat"],targetVel,"Back Squat",bars,a.body_weight,a.position);
      const rxTb=prescribe(prof&&prof["Trap Bar Deadlift"],targetVel,"Trap Bar Deadlift",bars,a.body_weight,a.position);
      const rxHt=prescribe(prof&&prof["Hip Thrust"],targetVel,"Hip Thrust",bars,a.body_weight,a.position);
      rows.push({
        a,gi,color:GRP_COLORS[gi%GRP_COLORS.length],grpNum:gi+1,
        sq:fmtLoad(rxSq&&rxSq.load,"Back Squat"),
        tb:fmtLoad(rxTb&&rxTb.load,"Trap Bar Deadlift"),
        ht:fmtLoad(rxHt&&rxHt.load,"Hip Thrust"),
      });
    });
  });

  // Always 2 columns
  const half = Math.ceil(rows.length / 2);
  const columns = [rows.slice(0, half), rows.slice(half)];

  // Todos os atletas na sessão
  const allAthletes = useMemo(() => rows.map(r => r.a), [rows]);

  // Popula presença ao abrir o modal ou trocar data: carrega do banco;
  // se não tem, marca automaticamente quem tem snapshot VBT no dia.
  // Deps: SÓ date. Snapshots e allAthletes são lidos dentro; se não incluíssemos
  // apenas date, o useEffect rodaria a cada render e sobrescreveria os toggles.
  React.useEffect(() => {
    let cancelled = false;
    (async () => {
      const currentAthletes = rows.map(r => r.a);
      if (!loadPresencaSessao) {
        const m = {};
        currentAthletes.forEach(a => { m[a.id] = 'presente'; });
        if (!cancelled) setPresencaMap(m);
        return;
      }
      const saved = await loadPresencaSessao(date);
      const savedMap = {};
      (saved || []).forEach(r => { savedMap[r.atleta_id] = r.status; });
      const athleteIdsComSnapshot = new Set(
        (snapshots || []).filter(s => s.session_date === date).map(s => s.athlete_id)
      );
      const m = {};
      currentAthletes.forEach(a => {
        if (savedMap[a.id]) m[a.id] = savedMap[a.id];
        else m[a.id] = athleteIdsComSnapshot.has(a.id) ? 'presente' : 'ausente';
      });
      if (!cancelled) setPresencaMap(m);
    })();
    return () => { cancelled = true; };
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [date]);

  const togglePresenca = (id) => {
    setPresencaMap(m => ({...m, [id]: m[id] === 'presente' ? 'ausente' : 'presente'}));
  };

  const presentesCount = Object.values(presencaMap).filter(v => v === 'presente').length;
  const ausentesCount = Object.values(presencaMap).filter(v => v === 'ausente').length;

  const [presencaSaved, setPresencaSaved] = useState(false);
  const salvarPresenca = async () => {
    if (!savePresencaSessao) return;
    setSavingPresenca(true);
    try {
      const res = await savePresencaSessao(date, presencaMap, 'manual');
      if (res.erro) alert("Erro ao salvar presença: " + res.erro);
      else {
        setPresencaSaved(true);
        setTimeout(() => setPresencaSaved(false), 2000);
      }
    } catch(e) { alert("Erro: " + e.message); }
    setSavingPresenca(false);
  };

  // Font sizes auto-adjust based on number of rows per column
  const maxRows = half;
  const sz = {
    name:   maxRows<=6?24 : maxRows<=10?20 : maxRows<=14?16 : 14,
    value:  maxRows<=6?22 : maxRows<=10?18 : maxRows<=14?16 : 15,
    paren:  maxRows<=6?18 : maxRows<=10?15 : maxRows<=14?13 : 12,
    header: maxRows<=6?16 : maxRows<=10?15 : 13,
    pad:    maxRows<=6?"14px 12px" : maxRows<=10?"11px 12px" : "8px 10px",
  };

  const savePNG=async ()=>{
    const node=tRef.current; if(!node) return;
    if(!window.html2canvas){alert("html2canvas não carregou.");return;}
    setSaving(true);

    // Salva presença no banco antes de gerar PNG (não bloqueia se falhar)
    if (savePresencaSessao && Object.keys(presencaMap).length > 0) {
      try { await savePresencaSessao(date, presencaMap, 'manual'); }
      catch(e) { console.warn("Falha ao salvar presença antes do PNG:", e); }
    }

    // Alvo: 14.04cm × 15.12cm @ 300 DPI
    const DPI=300;
    const W=Math.round(14.04/2.54*DPI); // 1658
    const H=Math.round(15.12/2.54*DPI); // 1786

    // Renderizar numa div oculta com proporção exata
    const RENDER_W=900;
    const RENDER_H=Math.round(RENDER_W*(15.12/14.04)); // ~969
    const scale=W/RENDER_W; // ~1.84

    // Clonar o nó e fixar dimensões
    const clone=node.cloneNode(true);
    clone.style.position="absolute";
    clone.style.left="-9999px";
    clone.style.top="0";
    clone.style.width=RENDER_W+"px";
    clone.style.height=RENDER_H+"px";
    clone.style.display="flex";
    clone.style.flexDirection="column";
    clone.style.overflow="hidden";
    clone.style.borderRadius="0";

    // Forçar layout flex no clone para preencher espaço vertical
    document.body.appendChild(clone);

    // Estrutura do tRef:
    // children[0] = info strip (vermelho)
    // children[1] = columns container (flex row)
    //   └─ wrapper div (flex:1)
    //       └─ MiniTable div (header + rows)
    //       └─ separator (maybe)
    // children[2] = footer (preto)
    const chs=clone.children;
    if(chs.length>=3){
      chs[0].style.flexShrink="0"; // info strip fixo
      chs[chs.length-1].style.flexShrink="0"; // footer fixo

      // Columns container
      const colContainer=chs[1];
      colContainer.style.flex="1";
      colContainer.style.display="flex";
      colContainer.style.alignItems="stretch";

      // Cada wrapper de coluna
      for(let j=0;j<colContainer.children.length;j++){
        const wrapper=colContainer.children[j];
        if(wrapper.offsetWidth<5) continue; // separator
        wrapper.style.display="flex";
        wrapper.style.flexDirection="column";
        wrapper.style.flex="1";

        // Primeiro filho = MiniTable div
        const mt=wrapper.children[0];
        if(!mt) continue;
        mt.style.display="flex";
        mt.style.flexDirection="column";
        mt.style.flex="1";

        // Dentro do MiniTable: filho[0]=header, filho[1..n]=rows
        for(let k=0;k<mt.children.length;k++){
          if(k===0){ mt.children[k].style.flexShrink="0"; }
          else { mt.children[k].style.flex="1"; mt.children[k].style.alignContent="center"; }
        }
      }
    }

    // Aguardar reflow
    requestAnimationFrame(()=>{
      window.html2canvas(clone,{
        scale:scale,
        backgroundColor:WHITE,
        useCORS:true,
        logging:false,
        width:RENDER_W,
        height:RENDER_H
      }).then(canvas=>{
        document.body.removeChild(clone);
        const out=document.createElement("canvas");
        out.width=W; out.height=H;
        const ctx=out.getContext("2d");
        ctx.imageSmoothingEnabled=true;
        ctx.imageSmoothingQuality="high";
        ctx.fillStyle=WHITE;
        ctx.fillRect(0,0,W,H);
        ctx.drawImage(canvas,0,0,W,H);
        const a=document.createElement("a");
        a.download="vbt_sessao_"+dateStr.replace(/\//g,"-")+".png";
        a.href=out.toDataURL("image/png",1.0);
        a.click();
        setSaving(false);
      }).catch(e=>{
        document.body.removeChild(clone);
        console.error(e);
        setSaving(false);
      });
    });
  };

  const copy=()=>{
    const node=tRef.current; if(!node) return;
    const r=document.createRange(); r.selectNode(node);
    window.getSelection().removeAllRanges(); window.getSelection().addRange(r);
    document.execCommand("copy");
    window.getSelection().removeAllRanges();
    setCopied(true); setTimeout(()=>setCopied(false),2500);
  };

  // Reusable mini-table column
  const MiniTable=({colRows})=>el("div",{style:{flex:1,minWidth:0}},
    // Column header
    el("div",{style:{display:"grid",gridTemplateColumns:"120px 1fr 1fr 1fr",
      background:"#2A2A2A",borderBottom:"2px solid "+RED}},
      ...["ATLETA","BACK SQUAT","TRAP BAR DL","HIP THRUST"].map((h,i)=>
        el("div",{key:h,style:{
          padding:sz.pad,fontSize:sz.header,fontWeight:800,letterSpacing:".06em",
          color:i===0?"#DDD":WHITE,textAlign:i===0?"left":"center",
          borderRight:i<3?"1px solid #444":"none",textTransform:"uppercase"
        }},h)
      )
    ),
    // Rows
    ...colRows.map((r,ri)=>{
      const absent = presencaMap[r.a.id] === 'ausente';
      return el("div",{key:ri,style:{
        display:"grid",gridTemplateColumns:"120px 1fr 1fr 1fr",
        background: absent ? "#E5E7EB" : (ri%2===0?WHITE:LGRAY),
        borderBottom:"1px solid "+MGRAY,
        borderLeft:"3px solid "+(absent ? "#9CA3AF" : r.color),
        opacity: absent ? 0.55 : 1
      }},
        el("div",{style:{padding:sz.pad,display:"flex",alignItems:"center",borderRight:"1px solid "+MGRAY}},
          el("span",{style:{fontWeight:700,
            fontSize:(()=>{const n=r.a.nickname||r.a.name.split(" ")[0]; return n.length>10?sz.name-2:sz.name;})(),
            color: absent ? "#6B7280" : BLACK,
            textDecoration: absent ? "line-through" : "none",
            whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}},
            r.a.nickname||r.a.name.split(" ")[0])
        ),
        ...[r.sq,r.tb,r.ht].map((v,vi)=>
          el("div",{key:vi,style:{
            padding:sz.pad,display:"flex",alignItems:"center",justifyContent:"center",
            borderLeft:"1px solid "+MGRAY,flexDirection:"column",gap:0
          }},
            v
              ? el("div",{style:{display:"flex",alignItems:"baseline",gap:3,justifyContent:"center"}},
                  el("span",{style:{fontWeight:900,fontSize:sz.value,color: absent ? "#9CA3AF" : BLACK,letterSpacing:"-.01em"}},v.total),
                  el("span",{style:{fontSize:sz.paren,color:absent ? "#9CA3AF" : DGRAY}},"("+v.lado+")")
                )
              : el("span",{style:{color:MGRAY,fontSize:sz.value}},"—")
          )
        )
      );
    })
  );

  return el("div",{style:{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:300,
    display:"flex",alignItems:"center",justifyContent:"center",padding:16,backdropFilter:"blur(4px)"}},
    el("div",{style:{background:"#1A1A1A",borderRadius:12,width:"100%",maxWidth:1100,
      maxHeight:"95vh",display:"flex",flexDirection:"column",
      boxShadow:"0 40px 100px rgba(0,0,0,0.6)",border:"1px solid #333"}},

      // Header
      el("div",{style:{display:"flex",alignItems:"center",padding:"12px 18px",
        borderBottom:"2px solid "+RED,background:"#111",flexShrink:0,gap:10}},
        el("div",{style:{flex:1}},
          el("div",{style:{fontWeight:900,fontSize:14,color:WHITE}},"📋 Relatório · "+dateStr),
          el("div",{style:{fontSize:11,color:"#888",marginTop:1}},
            zone.min.toFixed(2)+"–"+zone.max.toFixed(2)+" m/s · "+zone.label+" · "+ser+"×"+rep+" · "+rows.length+" atletas")
        ),
        el("button",{onClick:()=>setShowPresenca(!showPresenca),style:{padding:"7px 12px",borderRadius:8,
          border:"1.5px solid "+(showPresenca?"#38A169":"#555"),
          background:showPresenca?"#38A169":"#222",color:showPresenca?WHITE:"#ccc",
          fontSize:12,fontWeight:700,cursor:"pointer"}},
          "✓ "+presentesCount+" · ✗ "+ausentesCount),
        el("button",{onClick:savePNG,style:{padding:"7px 14px",borderRadius:8,border:"1.5px solid #555",
          background:"#222",color:"#ccc",fontSize:12,fontWeight:700,cursor:"pointer",opacity:saving?.6:1}},
          saving?"Gerando…":"🖼 PNG"),
        el("button",{onClick:copy,style:{padding:"7px 14px",borderRadius:8,border:"none",
          background:copied?"#38A169":RED,color:WHITE,fontSize:12,fontWeight:700,cursor:"pointer"}},
          copied?"✓ Copiado!":"📋 PPT"),
        el("button",{onClick:onClose,style:{width:30,height:30,borderRadius:8,border:"1px solid #444",
          background:"#222",color:"#888",fontSize:18,cursor:"pointer"}},"×")
      ),

      // Painel de presença (colapsável)
      showPresenca && el("div",{style:{background:"#111",padding:"12px 18px",borderBottom:"1px solid #333",
        display:"flex",flexDirection:"column",gap:10,maxHeight:280,overflowY:"auto"}},
        el("div",{style:{display:"flex",alignItems:"center",gap:10,justifyContent:"space-between"}},
          el("div",{style:{fontSize:11,color:"#888"}},
            "Clique num atleta pra alternar presente/ausente. Salva ao gerar PNG."),
          el("button",{onClick:salvarPresenca,disabled:savingPresenca,style:{
            padding:"5px 12px",borderRadius:6,border:"none",
            background: presencaSaved ? "#059669" : (savingPresenca ? "#555" : "#38A169"),
            color:WHITE,fontSize:11,fontWeight:800,cursor:savingPresenca?"wait":"pointer",
            transition: "background .2s"
          }}, presencaSaved ? "✓ Salvo!" : (savingPresenca ? "Salvando…" : "💾 Salvar agora"))
        ),
        el("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(140px, 1fr))",gap:4}},
          ...allAthletes.map(a => {
            const isPresent = presencaMap[a.id] === 'presente';
            return el("button",{key:a.id,onClick:()=>togglePresenca(a.id),style:{
              padding:"5px 8px",borderRadius:5,cursor:"pointer",textAlign:"left",
              border:"1px solid "+(isPresent?"#38A169":"#4B5563"),
              background:isPresent?"rgba(56,161,105,0.15)":"rgba(75,85,99,0.25)",
              color:isPresent?"#86EFAC":"#9CA3AF",
              fontSize:11,fontWeight:600,
              display:"flex",alignItems:"center",gap:5,
              textDecoration:isPresent?"none":"line-through"
            }},
              el("span",{style:{fontSize:10}}, isPresent ? "✓" : "✗"),
              el("span",{style:{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},
                a.nickname||a.name.split(" ")[0])
            );
          })
        )
      ),

      // Scroll — preview only, PNG captures tRef directly
      el("div",{style:{overflowY:"auto",flex:1,padding:"14px 18px",background:"#0F0F0F"}},
        el("div",{ref:tRef,style:{background:WHITE,borderRadius:8,overflow:"hidden",
          fontFamily:"'Segoe UI',Arial,sans-serif",display:"inline-block",width:"100%"}},

          // Info strip
          el("div",{style:{background:RED,padding:"0"}},
            // Top row: velocity big + zone label
            el("div",{style:{padding:"14px 20px 8px",display:"flex",alignItems:"center",gap:14}},
              el("div",{style:{display:"flex",alignItems:"baseline",gap:6}},
                el("span",{style:{fontSize:36,fontWeight:900,color:WHITE,letterSpacing:"-.03em",lineHeight:1}},zone.min.toFixed(2)+"–"+zone.max.toFixed(2)),
                el("span",{style:{fontSize:16,color:"rgba(255,255,255,0.8)",marginLeft:3}},"m/s")
              ),
              el("div",{style:{height:36,width:2,background:"rgba(255,255,255,0.35)",margin:"0 6px"}}),
              el("div",{style:{fontWeight:900,fontSize:22,color:WHITE,textTransform:"uppercase",letterSpacing:".04em"}},zone.label)
            ),
            // Bottom row: metadata
            el("div",{style:{background:"rgba(0,0,0,0.15)",padding:"8px 20px",display:"flex",gap:28,alignItems:"center"}},
              el("div",{style:{display:"flex",gap:6,alignItems:"center"}},
                el("span",{style:{fontSize:12,color:"rgba(255,255,255,0.7)",textTransform:"uppercase",letterSpacing:".06em"}},"Séries × Reps"),
                el("span",{style:{fontSize:16,fontWeight:900,color:WHITE}},ser+" × "+rep)
              ),
              el("div",{style:{width:1,height:18,background:"rgba(255,255,255,0.3)"}}),
              el("div",{style:{display:"flex",gap:6,alignItems:"center"}},
                el("span",{style:{fontSize:12,color:"rgba(255,255,255,0.7)",textTransform:"uppercase",letterSpacing:".06em"}},"VDT"),
                el("span",{style:{fontSize:16,fontWeight:900,color:WHITE}},"−"+zone.vdt+"%")
              ),
              el("div",{style:{width:1,height:18,background:"rgba(255,255,255,0.3)"}}),
              el("div",{style:{display:"flex",gap:6,alignItems:"center"}},
                el("span",{style:{fontSize:12,color:"rgba(255,255,255,0.7)",textTransform:"uppercase",letterSpacing:".06em"}},"Data"),
                el("span",{style:{fontSize:15,fontWeight:700,color:WHITE}},dateStr)
              ),
              el("div",{style:{marginLeft:"auto",fontSize:11,color:"rgba(255,255,255,0.6)",fontWeight:700,letterSpacing:".06em"}},"CAP · PERFORMANCE")
            )
          ),

          // Columns side by side
          el("div",{style:{display:"flex",gap:0}},
            columns.map((colRows, i) =>
              el("div",{key:i,style:{flex:1,minWidth:0}},
                el(MiniTable,{colRows}),
                i < columns.length - 1 && el("div",{style:{width:2,background:MGRAY}})
              )
            )
          ),

          // Footer
          el("div",{style:{padding:"6px 14px",background:"#2A2A2A",display:"flex",alignItems:"center",gap:16}},
            el("span",{style:{fontSize:10,color:"#DDD",letterSpacing:".04em"}},"— SEM PERFIL VBT"),
            el("span",{style:{fontSize:10,color:"#DDD",letterSpacing:".04em"}},"(lado) = KG CADA LADO"),
            el("div",{style:{marginLeft:"auto",fontSize:10,color:"#BBB",fontWeight:700,letterSpacing:".06em"}},"VBT·FORCE · CAP")
          )
        )
      )
    )
  );
}

// ── ATHLETES VIEW ─────────────────────────────────────────────────────────────
function AthletesView({athletes,setAthletes,profiles,setProfiles,saveAthlete,deleteAthlete,saveProfiles}) {
  const el=React.createElement;
  const [modal,setModal]=useState(null);
  const [log,setLog]=useState(null);
  const [search,setSearch]=useState("");
  const [catFilter,setCat]=useState("Todas");
  const [importing,setImporting]=useState(false);
  const [showWeights,setShowWeights]=useState(false);
  const fileRef=useRef();

  const handleCSV=useCallback(e=>{
    const file=e.target.files[0]; if(!file) return;
    setImporting(true);
    const reader=new FileReader();
    reader.onload=async ev=>{
      const {profiles:newP,log:newLog,snapshots:snapArr}=parseCSV(ev.target.result,athletes.map(a=>a.name));
      await saveProfiles(newP, athletes, snapArr);
      setLog(newLog); setImporting(false);
    };
    reader.readAsText(file,"utf-8");
    e.target.value="";
  },[athletes,saveProfiles]);

  const planilhaFileRef = useRef();

  // Download planilha unificada (ExcelJS: suporta data validation, ao contrário de SheetJS free)
  const downloadPlanilha = async () => {
    if (!window.ExcelJS) { alert("Biblioteca ExcelJS não carregou. Recarregue a página (Ctrl+Shift+R)."); return; }
    const positions = ["Goleiro","Zagueiro","Lateral","Volante","Meia","Extremo","Atacante"];
    const statuses  = ["ativo","inativo"];
    const wb = new ExcelJS.Workbook();
    wb.creator = 'VBT·force';
    wb.created = new Date();

    // === ABA 1: Atletas ===
    const ws = wb.addWorksheet('Atletas');
    ws.columns = [
      { header: 'id', key: 'id', width: 36 },
      { header: 'name', key: 'name', width: 26 },
      { header: 'nickname', key: 'nickname', width: 16 },
      { header: 'dob', key: 'dob', width: 14 },
      { header: 'position', key: 'position', width: 14 },
      { header: 'categoria_1', key: 'categoria_1', width: 16 },
      { header: 'categoria_2', key: 'categoria_2', width: 16 },
      { header: 'categoria_3', key: 'categoria_3', width: 16 },
      { header: 'status', key: 'status', width: 12 },
      { header: 'body_weight', key: 'body_weight', width: 16 },
      { header: 'height_cm', key: 'height_cm', width: 12 }
    ];
    // Header estilizado
    ws.getRow(1).eachCell(cell => {
      cell.font = { bold: true, color: {argb: 'FFFFFFFF'}, size: 11 };
      cell.fill = { type: 'pattern', pattern: 'solid', fgColor: {argb: 'FFC8102E'} }; // vermelho CAP
      cell.alignment = { vertical: 'middle', horizontal: 'center' };
      cell.border = {
        bottom: { style: 'medium', color: {argb: 'FF000000'} }
      };
    });
    ws.getRow(1).height = 22;

    // Popula linhas — distribui categorias do array nas 3 colunas
    athletes.forEach(a => {
      const dobDate = a.dob ? new Date(a.dob + 'T12:00:00') : null;
      const cats = a.categories || [];
      ws.addRow({
        id: a.id || '',
        name: a.name || '',
        nickname: a.nickname || '',
        dob: dobDate,
        position: a.position || '',
        categoria_1: cats[0] || '',
        categoria_2: cats[1] || '',
        categoria_3: cats[2] || '',
        status: a.status || 'ativo',
        body_weight: a.body_weight != null ? a.body_weight : null,
        height_cm: a.height_cm != null ? a.height_cm : null
      });
    });

    // Formata coluna dob como DD/MM/YYYY (padrão BR)
    ws.getColumn('dob').numFmt = 'dd/mm/yyyy';
    // ID em cinza claro pra sinalizar "não mexer"
    ws.getColumn('id').eachCell({includeEmpty:false}, (cell, rowNumber) => {
      if (rowNumber === 1) return;
      cell.font = { color: {argb: 'FF999999'}, size: 10 };
    });

    // Data validations até 500 linhas
    const lastRow = 500;
    // Position (coluna E)
    ws.dataValidations.add('E2:E' + lastRow, {
      type: 'list', allowBlank: true, showErrorMessage: true,
      formulae: ['"' + positions.join(',') + '"'],
      errorStyle: 'error', errorTitle: 'Posição inválida',
      error: 'Escolha uma da lista: ' + positions.join(', ')
    });
    // Categorias 1, 2, 3 (colunas F, G, H)
    const catFormula = ['"' + CATEGORIES.join(',') + '"'];
    ['F','G','H'].forEach(col => {
      ws.dataValidations.add(col + '2:' + col + lastRow, {
        type: 'list', allowBlank: true, showErrorMessage: true,
        formulae: catFormula,
        errorStyle: 'error', errorTitle: 'Categoria inválida',
        error: 'Escolha uma da lista: ' + CATEGORIES.join(', ')
      });
    });
    // Status (coluna I)
    ws.dataValidations.add('I2:I' + lastRow, {
      type: 'list', allowBlank: true, showErrorMessage: true,
      formulae: ['"' + statuses.join(',') + '"'],
      errorStyle: 'error', errorTitle: 'Status inválido',
      error: 'Use ativo ou inativo'
    });
    // body_weight (J) e height_cm (K): só números
    ws.dataValidations.add('J2:J' + lastRow, {
      type: 'decimal', allowBlank: true, operator: 'between', showErrorMessage: true,
      formulae: [30, 200], errorStyle: 'error', errorTitle: 'Peso inválido',
      error: 'Digite um número entre 30 e 200 kg'
    });
    ws.dataValidations.add('K2:K' + lastRow, {
      type: 'decimal', allowBlank: true, operator: 'between', showErrorMessage: true,
      formulae: [100, 230], errorStyle: 'error', errorTitle: 'Altura inválida',
      error: 'Digite um número entre 100 e 230 cm'
    });
    // Comentários explicativos nos headers (não altera o texto, aparece ao passar mouse)
    ws.getCell('A1').note = { texts: [{ font: {bold:true, size:10}, text: 'ID interno. NÃO EDITAR — se apagar, será criado atleta duplicado.' }] };
    ws.getCell('D1').note = { texts: [{ font: {bold:true, size:10}, text: 'Data de nascimento. Formato: DD/MM/AAAA' }] };
    ws.getCell('J1').note = { texts: [{ font: {bold:true, size:10}, text: 'Peso corporal em quilogramas (kg). Entre 30 e 200.' }] };
    ws.getCell('K1').note = { texts: [{ font: {bold:true, size:10}, text: 'Altura em centímetros (cm). Entre 100 e 230.' }] };
    // Comentário no header das categorias
    ws.getCell('F1').note = {
      texts: [{
        font: { bold: true, size: 10 },
        text: 'Cada coluna aceita UMA categoria via dropdown.\n\nSe o atleta pertence a várias, preencha categoria_2 e categoria_3.\n\nCategorias válidas:\n' + CATEGORIES.join('\n')
      }]
    };

    // Congela primeira linha e primeira coluna
    ws.views = [{ state: 'frozen', xSplit: 1, ySplit: 1 }];

    // === ABA 2: Referência ===
    const wsRef = wb.addWorksheet('Referência');
    wsRef.columns = [
      { header: 'Tipo', key: 'tipo', width: 24 },
      { header: 'Valor válido', key: 'valor', width: 32 }
    ];
    wsRef.getRow(1).font = { bold: true, color: {argb:'FFFFFFFF'} };
    wsRef.getRow(1).fill = { type: 'pattern', pattern: 'solid', fgColor: {argb:'FF2D3748'} };
    CATEGORIES.forEach(c => wsRef.addRow({ tipo: 'Categoria', valor: c }));
    positions.forEach(p => wsRef.addRow({ tipo: 'Posição', valor: p }));
    statuses.forEach(s => wsRef.addRow({ tipo: 'Status', valor: s }));

    // Salva
    const buffer = await wb.xlsx.writeBuffer();
    const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'atletas_vbtforce_' + new Date().toISOString().slice(0,10) + '.xlsx';
    a.click();
    URL.revokeObjectURL(url);
  };

  // Upload da planilha: atualiza atletas existentes (matching por id) e cria novos (id vazio)
  const [uploadingPlanilha, setUploadingPlanilha] = useState(false);
  const handleUploadPlanilha = async (e) => {
    const f = e.target.files[0];
    if (!f) return;
    if (!window.XLSX) { alert("Biblioteca XLSX não carregou. Recarregue a página."); e.target.value=''; return; }
    setUploadingPlanilha(true);
    try {
      const buffer = await f.arrayBuffer();
      const wb = XLSX.read(buffer, {type:'array', cellDates: true});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {defval: ''});
      let novos = 0, atualizados = 0, erros = 0;
      const errosDetalhes = [];
      const catsInvalidas = new Set();
      const catsValidas = new Set(CATEGORIES);
      for (const r of rows) {
        const nome = String(r.name || '').trim();
        if (!nome) continue;
        // dob pode vir como Date (cellDates:true), string ISO, DD/MM/YYYY, ou vazio
        let dobFinal = null;
        if (r.dob instanceof Date && !isNaN(r.dob)) {
          dobFinal = r.dob.toISOString().slice(0,10);
        } else if (r.dob) {
          const s = String(r.dob).trim();
          // Detecta DD/MM/YYYY ou DD-MM-YYYY
          const brMatch = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
          if (brMatch) {
            const [, d, m, y] = brMatch;
            dobFinal = y + '-' + m.padStart(2,'0') + '-' + d.padStart(2,'0');
          } else {
            // Assume ISO YYYY-MM-DD
            dobFinal = s.slice(0,10);
          }
        }
        // Filtra categorias: coleta das 3 colunas separadas, valida contra CATEGORIES
        const catsRaw = [r.categoria_1, r.categoria_2, r.categoria_3]
          .map(c => c ? String(c).trim() : '')
          .filter(Boolean);
        const catsFiltradas = [];
        catsRaw.forEach(c => {
          if (catsValidas.has(c)) {
            if (!catsFiltradas.includes(c)) catsFiltradas.push(c); // evita duplicatas
          } else {
            catsInvalidas.add(c);
          }
        });
        const payload = {
          id: r.id && String(r.id).trim() ? String(r.id).trim() : null,
          name: nome,
          nickname: r.nickname ? String(r.nickname).trim() : null,
          dob: dobFinal,
          position: r.position ? String(r.position).trim() : null,
          categories: catsFiltradas,
          status: r.status ? String(r.status).trim() : 'ativo',
          body_weight: (r.body_weight !== '' && r.body_weight != null) ? Number(r.body_weight) : null,
          height_cm: (r.height_cm !== '' && r.height_cm != null) ? Number(r.height_cm) : null,
          photo: null
        };
        // Preserva foto atual se atleta já existe
        if (payload.id) {
          const existing = athletes.find(a => a.id === payload.id);
          if (existing) payload.photo = existing.photo_url || null;
        }
        try {
          await saveAthlete(payload);
          if (payload.id) atualizados++; else novos++;
        } catch(err) {
          erros++;
          errosDetalhes.push(nome + ': ' + err.message);
          console.error("Erro na linha", r, err);
        }
      }
      let msg = `Planilha processada:\n\n• ${atualizados} atualizado(s)\n• ${novos} novo(s)`;
      if (catsInvalidas.size > 0) {
        msg += `\n\nCategorias ignoradas (não existem no sistema):\n${[...catsInvalidas].join(', ')}`;
      }
      if (erros > 0) msg += `\n\n${erros} erro(s):\n` + errosDetalhes.slice(0,5).join('\n');
      alert(msg);
    } catch(err) {
      alert("Erro ao processar planilha: " + err.message);
    } finally {
      setUploadingPlanilha(false);
      e.target.value = '';
    }
  };

  const norm=normStr;
  const filtered=useMemo(()=>{
    let base=athletes;
    if(catFilter!=="Todas") base=base.filter(a=>(a.categories||[]).includes(catFilter));
    if(!search) return base;
    const s=norm(search);
    return base.filter(a=>norm(a.name).includes(s)||norm(a.nickname||"").includes(s));
  },[athletes,search,catFilter]);

  const active=filtered.filter(a=>a.status==="ativo");
  const inactive=filtered.filter(a=>a.status!=="ativo");
  const matchColor=t=>t==="exato"?"#2563EB":t==="normalizado"?T.accent:t==="proximidade"?"#D69E2E":"#A0AEC0";

  return el("div",{style:{display:"flex",flexDirection:"column",flex:1,minHeight:0,overflowY:"auto",background:T.bg}},
    // Top bar
    el("div",{style:{padding:"10px 16px",borderBottom:"1px solid "+T.border,background:T.card,display:"flex",gap:8,flexWrap:"nowrap",alignItems:"center",overflowX:"auto"}},
      el(Btn,{primary:true,onClick:()=>setModal({id:null,name:"",nickname:"",dob:"",position:"",status:"ativo",photo:null,categories:[]})},"+ Atleta"),
      el("div",null,
        el("input",{type:"file",accept:".csv",ref:fileRef,onChange:handleCSV,style:{display:"none"}}),
        el(Btn,{onClick:()=>fileRef.current&&fileRef.current.click()},importing?"Importando…":"↑ CSV Output Sports")
      ),
      // Bloco: atualização em lote via planilha
      el("div",{title:"Baixe a planilha, edite peso/estatura/dados de todos os atletas de uma vez no Excel, e envie de volta.",
        style:{display:"flex",alignItems:"center",gap:6,padding:"4px 8px",
        border:"1px solid "+T.border,borderRadius:8,background:"#F7FAFC"}},
        el("span",{style:{fontSize:10,fontWeight:800,color:T.muted,textTransform:"uppercase",letterSpacing:".05em",marginRight:2}},"Atualizar em lote"),
        el(Btn,{onClick:downloadPlanilha,title:"Baixa planilha Excel com todos os atletas preenchidos"},"⬇ Baixar Excel"),
        el("div",null,
          el("input",{type:"file",accept:".xlsx,.xls",ref:planilhaFileRef,onChange:handleUploadPlanilha,style:{display:"none"}}),
          el(Btn,{onClick:()=>planilhaFileRef.current&&planilhaFileRef.current.click(),
            title:"Envia planilha editada de volta pro sistema"},
            uploadingPlanilha ? "Enviando…" : "⬆ Enviar Excel")
        )
      ),
      el("input",{value:search,onChange:e=>setSearch(e.target.value),placeholder:"Buscar atleta…",style:{flex:1,minWidth:140,padding:"7px 10px",borderRadius:7,border:"1.5px solid "+T.border,background:"#fff",color:T.text,fontSize:13,outline:"none"}}),
      // Storage status
      el("div",{style:{display:"flex",alignItems:"center",gap:5,padding:"4px 10px",borderRadius:6,background:"#F0FFF4",border:"1px solid #9AE6B4"},title:"Dados salvos no navegador"},
        el("div",{style:{width:7,height:7,borderRadius:"50%",background:"#38A169"}}),
        el("span",{style:{fontSize:11,color:"#2F855A",fontWeight:700,whiteSpace:"nowrap"}},
          athletes.filter(a=>a.status==="ativo").length+"at · "+Object.keys(profiles).length+"p"
        )
      ),
      el("span",{style:{fontSize:11,color:T.muted}},athletes.length+" atletas")
    ),
    // Category filter strip
    el("div",{style:{padding:"8px 16px",borderBottom:"1px solid "+T.border,background:"#FAFBFF",display:"flex",gap:5,overflowX:"auto",flexShrink:0}},
      ...["Todas",...CATEGORIES].map(c=>{
        const cnt=c==="Todas"?athletes.length:athletes.filter(a=>(a.categories||[]).includes(c)).length;
        return el("button",{key:c,onClick:()=>setCat(c),style:{
          padding:"4px 12px",borderRadius:20,fontSize:11,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap",
          border:"1.5px solid "+(catFilter===c?T.accent:T.border),
          background:catFilter===c?T.accent+"18":"#fff",
          color:catFilter===c?T.accent:T.sub,transition:"all .15s"
        }},c+(cnt>0?" ("+cnt+")":""));
      })
    ),
    el("div",{style:{flex:1,overflowY:"auto",padding:"14px 18px",display:"flex",flexDirection:"column",gap:14}},
      // Match log
      log&&el("div",{style:{border:"1px solid "+T.border,borderRadius:10,overflow:"hidden",background:T.card}},
        el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 14px",background:"#F7FAFF",borderBottom:"1px solid "+T.border}},
          el("span",{style:{fontWeight:700,fontSize:13,color:T.text}},"Resultado do import"),
          el("button",{onClick:()=>setLog(null),style:{background:"none",border:"none",color:T.muted,fontSize:20,cursor:"pointer"}},"×")
        ),
        el("div",{style:{display:"flex",gap:12,padding:"6px 14px",flexWrap:"wrap",borderBottom:"1px solid "+T.border}},
          ...["exato","normalizado","proximidade","novo"].map(t=>el("div",{key:t,style:{display:"flex",alignItems:"center",gap:4,fontSize:11,color:T.sub}},
            el("div",{style:{width:7,height:7,borderRadius:"50%",background:matchColor(t)}}),t
          ))
        ),
        ...log.map((m,i)=>el("div",{key:i,style:{display:"grid",gridTemplateColumns:"1fr 1fr 60px 90px",padding:"7px 14px",borderTop:"1px solid "+T.border,alignItems:"center",gap:8}},
          el("span",{style:{fontSize:12,color:T.sub}},m.csvName),
          el("span",{style:{fontSize:12,fontWeight:m.type!=="novo"?700:400,color:m.type!=="novo"?T.text:T.muted}},m.type==="novo"?"— não cadastrado":m.registeredName),
          el("span",{style:{fontSize:11,color:T.muted,textAlign:"center"}},m.score!==null?m.score+"%":"—"),
          el("div",{style:{textAlign:"center"}},el(Badge,{color:matchColor(m.type),xs:true},m.type))
        ))
      ),
      // Athlete cards
      ...[["Ativos",active],["Inativos",inactive]].map(([label,list])=>list.length>0&&el("div",{key:label},
        el("div",{style:{fontSize:10,fontWeight:700,letterSpacing:".08em",color:T.muted,textTransform:"uppercase",marginBottom:8}},label),
        el("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(190px,1fr))",gap:10}},
          ...list.map(a=>{
            const hasP=!!resolveProfile(a.name,profiles);
            return el("div",{key:a.id,onClick:()=>setModal({...a,categories:a.categories||[]}),style:{border:"1.5px solid "+T.border,borderRadius:10,padding:"13px",cursor:"pointer",background:T.card,opacity:a.status==="ativo"?1:.55,transition:"border-color .15s"},
              onMouseEnter:e=>e.currentTarget.style.borderColor=T.accent,
              onMouseLeave:e=>e.currentTarget.style.borderColor=T.border},
              el("div",{style:{display:"flex",alignItems:"center",gap:10,marginBottom:8}},
                el(Avatar,{name:a.name,photo:a.photo,size:38}),
                el("div",{style:{minWidth:0}},
                  el("div",{style:{fontWeight:800,fontSize:13,color:T.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},a.nickname||a.name.split(" ")[0]),
                  el("div",{style:{fontSize:10,color:T.muted,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},a.name)
                )
              ),
              el("div",{style:{display:"flex",gap:4,flexWrap:"wrap"}},
                a.position&&el(Badge,{color:T.muted,xs:true},a.position),
                a.body_weight&&el(Badge,{color:"#6B7280",xs:true},a.body_weight+"kg"),
                (a.categories||[]).slice(0,1).map(c=>el(Badge,{key:c,color:T.muted,xs:true},c)),
                hasP?el(Badge,{color:"#2563EB",xs:true},"Perfil VBT"):el(Badge,{color:"#D69E2E",xs:true},"Sem perfil")
              ),
              a.dob&&el("div",{style:{fontSize:10,color:T.muted,marginTop:5}},calcAge(a.dob)+" anos"),
              (a.categories||[]).length>0&&el("div",{style:{fontSize:10,color:T.muted,marginTop:3}},(a.categories||[]).join(" · "))
            );
          })
        )
      )),
      filtered.length===0&&el(Empty,{icon:"🔍",title:"Nenhum resultado",sub:"\""+search+"\""})
    ),
    modal&&el(AthleteModal,{data:modal,profiles,
      onSave:async d=>{ await saveAthlete(d); setModal(null); },
      onDelete:async id=>{ await deleteAthlete(id); setModal(null); },
      onClose:()=>setModal(null)
    }),
    showWeights&&el(WeightsModal,{
      athletes:athletes.filter(a=>a.status==="ativo"),
      saveAthlete,
      onClose:()=>setShowWeights(false)
    })
  );
}

function WeightsModal({athletes,saveAthlete,onClose}) {
  const el=React.createElement;
  const [data,setData]=useState(()=>{
    const d={};
    athletes.forEach(a=>{ d[a.id]={bw:a.body_weight||"",ht:a.height_cm||""}; });
    return d;
  });
  const [saving,setSaving]=useState(false);
  const [search,setSearch]=useState("");
  const [cat,setCat]=useState("Todas");

  const catFiltered=useMemo(()=>{
    if(cat==="Todas") return athletes;
    return athletes.filter(a=>(a.categories||[]).includes(cat));
  },[athletes,cat]);

  const filtered=useMemo(()=>{
    if(!search) return catFiltered;
    const s=search.toLowerCase();
    return catFiltered.filter(a=>(a.nickname||a.name).toLowerCase().includes(s));
  },[catFiltered,search]);

  const allCats=useMemo(()=>{
    const s=new Set();
    athletes.forEach(a=>(a.categories||[]).forEach(c=>s.add(c)));
    return ["Todas",...Array.from(s).sort()];
  },[athletes]);

  const changed=athletes.filter(a=>{
    const d=data[a.id]||{};
    return (String(d.bw)!==String(a.body_weight||"") && d.bw!=="") ||
           (String(d.ht)!==String(a.height_cm||"") && d.ht!=="");
  });

  const saveAll=async()=>{
    setSaving(true);
    for(const a of changed){
      const d=data[a.id]||{};
      const updates={...a};
      if(d.bw!=="") updates.body_weight=+d.bw;
      if(d.ht!=="") updates.height_cm=+d.ht;
      await saveAthlete(updates);
    }
    setSaving(false);
    onClose();
  };

  const setField=(id,key,val)=>setData(d=>({...d,[id]:{...d[id],[key]:val}}));

  return el("div",{style:{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:400,
    display:"flex",alignItems:"center",justifyContent:"center",padding:20}},
    el("div",{style:{background:"#fff",borderRadius:14,width:"100%",maxWidth:560,
      maxHeight:"85vh",display:"flex",flexDirection:"column",boxShadow:"0 30px 80px rgba(0,0,0,0.3)"}},

      // Header
      el("div",{style:{padding:"14px 18px",borderBottom:"1px solid "+T.border,display:"flex",alignItems:"center",gap:10,flexShrink:0}},
        el("div",{style:{flex:1}},
          el("div",{style:{fontWeight:800,fontSize:16,color:T.text}},"⚖️ Peso e Estatura"),
          el("div",{style:{fontSize:12,color:T.muted,marginTop:2}},filtered.length+" atletas"+(changed.length>0?" · "+changed.length+" alterados":""))
        ),
        el("button",{onClick:onClose,style:{width:30,height:30,borderRadius:8,border:"1px solid "+T.border,
          background:"#F7F8FC",color:T.muted,fontSize:18,cursor:"pointer"}},"×")
      ),

      // Category filter + search
      el("div",{style:{padding:"8px 14px",borderBottom:"1px solid "+T.border,display:"flex",gap:6,flexWrap:"wrap",alignItems:"center",flexShrink:0}},
        ...allCats.map(c=>
          el("button",{key:c,onClick:()=>setCat(c),style:{
            padding:"3px 9px",borderRadius:20,fontSize:10,fontWeight:700,cursor:"pointer",
            border:"1.5px solid "+(cat===c?T.accent:T.border),
            background:cat===c?T.accent:"#fff",color:cat===c?"#fff":T.sub
          }},c)
        )
      ),
      el("div",{style:{padding:"6px 14px",borderBottom:"1px solid "+T.border,flexShrink:0}},
        el("input",{value:search,onChange:e=>setSearch(e.target.value),
          placeholder:"Buscar...",
          style:{width:"100%",padding:"6px 10px",borderRadius:7,border:"1.5px solid "+T.border,
            fontSize:13,outline:"none"}})
      ),

      // Column headers
      el("div",{style:{display:"grid",gridTemplateColumns:"1fr 70px 70px",padding:"6px 14px",
        borderBottom:"1px solid "+T.border,background:"#FAFBFF",flexShrink:0}},
        el("span",{style:{fontSize:10,fontWeight:700,color:T.muted,textTransform:"uppercase"}},"Atleta"),
        el("span",{style:{fontSize:10,fontWeight:700,color:T.muted,textTransform:"uppercase",textAlign:"center"}},"Peso"),
        el("span",{style:{fontSize:10,fontWeight:700,color:T.muted,textTransform:"uppercase",textAlign:"center"}},"Alt (cm)")
      ),

      // List
      el("div",{style:{overflowY:"auto",flex:1}},
        ...filtered.map((a,i)=>{
          const d=data[a.id]||{bw:"",ht:""};
          return el("div",{key:a.id,style:{display:"grid",gridTemplateColumns:"1fr 70px 70px",
            alignItems:"center",padding:"6px 14px",gap:8,
            borderBottom:"1px solid "+T.border+"44",
            background:i%2===0?"#fff":"#FAFBFF"}},
            el("div",{style:{display:"flex",alignItems:"center",gap:8,minWidth:0}},
              el(Avatar,{name:a.name,photo:a.photo,size:28}),
              el("div",{style:{minWidth:0}},
                el("div",{style:{fontWeight:700,fontSize:12,color:T.text,
                  whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}},
                  a.nickname||a.name.split(" ")[0]),
                el("div",{style:{fontSize:9,color:T.muted}},a.position||"")
              )
            ),
            el("input",{type:"number",min:30,max:150,step:0.1,
              value:d.bw,placeholder:defaultBW(a.position)+"",
              onChange:e=>setField(a.id,"bw",e.target.value),
              style:{width:"100%",textAlign:"center",padding:"5px 2px",borderRadius:6,
                border:"1.5px solid "+(d.bw&&String(d.bw)!==String(a.body_weight||"")?T.accent:T.border),
                fontSize:13,fontWeight:800,outline:"none",
                background:d.bw?"#fff":"#FFF9E6"}}),
            el("input",{type:"number",min:140,max:210,step:1,
              value:d.ht,placeholder:"—",
              onChange:e=>setField(a.id,"ht",e.target.value),
              style:{width:"100%",textAlign:"center",padding:"5px 2px",borderRadius:6,
                border:"1.5px solid "+(d.ht&&String(d.ht)!==String(a.height_cm||"")?T.accent:T.border),
                fontSize:13,fontWeight:800,outline:"none",background:"#fff"}})
          );
        })
      ),

      // Footer

// ── PROFILES VIEW ─────────────────────────────────────────────────────────────
function ProfilesView({athletes,profiles}) {
  const el=React.createElement;
  const [sel,setSel]=useState(null);
  const [ex,setEx]=useState("Back Squat");
  const [catFilter,setCatFilter]=useState("Todas");
  const [showIssuesModal, setShowIssuesModal] = useState(false);

  // === Detecção de perfis que precisam de teste ===
  // Regras: <4 pontos | R² < 0.35 | todas cargas em velocidade > 0.7 m/s
  const detectIssue = (pts, reg, e1rm, maxLoad, maxMpv) => {
    if (!pts || pts.length === 0) return { severity: 4, motivo: "sem dados", acao: "iniciar teste com aquecimento leve depois subindo cargas até velocidade < 0.5 m/s" };
    if (pts.length < 4) return {
      severity: 3,
      motivo: "só " + pts.length + (pts.length === 1 ? " ponto" : " pontos") + " coletado" + (pts.length === 1 ? "" : "s"),
      acao: "coletar mais " + (4 - pts.length) + " ponto(s) em cargas diferentes"
    };
    // Todas velocidades altas → falta ponto pesado
    const minMpv = Math.min(...pts.map(p => p.mpv));
    if (minMpv > 0.7) {
      const proxCarga = maxLoad ? Math.round(maxLoad * 1.15 / 5) * 5 : null;
      return {
        severity: 2,
        motivo: "falta ponto pesado (menor vel: " + minMpv.toFixed(2) + " m/s)",
        acao: proxCarga ? ("testar ~" + proxCarga + " kg buscando velocidade < 0.6") : "subir carga até velocidade < 0.6 m/s"
      };
    }
    // R² fraco
    if (reg && reg.r2 !== undefined && reg.r2 < 0.35) {
      return {
        severity: 1,
        motivo: "regressão fraca (R²=" + reg.r2.toFixed(2) + ")",
        acao: "refazer com cargas mais espalhadas entre leve e pesado"
      };
    }
    // Slope ruim
    if (reg && reg.slope > -0.004) {
      return {
        severity: 1,
        motivo: "curva quase plana (slope=" + (reg.slope||0).toFixed(3) + ")",
        acao: "cargas testadas muito próximas — variar mais"
      };
    }
    return null; // OK
  };

  const issues = useMemo(() => {
    const list = [];
    athletes.filter(a => a.status === "ativo").forEach(a => {
      const prof = resolveProfile(a.name, profiles);
      EXERCISES.forEach(exName => {
        const exProf = prof && prof[exName];
        const pts = (exProf && exProf.pts) || [];
        const reg = exProf && exProf.reg;
        const issue = detectIssue(pts, reg, exProf && exProf.e1rm, exProf && (exProf.maxLoad||exProf.max_load), exProf && (exProf.maxMpv||exProf.max_mpv));
        if (issue) list.push({ athlete: a, exercise: exName, ...issue });
      });
    });
    return list.sort((a,b) => b.severity - a.severity);
  }, [athletes, profiles]);

  // Lista de categorias com contagem
  const cats = useMemo(() => {
    const counts = { "Todas": athletes.length };
    CATEGORIES.forEach(c => { counts[c] = 0; });
    athletes.forEach(a => {
      (a.categories || []).forEach(c => { counts[c] = (counts[c] || 0) + 1; });
    });
    return ["Todas", ...CATEGORIES.filter(c => counts[c] > 0)].map(c => ({name: c, count: counts[c]}));
  }, [athletes]);

  // Atletas filtrados pela categoria selecionada
  const filteredAthletes = useMemo(() => {
    if (catFilter === "Todas") return athletes;
    return athletes.filter(a => (a.categories || []).includes(catFilter));
  }, [athletes, catFilter]);

  useEffect(()=>{
    // Se atleta selecionado não está mais no filtro, escolhe o primeiro
    if (sel && !filteredAthletes.find(a => a.id === sel.id)) {
      setSel(filteredAthletes.find(a=>resolveProfile(a.name,profiles)) || filteredAthletes[0] || null);
    } else if (!sel && filteredAthletes.length > 0) {
      setSel(filteredAthletes.find(a=>resolveProfile(a.name,profiles)) || filteredAthletes[0]);
    }
  },[filteredAthletes]);

  const prof=sel?resolveProfile(sel.name,profiles):null;
  const exProf=prof?prof[ex]:null;

  return el("div",{style:{display:"flex",flex:1,minHeight:0,overflow:"hidden",background:T.bg}},
    // Sidebar
    el("div",{style:{width:200,borderRight:"1px solid "+T.border,background:T.card,flexShrink:0,display:"flex",flexDirection:"column",minHeight:0}},
      // Filtro de categoria
      el("div",{style:{padding:"10px 10px 8px",borderBottom:"1px solid "+T.border,flexShrink:0}},
        el("div",{style:{fontSize:9,fontWeight:700,color:T.muted,textTransform:"uppercase",letterSpacing:".05em",marginBottom:6}},"Categoria"),
        el("select",{
          value:catFilter,
          onChange:e=>setCatFilter(e.target.value),
          style:{width:"100%",padding:"6px 8px",borderRadius:6,border:"1px solid "+T.border,fontSize:12,fontWeight:600,color:T.text,background:"#fff",cursor:"pointer",outline:"none"}
        }, ...cats.map(c => el("option",{key:c.name,value:c.name}, c.name + " (" + c.count + ")")))
      ),
      // Lista de atletas
      el("div",{style:{overflowY:"auto",flex:1,minHeight:0}},
        filteredAthletes.length===0&&el("div",{style:{padding:16,fontSize:12,color:T.muted}},"Sem atletas nesta categoria"),
        ...filteredAthletes.map(a=>el("div",{key:a.id,onClick:()=>setSel(a),style:{display:"flex",alignItems:"center",gap:9,padding:"9px 12px",cursor:"pointer",borderBottom:"1px solid "+T.border,borderLeft:"3px solid "+(sel&&sel.id===a.id?T.accent:"transparent"),background:sel&&sel.id===a.id?"#EBF4FF":T.card,transition:"background .1s"}},
          el(Avatar,{name:a.name,photo:a.photo,size:28}),
          el("div",{style:{minWidth:0}},
            el("div",{style:{fontSize:12,fontWeight:700,color:T.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},a.nickname||a.name.split(" ")[0]),
            el("div",{style:{fontSize:9,color:resolveProfile(a.name,profiles)?"#2563EB":T.muted}},resolveProfile(a.name,profiles)?"Perfil VBT":a.position||"—")
          )
        ))
      )
    ),
    // Content
    el("div",{style:{flex:1,overflowY:"auto",padding:20}},
      // Barra fina discreta com contagem — clicável abre modal
      issues.length > 0 && el("div",{onClick:()=>setShowIssuesModal(true),style:{
        display:"flex", alignItems:"center", gap:8,
        padding:"7px 12px", marginBottom:14,
        background:"#F1F5F9", border:"1px solid "+T.border, borderRadius:8,
        fontSize:11, cursor:"pointer", transition:"background .1s"
      }},
        el("span",{style:{fontSize:12}}, "⚡"),
        el("span",{style:{flex:1, color:T.sub}},
          el("strong",{style:{color:T.text, fontWeight:800}}, issues.length),
          " atletas × exercícios precisam de mais dados VBT"),
        el("span",{style:{fontSize:10, fontWeight:700, color:T.accent, letterSpacing:".05em"}}, "VER →")
      ),
      !sel&&el(Empty,{icon:"📊",title:"Selecione um atleta"}),
      sel&&el("div",null,
        el("div",{style:{display:"flex",alignItems:"center",gap:12,marginBottom:18}},
          el(Avatar,{name:sel.name,photo:sel.photo,size:46}),
          el("div",{style:{flex:1}},
            el("div",{style:{fontWeight:900,fontSize:17,color:T.text}},sel.name),
            el("div",{style:{fontSize:12,color:T.muted}},[sel.position,sel.group,calcAge(sel.dob)&&calcAge(sel.dob)+" anos"].filter(Boolean).join(" · "))
          ),
          el("div",{style:{display:"flex",gap:6}},
            ...EXERCISES.map(e=>el("button",{key:e,onClick:()=>setEx(e),style:{padding:"5px 11px",borderRadius:20,cursor:"pointer",border:"1.5px solid "+(ex===e?T.accent:T.border),background:ex===e?T.accent+"18":"#fff",color:ex===e?T.accent:T.sub,fontSize:11,fontWeight:700}},e==="Back Squat"?"Squat":e==="Trap Bar Deadlift"?"Trap Bar":"Hip Thrust"))
          )
        ),
        exProf?el("div",null,
          // Stats
          el("div",{style:{display:"flex",gap:10,marginBottom:14,flexWrap:"wrap"}},
            ...[
              [exProf.e1rm?exProf.e1rm+" kg":"—","e1RM estimado",exProf.reliable?"#2563EB":"#D69E2E"],
              [exProf.reg?exProf.reg.r2:"—","R² regressão",exProf.reliable?"#2563EB":"#D69E2E"],
              [exProf.maxLoad+" kg","Máx. observado",T.sub],
              [exProf.maxMpv+" m/s","MPV @ máx.",T.sub],
              [exProf.nReps,"Reps históricas",T.sub],
            ].map(([v,l,c])=>el("div",{key:l,style:{background:T.card,border:"1px solid "+T.border,borderRadius:9,padding:"10px 14px",minWidth:85,flex:"1 1 80px"}},
              el("div",{style:{fontSize:20,fontWeight:900,color:c}},v),
              el("div",{style:{fontSize:10,color:T.muted,marginTop:2}},l)
            ))
          ),
          // Zones
          el("div",{style:{border:"1px solid "+T.border,borderRadius:10,overflow:"hidden",background:T.card}},
            el("div",{style:{padding:"8px 14px",background:"#F7FAFF",borderBottom:"1px solid "+T.border,fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:".07em",color:T.muted}},"Cargas por zona · "+ex),
            ...ZONES.map(z=>{
              const load=exProf.reliable?loadAtVel(exProf.reg,(z.min+z.max)/2):null;
              const snap=load?roundToPlates(load,20):null;
              return el("div",{key:z.id,style:{display:"flex",alignItems:"center",gap:12,padding:"10px 14px",borderTop:"1px solid "+T.border}},
                el("div",{style:{width:9,height:9,borderRadius:"50%",background:z.color,flexShrink:0}}),
                el("div",{style:{flex:1,fontSize:13,fontWeight:600,color:T.text}},z.label),
                el("div",{style:{fontSize:11,color:T.muted}},z.min.toFixed(2)+"–"+z.max.toFixed(2)+" m/s"),
                el("div",{style:{width:80,textAlign:"right"}},snap?el("span",{style:{fontWeight:900,fontSize:16,color:z.color}},snap+" kg"):el("span",{style:{color:T.muted,fontSize:12}},"—")),

  const [evolAtleta, setEvolAtleta] = useState("");
  const [evolExercicio, setEvolExercicio] = useState("Back Squat");
  const [evolMetric, setEvolMetric] = useState("e1rm"); // "e1rm" | "mean_power" | "mean_velocity"

  // Filtro de atletas por categoria
  const atletasFiltrados = useMemo(() => {
    if (cat === "Todas") return athletes.filter(a => a.status === "ativo");
    return athletes.filter(a => a.status === "ativo" && (a.categories || []).includes(cat));
  }, [athletes, cat]);

  // Range de datas
  const dateRange = useMemo(() => {
    const end = new Date();
    const start = new Date();
    const days = periodo === "7d" ? 7 : periodo === "30d" ? 30 : 90;
    start.setDate(start.getDate() - days);
    return { start, end, days };
  }, [periodo]);

  // Carrega os meses cobertos pelo range
  React.useEffect(() => {
    if (!loadMonth) return;
    const meses = new Set();
    const cur = new Date(dateRange.start);
    while (cur <= dateRange.end) {
      meses.add(cur.getFullYear() + "-" + cur.getMonth());
      cur.setDate(cur.getDate() + 15);
    }
    // Dashboard mostra dados da categoria "Profissional" por default (microciclo é por categoria)
    // Se categoria filtrada não for "Todas", usa ela
    const catMicro = cat === "Todas" ? "Profissional" : cat;
    meses.forEach(mk => {
      const [y, m] = mk.split("-").map(Number);
      loadMonth(y, m, catMicro);
    });
  }, [dateRange, cat, loadMonth]);

  // Filtra os dias do microciclo pelo range de datas
  const diasNoRange = useMemo(() => {
    const fmt = d => localDateStr(d);
    const startStr = fmt(dateRange.start);
    const endStr = fmt(dateRange.end);
    const result = [];
    Object.entries(microDays || {}).forEach(([date, dy]) => {
      if (date >= startStr && date <= endStr) result.push({ date, ...dy });
    });
    return result;
  }, [microDays, dateRange]);

  // Contagens de tipos de sub-blocos (soma dos sub-blocos por dia × 3 janelas)
  const contagem = useMemo(() => {
    const c = { campo: 0, academia: 0, corretivos: 0, fisio: 0, correr: 0, jogo: 0, folga: 0, viagem: 0, concentracao: 0, treinoTotal: 0 };
    diasNoRange.forEach(d => {
      ["am","pm","pn"].forEach(p => {
        const blocks = Array.isArray(d[p + "_blocks"]) ? d[p + "_blocks"] : [];
        blocks.forEach(b => {
          if (!b.tipo) return;
          if (b.tipo === "jogo") c.jogo++;
          else if (b.tipo === "folga") c.folga++;
          else if (b.tipo === "viagem") c.viagem++;
          else if (b.tipo === "concentracao") c.concentracao++;
          else if (b.tipo === "treino") {
            c.treinoTotal++;
            const acts = (b.atividades || "").toLowerCase();
            if (acts.includes("campo")) c.campo++;
            if (acts.includes("academia")) c.academia++;
            if (acts.includes("correti")) c.corretivos++;
            if (acts.includes("fisio")) c.fisio++;
            if (acts.includes("corr") && !acts.includes("correti")) c.correr++;
          }
        });
      });
    });
    return c;
  }, [diasNoRange]);

  // Perfis VBT dos atletas filtrados: e1RM médio por exercício
  const e1rmPorExercicio = useMemo(() => {
    const result = {};
    ["Back Squat", "Trap Bar Deadlift", "Hip Thrust"].forEach(ex => {
      const valores = [];
      atletasFiltrados.forEach(a => {
        const prof = resolveProfile(a.name, profiles);
        const exProf = prof && prof[ex];
        if (exProf && exProf.e1rm && exProf.e1rm > 0) valores.push(exProf.e1rm);
      });
      const media = valores.length ? Math.round(valores.reduce((s,v)=>s+v,0) / valores.length) : 0;
      const max = valores.length ? Math.round(Math.max(...valores)) : 0;
      result[ex] = { media, max, n: valores.length };
    });
    return result;
  }, [atletasFiltrados, profiles]);

  // Distribuição por posição
  const porPosicao = useMemo(() => {
    const c = {};
    atletasFiltrados.forEach(a => {
      const p = a.position || "Sem posição";
      c[p] = (c[p] || 0) + 1;
    });
    return Object.entries(c).sort((a,b) => b[1] - a[1]);
  }, [atletasFiltrados]);

  // Total com perfil VBT
  const comPerfilVBT = atletasFiltrados.filter(a => resolveProfile(a.name, profiles)).length;

  // Componentes visuais
  const KpiCard = ({label, value, sub, color}) => el("div", {style:{
    background:T.card, border:"1px solid "+T.border, borderRadius:10, padding:"14px 16px",
    display:"flex", flexDirection:"column", gap:4, flex:1, minWidth:0
  }},
    el("div", {style:{fontSize:10, fontWeight:800, color:T.muted, textTransform:"uppercase", letterSpacing:".05em"}}, label),
    el("div", {style:{fontSize:26, fontWeight:900, color:color||T.text, lineHeight:1}}, value),
    sub && el("div", {style:{fontSize:11, color:T.muted, marginTop:2}}, sub)
  );

  const BarRow = ({label, value, max, color}) => {
    const pct = max > 0 ? (value / max) * 100 : 0;
    return el("div", {style:{marginBottom:6}},
      el("div", {style:{display:"flex", justifyContent:"space-between", fontSize:11, marginBottom:3}},
        el("span", {style:{fontWeight:700, color:T.text}}, label),
        el("span", {style:{fontWeight:600, color:T.muted}}, value)
      ),
      el("div", {style:{height:8, background:"#EDF2F7", borderRadius:4, overflow:"hidden"}},
        el("div", {style:{height:"100%", width:pct+"%", background:color||T.accent, borderRadius:4}})
      )
    );
  };

  const Section = ({title, subtitle, children}) => el("div", {style:{
    background:T.card, border:"1px solid "+T.border, borderRadius:10, padding:"14px 16px", minWidth:0
  }},
    el("div", {style:{marginBottom:12}},
      el("div", {style:{fontSize:12, fontWeight:800, color:T.text, letterSpacing:".02em"}}, title),
      subtitle && el("div", {style:{fontSize:10, color:T.muted, marginTop:2}}, subtitle)
    ),
    children
  );

  const maxTipoTreino = Math.max(contagem.campo, contagem.academia, contagem.corretivos, contagem.fisio, contagem.correr, 1);
  const maxPosicao = Math.max(...porPosicao.map(p => p[1]), 1);
  const maxE1rm = Math.max(...Object.values(e1rmPorExercicio).map(v => v.max), 1);

  const periodoLabel = periodo === "7d" ? "7 dias" : periodo === "30d" ? "30 dias" : "90 dias";
  const dataInicioLbl = dateRange.start.toLocaleDateString("pt-BR", {day:"2-digit",month:"2-digit"});
  const dataFimLbl = dateRange.end.toLocaleDateString("pt-BR", {day:"2-digit",month:"2-digit"});

  return el("div", {style:{display:"flex", flexDirection:"column", flex:1, minHeight:0, overflowY:"auto", background:T.bg, padding:16, gap:14}},
    // Filtros
    el("div", {style:{display:"flex", alignItems:"center", gap:12, flexWrap:"wrap"}},
      el("div", {style:{display:"flex", alignItems:"center", gap:6}},
        el("span", {style:{fontSize:10, fontWeight:700, color:T.muted, textTransform:"uppercase"}}, "Categoria"),
        el("select", {value:cat, onChange:e=>setCat(e.target.value), style:{
          padding:"6px 10px", borderRadius:7, border:"1.5px solid "+T.border,
          background:"#fff", fontSize:12, fontWeight:700, color:T.text, cursor:"pointer", outline:"none"
        }}, ...["Todas", ...CATEGORIES].map(c => el("option", {key:c, value:c}, c)))
      ),
      el("div", {style:{display:"flex", alignItems:"center", gap:6}},
        el("span", {style:{fontSize:10, fontWeight:700, color:T.muted, textTransform:"uppercase"}}, "Período"),
        ...["7d","30d","90d"].map(p => el("button", {key:p, onClick:()=>setPeriodo(p), style:{
          padding:"6px 12px", borderRadius:7, border:"1.5px solid "+(periodo===p?T.accent:T.border),
          background:periodo===p?"#EBF4FF":"#fff", color:periodo===p?T.accent:T.sub,
          fontSize:11, fontWeight:800, cursor:"pointer"
        }}, p === "7d" ? "7 dias" : p === "30d" ? "30 dias" : "90 dias"))
      ),
      el("div", {style:{marginLeft:"auto", fontSize:11, color:T.muted}},
        dataInicioLbl + " → " + dataFimLbl + " · " + atletasFiltrados.length + " atletas")
    ),

    // KPIs
    el("div", {style:{display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(150px, 1fr))", gap:10}},
      el(KpiCard, {label:"Atletas ativos", value:atletasFiltrados.length, sub:comPerfilVBT+" com perfil VBT"}),
      el(KpiCard, {label:"Treinos", value:contagem.treinoTotal, sub:"campo + academia + demais", color:"#2563EB"}),
      el(KpiCard, {label:"Jogos", value:contagem.jogo, sub:"no período", color:"#C53030"}),
      el(KpiCard, {label:"Folga · Viagem · Conc.", value:contagem.folga + contagem.viagem + contagem.concentracao, sub:contagem.folga+" folga · "+contagem.viagem+" viagem · "+contagem.concentracao+" conc.", color:"#D97706"})
    ),

    // Grid principal
    el("div", {style:{display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(300px, 1fr))", gap:12}},
      el(Section, {title:"Tipos de treino no período", subtitle:"contagem por atividade nos treinos"},
        contagem.treinoTotal === 0
          ? el("div", {style:{padding:"20px 0", textAlign:"center", color:T.muted, fontSize:11}}, "Sem treinos registrados no período")
          : el("div", null,
              el(BarRow, {label:"Campo", value:contagem.campo, max:maxTipoTreino, color:"#38A169"}),
              el(BarRow, {label:"Academia", value:contagem.academia, max:maxTipoTreino, color:"#2563EB"}),
              el(BarRow, {label:"Corretivos", value:contagem.corretivos, max:maxTipoTreino, color:"#805AD5"}),
              el(BarRow, {label:"Fisio", value:contagem.fisio, max:maxTipoTreino, color:"#D69E2E"}),
              el(BarRow, {label:"Correr", value:contagem.correr, max:maxTipoTreino, color:"#DD6B20"})
            )
      ),
      el(Section, {title:"e1RM médio por exercício", subtitle:cat === "Todas" ? "média de todos ativos" : "média em " + cat},
        el("div", null,
          ...["Back Squat","Trap Bar Deadlift","Hip Thrust"].map(ex => {
            const v = e1rmPorExercicio[ex];
            if (v.n === 0) return el("div", {key:ex, style:{fontSize:11, color:T.muted, padding:"4px 0"}}, ex + ": sem dados");
            return el("div", {key:ex, style:{marginBottom:8}},
              el("div", {style:{display:"flex", justifyContent:"space-between", fontSize:11, marginBottom:3}},
                el("span", {style:{fontWeight:700}}, ex),
                el("span", {style:{fontWeight:600, color:T.muted}}, "média " + v.media + " · máx " + v.max + " · n=" + v.n)
              ),
              el("div", {style:{height:8, background:"#EDF2F7", borderRadius:4}},
                el("div", {style:{height:"100%", width:(v.media/maxE1rm*100)+"%", background:T.accent, borderRadius:4}})
              )
            );
          })
        )
      ),
      el(Section, {title:"Distribuição por posição", subtitle:atletasFiltrados.length + " atletas"},
        porPosicao.length === 0
          ? el("div", {style:{padding:"20px 0", textAlign:"center", color:T.muted, fontSize:11}}, "Nenhum atleta na categoria")
          : el("div", null, ...porPosicao.map(([pos, qtd]) =>
              el(BarRow, {key:pos, label:pos, value:qtd, max:maxPosicao, color:"#4A5568"})
            ))
      )
    ),

    // === Widget de evolução histórica ===
    (() => {
      // Seletor de atleta: só atletas da categoria filtrada
      const atletasComSnapshot = atletasFiltrados.filter(a =>
        (snapshots || []).some(s => s.athlete_id === a.id)
      );
      // Atleta selecionado (default: primeiro com snapshot)
      const atletaId = evolAtleta || (atletasComSnapshot[0] && atletasComSnapshot[0].id) || "";
      const atleta = athletes.find(a => a.id === atletaId);
      const serie = (snapshots || [])
        .filter(s => s.athlete_id === atletaId && s.exercise === evolExercicio)
        .sort((a,b) => a.session_date.localeCompare(b.session_date));

      const metricLabel = evolMetric === "e1rm" ? "e1RM (kg)"
        : evolMetric === "mean_power" ? "Potência média (W)"
        : "Velocidade média (m/s)";

      // Constrói SVG linha simples
      const w = 700, h = 220, pl = 50, pr = 20, pt = 20, pb = 40;
      const iw = w - pl - pr, ih = h - pt - pb;
      const values = serie.map(s => s[evolMetric]).filter(v => v != null && !isNaN(v));
      const vMin = values.length ? Math.min(...values) : 0;
      const vMax = values.length ? Math.max(...values) : 1;
      const vRange = vMax - vMin || 1;
      const xFor = i => pl + (serie.length > 1 ? (i / (serie.length - 1)) * iw : iw/2);
      const yFor = v => pt + ih - ((v - vMin) / vRange) * ih;

      return el(Section, {
        title: "Evolução do atleta",
        subtitle: serie.length < 2 ? "Precisa de pelo menos 2 sessões pra desenhar linha (acumulando dados)" : serie.length + " sessão(ões) registrada(s)"
      },
        // Controles
        el("div", {style:{display:"flex", gap:8, marginBottom:14, flexWrap:"wrap"}},
          el("select", {value:atletaId, onChange:e=>setEvolAtleta(e.target.value), style:{
            padding:"5px 8px", borderRadius:6, border:"1px solid "+T.border, fontSize:11, fontWeight:600, minWidth:180
          }},
            atletasComSnapshot.length === 0
              ? el("option", {value:""}, "Sem dados históricos")
              : atletasComSnapshot.map(a => el("option", {key:a.id, value:a.id}, a.nickname || a.name))
          ),
          el("select", {value:evolExercicio, onChange:e=>setEvolExercicio(e.target.value), style:{
            padding:"5px 8px", borderRadius:6, border:"1px solid "+T.border, fontSize:11, fontWeight:600
          }}, ...["Back Squat","Trap Bar Deadlift","Hip Thrust"].map(x => el("option",{key:x,value:x},x))),
          el("select", {value:evolMetric, onChange:e=>setEvolMetric(e.target.value), style:{
            padding:"5px 8px", borderRadius:6, border:"1px solid "+T.border, fontSize:11, fontWeight:600
          }},
            el("option",{value:"e1rm"},"e1RM"),
            el("option",{value:"mean_power"},"Potência média"),
            el("option",{value:"mean_velocity"},"Velocidade média")
          )
        ),
        // Gráfico
        atleta && serie.length >= 2 && values.length >= 2
          ? el("svg", {viewBox:"0 0 "+w+" "+h, style:{width:"100%", height:"auto", maxHeight:280}},
              // Eixo Y (3 linhas de referência)
              [0, 0.5, 1].map((f,i) => {
                const v = vMin + f * vRange;
                const y = yFor(v);
                return el("g", {key:i},
                  el("line", {x1:pl, y1:y, x2:w-pr, y2:y, stroke:"#E2E8F0", strokeWidth:1}),
                  el("text", {x:pl-6, y:y+3, fontSize:10, fill:"#718096", textAnchor:"end"}, v.toFixed(evolMetric==="mean_velocity"?2:0))
                );
              }),
              // Linha
              el("polyline", {
                points: serie.filter(s => s[evolMetric] != null).map((s,i) => xFor(i) + "," + yFor(s[evolMetric])).join(" "),
                fill:"none", stroke:T.accent, strokeWidth:2.5
              }),
              // Pontos
              serie.map((s, i) => s[evolMetric] != null && el("circle", {
                key:i, cx:xFor(i), cy:yFor(s[evolMetric]), r:4, fill:T.accent
              })),
              // Labels do eixo X (data)
              serie.length <= 10
                ? serie.map((s,i) => el("text", {
                    key:"lbl"+i, x:xFor(i), y:h-pb+18, fontSize:9, fill:"#4A5568", textAnchor:"middle"
                  }, s.session_date.slice(5).replace("-","/")))
                : [serie[0], serie[Math.floor(serie.length/2)], serie[serie.length-1]].map((s,i) => {
                    const idx = i === 0 ? 0 : i === 1 ? Math.floor(serie.length/2) : serie.length-1;
                    return el("text", {
                      key:"lbl"+i, x:xFor(idx), y:h-pb+18, fontSize:9, fill:"#4A5568", textAnchor:"middle"
                    }, s.session_date.slice(5).replace("-","/"));
                  })
            )
          : el("div", {style:{padding:"30px 20px", textAlign:"center", color:T.muted, fontSize:11, background:"#F7FAFC", borderRadius:8}},
              atletasComSnapshot.length === 0
                ? "Nenhum atleta desta categoria tem sessões registradas ainda. Importe CSV Output pra começar a acumular histórico."
                : "Selecione outro exercício ou aguarde mais sessões (mínimo 2 para desenhar linha)."),
        // Rodapé com métrica atual
        atleta && values.length >= 1 && el("div", {style:{fontSize:10, color:T.muted, marginTop:8, textAlign:"right"}},
          metricLabel + " · mín " + vMin.toFixed(evolMetric==="mean_velocity"?2:0) + " · máx " + vMax.toFixed(evolMetric==="mean_velocity"?2:0))
      );
    })(),

    // Rodapé com nota
    el("div", {style:{textAlign:"center", fontSize:10, color:T.muted, padding:"4px 0"}},
      "Categoria \"Todas\" mostra microciclo do Profissional. Selecione uma categoria específica para ver os dados dela.")
  );
}



// Cores dos grupos (extensível — grupos não mapeados usam cinza)
const GRUPO_COLORS = {
  "G1": "#2563EB", "G2": "#38A169", "G3": "#D69E2E", "G4": "#805AD5",
  "DM": "#C53030", "RTP": "#DD6B20",
  "Fisio": "#EC4899", "Sel": "#0891B2", "Mercado": "#4B5563",
  "Ausentes": "#64748B", "Sem grupo": "#94A3B8"
};
const grupoColor = (nome) => GRUPO_COLORS[nome] || "#64748B";
const grupoOrder = (nome) => {
  const order = ["G1","G2","G3","G4","DM","RTP"];
  const idx = order.indexOf(nome);
  if (idx >= 0) return idx;
  if (nome === "Ausentes") return 999;
  if (nome === "Sem grupo") return 998;
  return 100 + nome.charCodeAt(0);
};

// ═══════════════════════════════════════════════════════════════════════════
// PRESENÇA — importa planilha CAP, mostra atletas do dia agrupados por G1/G2/etc
// ═══════════════════════════════════════════════════════════════════════════
function PresencaView({ athletes, importPresenca, loadPresencaDia, updatePresenca }) {
  const el = React.createElement;
  const fileRef = useRef();
  const [importing, setImporting] = useState(false);
  const [dataConsulta, setDataConsulta] = useState(() => localDateStr(new Date()));
  const [registrosDia, setRegistrosDia] = useState([]);
  const [loadingDia, setLoadingDia] = useState(false);
  const [editing, setEditing] = useState(null);

  const carregarDia = React.useCallback(async (d) => {
    if (!d) return;
    setLoadingDia(true);
    try {
      const rows = await loadPresencaDia(d);
      setRegistrosDia(rows || []);
    } catch(e) { console.error("Erro ao carregar dia:", e); }
    setLoadingDia(false);
  }, [loadPresencaDia]);

  React.useEffect(() => { carregarDia(dataConsulta); }, [dataConsulta, carregarDia]);

  const handleUpload = async (e) => {
    const f = e.target.files[0];
    if (!f) return;
    setImporting(true);
    try {
      const text = await readCSVFileWithEncoding(f);
      const { records, stats } = parsePresencaCAP(text, athletes);
      if (records.length === 0) {
        alert("Nenhum registro válido no arquivo.\n\n" +
              "Total de linhas: " + stats.total +
              "\nIgnoradas: " + stats.ignoradas +
              "\nSem atleta correspondente: " + stats.semAtleta);
      } else {
        const result = await importPresenca(records, stats.datasAfetadas);
        let msg;
        if (result.inseridos === 0) {
          msg = "⚠️ NENHUM registro foi salvo no banco.\n\n" +
                "Foram enviados " + records.length + " registros mas todos falharam.\n" +
                "Formato de data detectado: " + stats.formatoDetectado + "\n" +
                "Abra o console (F12) e me manda o erro que aparece lá.\n\n";
          if (result.errosDetalhe.length) {
            msg += "Primeiros erros:\n" + result.errosDetalhe.slice(0,3).join('\n');
          }
        } else {
          msg = "Importação concluída:\n\n" +
                "• " + result.inseridos + " registros salvos\n" +
                "• " + stats.datasAfetadas.length + " dia(s) atualizado(s)\n" +
                "• Formato de data: " + stats.formatoDetectado;
          if (result.duplicatasRemovidas > 0) msg += "\n• " + result.duplicatasRemovidas + " duplicatas mescladas no import";
          if (result.falhas > 0) msg += "\n\n⚠️ " + result.falhas + " registros FALHARAM (ver console)";
        }
        if (stats.dataInvalida > 0) {
          msg += "\n\n" + stats.dataInvalida + " linha(s) com data inválida (fora do formato)";
        }
        if (stats.semAtleta > 0) {
          msg += "\n\n" + stats.semAtleta + " linhas com atleta não cadastrado:\n  " +
                 stats.naoEncontrados.slice(0, 5).join(", ") +
                 (stats.naoEncontrados.length > 5 ? " (+ " + (stats.naoEncontrados.length - 5) + " outros)" : "");
        }
        if (stats.ignoradas > 0) msg += "\n" + stats.ignoradas + " linha(s) inválida(s) ignoradas";
        alert(msg);
        await carregarDia(dataConsulta);
      }
    } catch(err) {
      alert("Erro ao processar planilha: " + err.message);
    }
    setImporting(false);
    e.target.value = '';
  };

  // Agrupa registros por grupo (aceita QUALQUER grupo do CSV, não só canônicos)
  const porGrupo = useMemo(() => {
    const g = {};
    registrosDia.forEach(r => {
      let key;
      if (r.status === 'ausente') key = 'Ausentes';
      else key = r.grupo || 'Sem grupo';
      if (!g[key]) g[key] = [];
      g[key].push(r);
    });
    return Object.entries(g)
      .map(([nome, items]) => ({ nome, items }))
      .sort((a, b) => grupoOrder(a.nome) - grupoOrder(b.nome));
  }, [registrosDia]);

  const atletaById = useMemo(() => {
    const m = {};
    athletes.forEach(a => { m[a.id] = a; });
    return m;
  }, [athletes]);

  return el("div", {style:{display:"flex",flexDirection:"column",flex:1,minHeight:0,overflowY:"auto",background:T.bg,padding:16,gap:14}},
    // Cabeçalho: upload + seletor de data
    el("div", {style:{display:"flex",alignItems:"center",gap:14,flexWrap:"wrap",padding:"12px 14px",background:T.card,borderRadius:10,border:"1px solid "+T.border}},
      el("input", {type:"file", accept:".csv", ref:fileRef, onChange:handleUpload, style:{display:"none"}}),
      el("button", {onClick: ()=>fileRef.current && fileRef.current.click(), disabled:importing, style:{
        padding:"8px 14px", borderRadius:8, border:"none",
        background: importing ? T.muted : T.accent, color:"#fff",

// Sparkline minúscula usando SVG puro (mais performática que Recharts pra 40px)
function Sparkline({ points, color, height, positive }) {
  const el = React.createElement;
  const W = 100, H = height || 32;
  const vals = points.filter(p => p != null);
  if (vals.length < 2) return el("div", { style: { height: H } });
  const vMin = Math.min(...vals), vMax = Math.max(...vals);
  const range = (vMax - vMin) || 1;
  const step = W / (vals.length - 1);
  const path = vals.map((v, i) => (i === 0 ? "M" : "L") + (i * step).toFixed(1) + " " + (H - ((v - vMin) / range) * H * 0.85 - H * 0.075).toFixed(1)).join(" ");
  const areaPath = path + " L" + W + " " + H + " L0 " + H + " Z";
  const c = color || (positive ? R.positive : R.negative);
  const gradId = "sparkGrad" + Math.random().toString(36).slice(2, 9);
  return el("svg", { width: "100%", height: H, viewBox: "0 0 " + W + " " + H, preserveAspectRatio: "none" },
    el("defs", null,
      el("linearGradient", { id: gradId, x1: 0, y1: 0, x2: 0, y2: 1 },
        el("stop", { offset: "0%", stopColor: c, stopOpacity: 0.25 }),
        el("stop", { offset: "100%", stopColor: c, stopOpacity: 0 })
      )
    ),
    el("path", { d: areaPath, fill: "url(#" + gradId + ")" }),
    el("path", { d: path, stroke: c, strokeWidth: 1.5, fill: "none", strokeLinejoin: "round", strokeLinecap: "round" })
  );
}
