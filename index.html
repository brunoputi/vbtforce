// DASHBOARD — visão consolidada com filtros de categoria e período
// ═══════════════════════════════════════════════════════════════════════════
function DashboardView({athletes, profiles, loadMonth, microDays}) {
  const el = React.createElement;
  const [cat, setCat] = useState("Todas");
  const [periodo, setPeriodo] = useState("30d"); // "7d" | "30d" | "90d"

  // Filtro de atletas por categoria
  const atletasFiltrados = useMemo(() => {
    if (cat === "Todas") return athletes.filter(a => a.status === "ativo");
    return athletes.filter(a => a.status === "ativo" && (a.categories || []).includes(cat));
  }, [athletes, cat]);

  // Range de datas
  const dateRange = useMemo(() => {
    const end = new Date();
    const start = new Date();
    const days = periodo === "7d" ? 7 : periodo === "30d" ? 30 : 90;
    start.setDate(start.getDate() - days);
    return { start, end, days };
  }, [periodo]);

  // Carrega os meses cobertos pelo range
  React.useEffect(() => {
    if (!loadMonth) return;
    const meses = new Set();
    const cur = new Date(dateRange.start);
    while (cur <= dateRange.end) {
      meses.add(cur.getFullYear() + "-" + cur.getMonth());
      cur.setDate(cur.getDate() + 15);
    }
    // Dashboard mostra dados da categoria "Profissional" por default (microciclo é por categoria)
    // Se categoria filtrada não for "Todas", usa ela
    const catMicro = cat === "Todas" ? "Profissional" : cat;
    meses.forEach(mk => {
      const [y, m] = mk.split("-").map(Number);
      loadMonth(y, m, catMicro);
    });
  }, [dateRange, cat, loadMonth]);

  // Filtra os dias do microciclo pelo range de datas
  const diasNoRange = useMemo(() => {
    const fmt = d => d.toISOString().slice(0,10);
    const startStr = fmt(dateRange.start);
    const endStr = fmt(dateRange.end);
    const result = [];
    Object.entries(microDays || {}).forEach(([date, dy]) => {
      if (date >= startStr && date <= endStr) result.push({ date, ...dy });
    });
    return result;
  }, [microDays, dateRange]);

  // Contagens de tipos de treino (soma das 3 janelas por dia)
  const contagem = useMemo(() => {
    const c = { campo: 0, academia: 0, corretivo: 0, fisio: 0, correr: 0, jogo: 0, folga: 0, viagem: 0, treinoTotal: 0 };
    diasNoRange.forEach(d => {
      ["am","pm","pn"].forEach(p => {
        const tipo = d[p + "_type"];
        if (!tipo) return;
        if (tipo === "jogo") c.jogo++;
        else if (tipo === "folga") c.folga++;
        else if (tipo === "viagem") c.viagem++;
        else if (tipo === "treino") {
          c.treinoTotal++;
          const acts = (d[p + "_activities"] || "").toLowerCase();
          if (acts.includes("campo")) c.campo++;
          if (acts.includes("academia")) c.academia++;
          if (acts.includes("correti")) c.corretivo++;
          if (acts.includes("fisio")) c.fisio++;
          if (acts.includes("corr")) c.correr++;
        }
      });
    });
    return c;
  }, [diasNoRange]);

  // Perfis VBT dos atletas filtrados: e1RM médio por exercício
  const e1rmPorExercicio = useMemo(() => {
    const result = {};
    ["Back Squat", "Trap Bar Deadlift", "Hip Thrust"].forEach(ex => {
      const valores = [];
      atletasFiltrados.forEach(a => {
        const prof = resolveProfile(a.name, profiles);
        const exProf = prof && prof[ex];
        if (exProf && exProf.e1rm && exProf.e1rm > 0) valores.push(exProf.e1rm);
      });
      const media = valores.length ? Math.round(valores.reduce((s,v)=>s+v,0) / valores.length) : 0;
      const max = valores.length ? Math.round(Math.max(...valores)) : 0;
      result[ex] = { media, max, n: valores.length };
    });
    return result;
  }, [atletasFiltrados, profiles]);

  // Distribuição por posição
  const porPosicao = useMemo(() => {
    const c = {};
    atletasFiltrados.forEach(a => {
      const p = a.position || "Sem posição";
      c[p] = (c[p] || 0) + 1;
    });
    return Object.entries(c).sort((a,b) => b[1] - a[1]);
  }, [atletasFiltrados]);

  // Total com perfil VBT
  const comPerfilVBT = atletasFiltrados.filter(a => resolveProfile(a.name, profiles)).length;

  // Componentes visuais
  const KpiCard = ({label, value, sub, color}) => el("div", {style:{
    background:T.card, border:"1px solid "+T.border, borderRadius:10, padding:"14px 16px",
    display:"flex", flexDirection:"column", gap:4, flex:1, minWidth:0
  }},
    el("div", {style:{fontSize:10, fontWeight:800, color:T.muted, textTransform:"uppercase", letterSpacing:".05em"}}, label),
    el("div", {style:{fontSize:26, fontWeight:900, color:color||T.text, lineHeight:1}}, value),
    sub && el("div", {style:{fontSize:11, color:T.muted, marginTop:2}}, sub)
  );

  const BarRow = ({label, value, max, color}) => {
    const pct = max > 0 ? (value / max) * 100 : 0;
    return el("div", {style:{marginBottom:6}},
      el("div", {style:{display:"flex", justifyContent:"space-between", fontSize:11, marginBottom:3}},
        el("span", {style:{fontWeight:700, color:T.text}}, label),
        el("span", {style:{fontWeight:600, color:T.muted}}, value)
      ),
      el("div", {style:{height:8, background:"#EDF2F7", borderRadius:4, overflow:"hidden"}},
        el("div", {style:{height:"100%", width:pct+"%", background:color||T.accent, borderRadius:4}})
      )
    );
  };

  const Section = ({title, subtitle, children}) => el("div", {style:{
    background:T.card, border:"1px solid "+T.border, borderRadius:10, padding:"14px 16px", minWidth:0
  }},
    el("div", {style:{marginBottom:12}},
      el("div", {style:{fontSize:12, fontWeight:800, color:T.text, letterSpacing:".02em"}}, title),
      subtitle && el("div", {style:{fontSize:10, color:T.muted, marginTop:2}}, subtitle)
    ),
    children
  );

  const maxTipoTreino = Math.max(contagem.campo, contagem.academia, contagem.corretivo, contagem.fisio, contagem.correr, 1);
  const maxPosicao = Math.max(...porPosicao.map(p => p[1]), 1);
  const maxE1rm = Math.max(...Object.values(e1rmPorExercicio).map(v => v.max), 1);

  const periodoLabel = periodo === "7d" ? "7 dias" : periodo === "30d" ? "30 dias" : "90 dias";
  const dataInicioLbl = dateRange.start.toLocaleDateString("pt-BR", {day:"2-digit",month:"2-digit"});
  const dataFimLbl = dateRange.end.toLocaleDateString("pt-BR", {day:"2-digit",month:"2-digit"});

  return el("div", {style:{display:"flex", flexDirection:"column", flex:1, minHeight:0, overflowY:"auto", background:T.bg, padding:16, gap:14}},
    // Filtros
    el("div", {style:{display:"flex", alignItems:"center", gap:12, flexWrap:"wrap"}},
      el("div", {style:{display:"flex", alignItems:"center", gap:6}},
        el("span", {style:{fontSize:10, fontWeight:700, color:T.muted, textTransform:"uppercase"}}, "Categoria"),
        el("select", {value:cat, onChange:e=>setCat(e.target.value), style:{
          padding:"6px 10px", borderRadius:7, border:"1.5px solid "+T.border,
          background:"#fff", fontSize:12, fontWeight:700, color:T.text, cursor:"pointer", outline:"none"
        }}, ...["Todas", ...CATEGORIES].map(c => el("option", {key:c, value:c}, c)))
      ),
      el("div", {style:{display:"flex", alignItems:"center", gap:6}},
        el("span", {style:{fontSize:10, fontWeight:700, color:T.muted, textTransform:"uppercase"}}, "Período"),
        ...["7d","30d","90d"].map(p => el("button", {key:p, onClick:()=>setPeriodo(p), style:{
          padding:"6px 12px", borderRadius:7, border:"1.5px solid "+(periodo===p?T.accent:T.border),
          background:periodo===p?"#EBF4FF":"#fff", color:periodo===p?T.accent:T.sub,
          fontSize:11, fontWeight:800, cursor:"pointer"
        }}, p === "7d" ? "7 dias" : p === "30d" ? "30 dias" : "90 dias"))
      ),
      el("div", {style:{marginLeft:"auto", fontSize:11, color:T.muted}},
        dataInicioLbl + " → " + dataFimLbl + " · " + atletasFiltrados.length + " atletas")
    ),

    // KPIs
    el("div", {style:{display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(150px, 1fr))", gap:10}},
      el(KpiCard, {label:"Atletas ativos", value:atletasFiltrados.length, sub:comPerfilVBT+" com perfil VBT"}),
      el(KpiCard, {label:"Treinos", value:contagem.treinoTotal, sub:"campo + academia + demais", color:"#2563EB"}),
      el(KpiCard, {label:"Jogos", value:contagem.jogo, sub:"no período", color:"#C53030"}),
      el(KpiCard, {label:"Folgas + Viagens", value:contagem.folga + contagem.viagem, sub:contagem.folga+" folga · "+contagem.viagem+" viagem", color:"#D97706"})
    ),

    // Grid principal
    el("div", {style:{display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(300px, 1fr))", gap:12}},
      el(Section, {title:"Tipos de treino no período", subtitle:"contagem por atividade nos treinos"},
        contagem.treinoTotal === 0
          ? el("div", {style:{padding:"20px 0", textAlign:"center", color:T.muted, fontSize:11}}, "Sem treinos registrados no período")
          : el("div", null,
              el(BarRow, {label:"Campo", value:contagem.campo, max:maxTipoTreino, color:"#38A169"}),
              el(BarRow, {label:"Academia", value:contagem.academia, max:maxTipoTreino, color:"#2563EB"}),
              el(BarRow, {label:"Corretivo", value:contagem.corretivo, max:maxTipoTreino, color:"#805AD5"}),
              el(BarRow, {label:"Fisio", value:contagem.fisio, max:maxTipoTreino, color:"#D69E2E"}),
              el(BarRow, {label:"Correr", value:contagem.correr, max:maxTipoTreino, color:"#DD6B20"})
            )
      ),
      el(Section, {title:"e1RM médio por exercício", subtitle:cat === "Todas" ? "média de todos ativos" : "média em " + cat},
        el("div", null,
          ...["Back Squat","Trap Bar Deadlift","Hip Thrust"].map(ex => {
            const v = e1rmPorExercicio[ex];
            if (v.n === 0) return el("div", {key:ex, style:{fontSize:11, color:T.muted, padding:"4px 0"}}, ex + ": sem dados");
            return el("div", {key:ex, style:{marginBottom:8}},
              el("div", {style:{display:"flex", justifyContent:"space-between", fontSize:11, marginBottom:3}},
                el("span", {style:{fontWeight:700}}, ex),
                el("span", {style:{fontWeight:600, color:T.muted}}, "média " + v.media + " · máx " + v.max + " · n=" + v.n)
              ),
              el("div", {style:{height:8, background:"#EDF2F7", borderRadius:4}},
                el("div", {style:{height:"100%", width:(v.media/maxE1rm*100)+"%", background:T.accent, borderRadius:4}})
              )
            );
          })
        )
      ),
      el(Section, {title:"Distribuição por posição", subtitle:atletasFiltrados.length + " atletas"},
        porPosicao.length === 0
          ? el("div", {style:{padding:"20px 0", textAlign:"center", color:T.muted, fontSize:11}}, "Nenhum atleta na categoria")
          : el("div", null, ...porPosicao.map(([pos, qtd]) =>
              el(BarRow, {key:pos, label:pos, value:qtd, max:maxPosicao, color:"#4A5568"})
            ))
      )
    ),

    // Rodapé com nota
    el("div", {style:{textAlign:"center", fontSize:10, color:T.muted, padding:"4px 0"}},
      "Categoria \"Todas\" mostra microciclo do Profissional. Selecione uma categoria específica para ver os dados dela.")
  );
}



function App() {
  const el = React.createElement;
  const [view, setView] = useState("dashboard");
  const [athletes, setAthletes] = useState([]);
  const [profiles, setProfiles] = useState({});
  const [bars, setBars] = useState({olympic_kg:20, trapbar_kg:30});
  const [microDays, setMicroDays] = useState({});
  const [dataLoaded, setDataLoaded] = useState(false);
  const [syncing, setSyncing] = useState(false);
  const [showBars, setShowBars] = useState(false);
  const [error, setError] = useState(null);

  // Load all data on mount
  useEffect(() => {
    (async () => {
      setSyncing(true);
      try {
        const ath = await api.get("athletes", "club_id=eq." + CLUB_ID + "&order=name");
        const profs = await api.get("vbt_profiles", "club_id=eq." + CLUB_ID + "&select=*,athletes(name)");
        const barsData = await api.get("bars_config", "club_id=eq." + CLUB_ID);

        setAthletes(ath || []);

        const pmap = {};
        (profs || []).forEach(p => {
          const name = p.athletes && p.athletes.name;
          if (!name) return;
          if (!pmap[name]) pmap[name] = {};
          pmap[name][p.exercise] = {
            reg: p.reg, reliable: p.reliable, e1rm: p.e1rm,
            maxLoad: p.max_load, maxMpv: p.max_mpv, nReps: p.n_reps,
            pts: p.pts || [], _id: p.id, _athlete_id: p.athlete_id
          };
        });
        setProfiles(pmap);

        if (barsData && barsData[0]) setBars(barsData[0]);

        // Load inicial de microciclo v2 é sob demanda (loadMonth via MicrocycleView)
        setDataLoaded(true);
      } catch (e) {
        console.error("Load error:", e);
        setError(e.message);
      }
      setSyncing(false);
    })();
  }, []);

  // CRUD operations
  const saveAthlete = async (data) => {
    setSyncing(true);
    const body = {
      name: data.name, nickname: data.nickname || null,
      dob: data.dob || null, position: data.position || null,
      categories: data.categories || [], status: data.status || "ativo",
      photo_url: data.photo || null,
      body_weight: data.body_weight != null ? data.body_weight : null,
      height_cm: data.height_cm != null ? data.height_cm : null,
      club_id: CLUB_ID
    };

    if (data.id) {
      const res = await api.patch("athletes", "id", data.id, body);
      if (res && res[0]) setAthletes(a => a.map(x => x.id === data.id ? res[0] : x));
    } else {
      const res = await api.post("athletes", body);
      if (res && res[0]) setAthletes(a => [...a, res[0]]);
    }
    setSyncing(false);
  };

  const deleteAthlete = async (id) => {
    setSyncing(true);
    await api.del("athletes", id);
    setAthletes(a => a.filter(x => x.id !== id));
    setSyncing(false);
  };

  // CSV import: takes parsed profiles + athletes, saves to Supabase
  const saveProfiles = async (newProfilesMap, athletesList) => {
    setSyncing(true);
    const updatedProfiles = {...profiles};

    for (const [name, exMap] of Object.entries(newProfilesMap)) {
      // Find athlete by name (exact match — fuzzy was already done in parseCSV)
      const athlete = athletesList.find(a => a.name === name);
      if (!athlete) {
        console.warn("Athlete not found for profile:", name);
        continue;
      }

      for (const [ex, newProf] of Object.entries(exMap)) {
        // Merge with existing points if any
        const existing = updatedProfiles[name] && updatedProfiles[name][ex];
        let finalProf = newProf;
        if (existing) {
          const existingPts = existing.pts || [];
          const newPts = newProf.pts || [];
          const seen = new Set(existingPts.map(p => p.load + "_" + p.mpv.toFixed(3)));
          const added = newPts.filter(p => !seen.has(p.load + "_" + p.mpv.toFixed(3)));
          const allPts = [...existingPts, ...added];
          finalProf = buildProfile(allPts, ex);
        }

        const body = {
          athlete_id: athlete.id,
          club_id: CLUB_ID,
          exercise: ex,
          pts: finalProf.pts,
          reg: finalProf.reg,
          reliable: finalProf.reliable,
          e1rm: finalProf.e1rm,
          max_load: finalProf.maxLoad,
          max_mpv: finalProf.maxMpv,
          n_reps: finalProf.nReps,
          updated_at: new Date().toISOString()
        };

        const res = await api.upsert("vbt_profiles", body, "athlete_id,exercise");
        if (res && res[0]) {
          if (!updatedProfiles[name]) updatedProfiles[name] = {};
          updatedProfiles[name][ex] = {
            ...finalProf,
            _id: res[0].id,
            _athlete_id: athlete.id
          };
        }
      }
    }

    setProfiles(updatedProfiles);
    setSyncing(false);
  };

  const saveBars = async (newBars) => {
    setBars(newBars);
    await api.upsert("bars_config", {...newBars, club_id: CLUB_ID, updated_at: new Date().toISOString()}, "club_id");
  };

  // Debounce map: dateStr -> timeoutId
  const mv2SaveTimersRef = React.useRef({});
  const mv2LastCatRef = React.useRef(null);
  const [selectedCategoria, setSelectedCategoria] = useState('Profissional');

  const saveMicroDay = (dateStr, dayData) => {
    // Estado local imediato (UI reativa)
    setMicroDays(prev => ({ ...prev, [dateStr]: dayData }));
    // Debounce da chamada ao Supabase
    const timers = mv2SaveTimersRef.current;
    const cat = selectedCategoria;
    if (timers[dateStr]) clearTimeout(timers[dateStr]);
    timers[dateStr] = setTimeout(async () => {
      try {
        await mv2_saveDia(dateStr, dayData, cat);
      } catch(e) { console.error("Erro ao salvar dia " + dateStr + ":", e); }
      delete timers[dateStr];
    }, 400);
  };

  // Carrega os 42 dias visíveis no calendário de um mês, filtrados por categoria
  const loadMonth = React.useCallback(async (year, month0, categoria) => {
    const cat = categoria || 'Profissional';
    // Range = primeira segunda da grid ao último domingo (42 dias)
    const first = new Date(year, month0, 1);
    const startDay = first.getDay() === 0 ? 6 : first.getDay() - 1;
    const rangeStart = new Date(year, month0, 1 - startDay);
    const rangeEnd = new Date(rangeStart);
    rangeEnd.setDate(rangeEnd.getDate() + 41);
    const fmt = d => d.toISOString().slice(0,10);
    try {
      const dias = await mv2_loadDiasRange(fmt(rangeStart), fmt(rangeEnd), cat);
      // Se categoria mudou, resetar tudo antes de mesclar (evita ver dados de outra categoria)
      if (mv2LastCatRef.current !== cat) {
        mv2LastCatRef.current = cat;
        setMicroDays(dias);
      } else {
        setMicroDays(prev => ({ ...prev, ...dias }));
      }
    } catch(e) { console.error("Erro ao carregar mês:", e); }
  }, []);

  // Expose for fuzzy lookup
  window._vbtProfiles = profiles;

  const TABS = [
    {id: "dashboard", icon: "📈", label: "Início"},
    {id: "session",  icon: "⚡", label: "Sessão"},
    {id: "micro",    icon: "📅", label: "Microciclo"},
    {id: "athletes", icon: "👤", label: "Atletas"},
    {id: "profiles", icon: "📊", label: "Perfis LV"}
  ];

  return el("div", {style: {fontFamily: "'Inter',system-ui,sans-serif", background: T.bg, height: "100vh", display: "flex", flexDirection: "column"}},
    // Nav bar
    el("nav", {style: {display: "flex", alignItems: "center", padding: "0 18px", height: 50, background: "#fff", boxShadow: "0 1px 3px rgba(0,0,0,0.06)", flexShrink: 0, gap: 4}},
      el("div", {style: {fontWeight: 900, fontSize: 15, letterSpacing: "-.03em", marginRight: 14, color: T.text}},
        "VBT", el("span", {style: {color: T.accent}}, "·"), "force"
      ),
      ...TABS.map(t => el("button", {key: t.id, onClick: () => setView(t.id),
        style: {
          padding: "5px 13px", borderRadius: 8, border: "none", fontSize: 13, cursor: "pointer",
          background: view === t.id ? "#EBF4FF" : "transparent",
          color: view === t.id ? T.accent : T.sub,
          fontWeight: view === t.id ? 700 : 400,
          display: "flex", alignItems: "center", gap: 5
        }},
        el("span", null, t.icon),
        el("span", {className: "tab-label"}, t.label)
      )),
      el("div", {style: {marginLeft: "auto", display: "flex", alignItems: "center", gap: 8}},
        el("button", {onClick: () => setShowBars(true),
          style: {
            display: "flex", alignItems: "center", gap: 5, padding: "4px 10px", borderRadius: 6,
            border: "1px solid " + T.border, background: "#fff", color: T.sub,
            fontSize: 11, fontWeight: 700, cursor: "pointer"
          }},
          "🏋️ OL " + bars.olympic_kg + "kg · TB " + bars.trapbar_kg + "kg"
        ),
        syncing && el("span", {style: {fontSize: 11, color: T.muted}}, "⟳"),
        el("div", {style: {display: "flex", alignItems: "center", gap: 5, padding: "4px 9px",
          borderRadius: 6, background: "#F0FFF4", border: "1px solid #9AE6B4"}, title: "Supabase conectado"},
          el("div", {style: {width: 6, height: 6, borderRadius: "50%", background: "#38A169"}}),
          el("span", {style: {fontSize: 11, color: "#2F855A", fontWeight: 700}},
            athletes.filter(a => a.status === "ativo").length + " ativos · " + Object.keys(profiles).length + " perfis"
          )
        )
      )
    ),

    // Content
    el("div", {style: {flex: 1, overflow: "hidden", display: "flex", flexDirection: "column", minHeight: 0}},
      error && el("div", {style: {padding: "10px 20px", background: "#FFF5F5", color: "#C53030", fontSize: 13}}, "Erro: " + error),
      !dataLoaded && el(Spinner),
      dataLoaded && view === "dashboard" && el(DashboardView, {athletes, profiles, loadMonth, microDays}),
      dataLoaded && view === "session"  && el(SessionView,  {athletes, profiles, bars}),
      dataLoaded && view === "micro"    && el(MicrocycleView, {microDays, saveMicroDay, loadMonth, selectedCategoria, setSelectedCategoria}),
      dataLoaded && view === "athletes" && el(AthletesView, {athletes, setAthletes, profiles, setProfiles, saveAthlete, deleteAthlete, saveProfiles}),
      dataLoaded && view === "profiles" && el(ProfilesView, {athletes, profiles})
    ),

    // Mobile bottom nav
    el("div", {className: "mobile-nav", style: {display: "none", borderTop: "1px solid " + T.border, background: "#fff", padding: "6px 0"}},
      ...TABS.map(t => el("button", {key: t.id, onClick: () => setView(t.id),
        style: {
          flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 2,
          padding: "5px 0", border: "none", background: "none", cursor: "pointer",
          color: view === t.id ? T.accent : T.muted
        }},
        el("span", {style: {fontSize: 20}}, t.icon),
        el("span", {style: {fontSize: 10, fontWeight: 700}}, t.label)
      ))
    ),

    showBars && el(BarsModal, {bars, setBars: saveBars, onClose: () => setShowBars(false)})
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));

</script>
</body>
</html>
