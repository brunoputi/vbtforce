const headers = () => ({
  "apikey": SUPA_KEY,
  "Authorization": "Bearer " + SUPA_KEY,
  "Content-Type": "application/json",
  "Prefer": "return=representation"
});

const api = {
  async get(table, query) {
    try {
      const url = SUPA_URL + "/rest/v1/" + table + (query ? "?" + query : "");
      const r = await fetch(url, { headers: headers() });
      if (!r.ok) { console.error("GET", table, r.status, await r.text()); return []; }
      return r.json();
    } catch(e) { console.error("GET error:", e); return []; }
  },
  async post(table, body) {
    try {
      const r = await fetch(SUPA_URL + "/rest/v1/" + table, {
        method: "POST", headers: headers(), body: JSON.stringify(body)
      });
      if (!r.ok) { console.error("POST", table, r.status, await r.text()); return null; }
      return r.json();
    } catch(e) { console.error("POST error:", e); return null; }
  },
  async patch(table, col, val, body) {
    try {
      const r = await fetch(SUPA_URL + "/rest/v1/" + table + "?" + col + "=eq." + val, {
        method: "PATCH", headers: headers(), body: JSON.stringify(body)
      });
      if (!r.ok) { console.error("PATCH", table, r.status, await r.text()); return null; }
      return r.json();
    } catch(e) { console.error("PATCH error:", e); return null; }
  },
  async upsert(table, body, onConflict) {
    try {
      const h = {...headers(), "Prefer": "resolution=merge-duplicates,return=representation"};
      const url = SUPA_URL + "/rest/v1/" + table + (onConflict ? "?on_conflict=" + onConflict : "");
      const r = await fetch(url, { method: "POST", headers: h, body: JSON.stringify(body) });
      if (!r.ok) { console.error("UPSERT", table, r.status, await r.text()); return null; }
      return r.json();
    } catch(e) { console.error("UPSERT error:", e); return null; }
  },
  async del(table, id) {
    try {
      await fetch(SUPA_URL + "/rest/v1/" + table + "?id=eq." + id, {
        method: "DELETE", headers: headers()
      });
    } catch(e) { console.error("DEL error:", e); }
  }
};

// MICROCICLO V2 — API
// ═══════════════════════════════════════════════════════════════════════════
const apiV2 = {
  async getMesociclo(id) {
    const r = await api.get('mesociclo', 'id=eq.' + id);
    return r[0] || null;
  },
  async listMesociclos(temporada, categoria) {
    let q = 'temporada=eq.' + temporada + '&order=data_inicio.asc';
    if (categoria) q += '&categoria_id=eq.' + encodeURIComponent(categoria);
    return api.get('mesociclo', q);
  },
  async createMesociclo(payload) {
    const r = await api.post('mesociclo', payload);
    return r && r[0];
  },
  async createMicrociclo({ mesociclo_id, semana_numero }) {
    const meso = await apiV2.getMesociclo(mesociclo_id);
    if (!meso) throw new Error('Mesociclo nao encontrado.');
    const r = await api.post('microciclo', {
      mesociclo_id, semana_numero,
      fase: meso.fase, carga_alvo: meso.carga_alvo,
      overridden: false, override_reason: null
    });
    return r && r[0];
  },
  async listMicrociclos(mesociclo_id) {
    return api.get('microciclo', 'mesociclo_id=eq.' + mesociclo_id + '&order=semana_numero.asc');
  },
  async updateMicrocicloField(microciclo_id, campo, valor, override_reason = null) {
    if (!['fase','carga_alvo'].includes(campo)) throw new Error('Campo nao overridable.');
    const micro = await api.get('microciclo', 'id=eq.' + microciclo_id);
    if (!micro[0]) throw new Error('Microciclo nao encontrado.');
    const meso = await apiV2.getMesociclo(micro[0].mesociclo_id);
    const divergiu = valor !== meso[campo];
    if (divergiu && (!override_reason || !override_reason.trim())) {
      throw new Error('override_reason obrigatorio ao divergir do mesociclo.');
    }
    const r = await api.patch('microciclo', 'id', microciclo_id, {
      [campo]: valor,
      overridden: divergiu,
      override_reason: divergiu ? override_reason.trim() : null
    });
    return r && r[0];
  },
  async listDiasDoMicrociclo(microciclo_id) {
    return api.get('dia', 'microciclo_id=eq.' + microciclo_id + '&select=*,jogo(*)&order=data.asc');
  },
  async upsertPeriodoDoDia(microciclo_id, data_dia, periodo, conteudo) {
    if (!['periodo_manha','periodo_tarde'].includes(periodo)) throw new Error('Periodo invalido.');
    const existente = await api.get('dia', 'microciclo_id=eq.' + microciclo_id + '&data=eq.' + data_dia);
    const atual = existente[0] || { periodo_manha: {}, periodo_tarde: {} };
    const payload = {
      microciclo_id, data: data_dia,
      periodo_manha: periodo === 'periodo_manha' ? conteudo : atual.periodo_manha,
      periodo_tarde: periodo === 'periodo_tarde' ? conteudo : atual.periodo_tarde
    };
    const r = await api.upsert('dia', payload, 'microciclo_id,data');
    return r && r[0];
  },
  async upsertGrupoNoPeriodo(microciclo_id, data_dia, periodo, grupo) {
    const existente = await api.get('dia', 'microciclo_id=eq.' + microciclo_id + '&data=eq.' + data_dia);
    const atual = (existente[0] && existente[0][periodo]) || { tipo: 'treino', grupos: [] };
    const grupos = atual.grupos || [];
    const idx = grupos.findIndex(g => g.categoria === grupo.categoria);
    const novos = idx >= 0
      ? grupos.map((g,i) => i === idx ? { ...g, ...grupo } : g)
      : [...grupos, grupo];
    return apiV2.upsertPeriodoDoDia(microciclo_id, data_dia, periodo, { ...atual, grupos: novos });
  },
  async upsertJogo(dia_id, periodo, dados) {
    const r = await api.upsert('jogo', { dia_id, periodo, ...dados }, 'dia_id,periodo');
    return r && r[0];

      method: 'DELETE', headers: headers()

  }
};

// Regra de semana: começa na segunda. Semana pertence ao mês em que cai a segunda.

function mv2_getMonday(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const dow = d.getDay(); // 0=dom
  const diff = dow === 0 ? -6 : 1 - dow;
  d.setDate(d.getDate() + diff);
  return d.toISOString().slice(0,10);
}
function mv2_getWeekMonthKey(dateStr) {
  return mv2_getMonday(dateStr).slice(0,7); // "YYYY-MM"
}
function mv2_getSemanaNumero(dateStr) {
  const monday = mv2_getMonday(dateStr);
  const [y, mo] = monday.split('-').map(Number);
  const first = new Date(y, mo-1, 1, 12);
  const dow0 = first.getDay();
  const firstMondayDay = dow0 === 1 ? 1 : ((8 - dow0) % 7 || 7);
  const mondayDay = new Date(monday + 'T12:00:00').getDate();
  return Math.max(1, Math.floor((mondayDay - firstMondayDay) / 7) + 1);
}
function mv2_monthKey(year, month0) {
  return year + '-' + String(month0+1).padStart(2,'0');
}
function mv2_monthName(monthKey) {
  const [y, m] = monthKey.split('-').map(Number);
  return new Date(y, m-1, 1).toLocaleDateString('pt-BR', {month:'long', year:'numeric'});
}

// Caches em memória (não persistentes; recarregam ao dar F5)
const mv2_mesocicloCache = {}; // "categoria/YYYY-MM" -> mesociclo
const mv2_microcicloCache = {}; // "mesocicloId/semana" -> microciclo (mesocicloId já é único por categoria)

async function mv2_ensureMesociclo(monthKey, categoria) {
  const cat = categoria || 'Profissional';
  const cacheKey = cat + '/' + monthKey;
  if (mv2_mesocicloCache[cacheKey]) return mv2_mesocicloCache[cacheKey];
  const [y, mo] = monthKey.split('-').map(Number);
  const temporada = String(y);
  const dataInicio = monthKey + '-01';
  const lastDay = new Date(y, mo, 0).getDate();
  const dataFim = monthKey + '-' + String(lastDay).padStart(2,'0');
  const existentes = await apiV2.listMesociclos(temporada, cat);
  const found = existentes.find(m => m.data_inicio === dataInicio);
  if (found) { mv2_mesocicloCache[cacheKey] = found; return found; }
  const novo = await apiV2.createMesociclo({
    nome: mv2_monthName(monthKey),
    fase: 'in_season', carga_alvo: 'moderada',
    data_inicio: dataInicio, data_fim: dataFim, temporada,
    categoria_id: cat
  });
  mv2_mesocicloCache[cacheKey] = novo;
  return novo;
}

async function mv2_ensureMicrociclo(dateStr, categoria) {
  const cat = categoria || 'Profissional';
  const monthKey = mv2_getWeekMonthKey(dateStr);
  const semanaNumero = mv2_getSemanaNumero(dateStr);
  const meso = await mv2_ensureMesociclo(monthKey, cat);
  const key = meso.id + '/' + semanaNumero;
  if (mv2_microcicloCache[key]) return mv2_microcicloCache[key];
  const existentes = await apiV2.listMicrociclos(meso.id);
  const found = existentes.find(m => m.semana_numero === semanaNumero);
  if (found) { mv2_microcicloCache[key] = found; return found; }
  const novo = await apiV2.createMicrociclo({ mesociclo_id: meso.id, semana_numero: semanaNumero });
  mv2_microcicloCache[key] = novo;
  return novo;
}

// Converte um período flat (am_* ou pm_* ou pn_*) em objeto jsonb
function mv2_flatToPeriodo(flat, p) {
  const tipo = flat[p + '_type'] || null;
  if (!tipo) return {};
  const o = { tipo };
  // Campos comuns a qualquer tipo: planos anexados (array)
  const planos = flat[p + '_planos'];
  if (Array.isArray(planos) && planos.length > 0) {
    o.planos = planos;
  }
  if (tipo === 'jogo' || tipo === 'folga' || tipo === 'viagem') return o;
  // Treino: campos específicos
  const grupos = flat[p + '_groups'];
  if (grupos !== undefined && grupos !== null) o.grupos = grupos;
  if (flat[p + '_activities']) o.atividades = flat[p + '_activities'];
  if (flat[p + '_methodology']) o.metodologia = flat[p + '_methodology'];
  if (flat[p + '_duration']) o.duracao = flat[p + '_duration'];
  if (flat[p + '_zone_id']) o.zone_id = flat[p + '_zone_id'];
  if (flat[p + '_zone_label']) o.zone_label = flat[p + '_zone_label'];
  if (flat[p + '_series']) o.series = flat[p + '_series'];
  if (flat[p + '_reps']) o.reps = flat[p + '_reps'];
  return o;
}

// Mapa: chave no jsonb dia -> prefixo flat
const MV2_PERIOD_MAP = [
  { db: 'manha', flat: 'am' },
  { db: 'tarde', flat: 'pm' },
  { db: 'noite', flat: 'pn' }
];

function mv2_nestedToFlat(dia) {
  const flat = {};
  if (dia.notas) flat.notes = dia.notas;
  MV2_PERIOD_MAP.forEach(({db, flat: p}) => {
    const o = dia['periodo_' + db] || {};
    if (!o || !o.tipo) return;
    flat[p + '_type'] = o.tipo;
    // Planos anexados (formato novo: array)
    if (Array.isArray(o.planos) && o.planos.length > 0) {
      flat[p + '_planos'] = o.planos;
    } else if (o.plano_url) {
      // Compatibilidade retroativa: converte formato antigo em array de 1 item
      flat[p + '_planos'] = [{
        url: o.plano_url,
        path: o.plano_path,
        filename: o.plano_filename,
        size: o.plano_size
      }];
    }
    if (o.tipo === 'treino') {
      if (o.grupos !== undefined) flat[p + '_groups'] = o.grupos;
      if (o.atividades) flat[p + '_activities'] = o.atividades;
      if (o.metodologia) flat[p + '_methodology'] = o.metodologia;
      if (o.duracao) flat[p + '_duration'] = o.duracao;
      if (o.zone_id) flat[p + '_zone_id'] = o.zone_id;
      if (o.zone_label) flat[p + '_zone_label'] = o.zone_label;
      if (o.series) flat[p + '_series'] = o.series;
      if (o.reps) flat[p + '_reps'] = o.reps;
    }
  });
  (dia.jogo || []).forEach(j => {
    const m = MV2_PERIOD_MAP.find(x => x.db === j.periodo);
    if (!m) return;
    const p = m.flat;
    flat[p + '_type'] = 'jogo';
    if (j.adversario) flat[p + '_opponent'] = j.adversario;
    if (j.placar) flat[p + '_score'] = j.placar;
    if (j.competicao) flat[p + '_competition'] = j.competicao;
    if (j.mando) flat[p + '_game_location'] = j.mando === 'casa' ? 'Casa' : 'Fora';
  });
  return flat;
}

// Carrega dias por range de datas [firstDate, lastDate], inclusive
async function mv2_loadDiasRange(firstDate, lastDate, categoria) {
  const cat = categoria || 'Profissional';
  const rows = await api.get('dia',
    'data=gte.' + firstDate + '&data=lte.' + lastDate +
    '&microciclo.mesociclo.categoria_id=eq.' + encodeURIComponent(cat) +
    '&select=*,jogo(*),microciclo!inner(mesociclo!inner(categoria_id))' +
    '&order=data.asc');
  const result = {};
  (rows || []).forEach(d => { result[d.data] = mv2_nestedToFlat(d); });
  return result;
}

// Upload de plano de treino no Supabase Storage
async function mv2_uploadPlano(dateStr, period, file) {
  const ext = (file.name.split('.').pop() || 'bin').toLowerCase();
  const periodoDb = period === 'am' ? 'manha' : period === 'pm' ? 'tarde' : 'noite';
  // Timestamp no path evita colisão quando há múltiplos arquivos por período
  const path = dateStr + '/' + periodoDb + '/' + Date.now() + '.' + ext;
  const res = await fetch(SUPA_URL + '/storage/v1/object/microciclo-planos/' + path, {
    method: 'POST',
    headers: {
      'apikey': SUPA_KEY,
      'Authorization': 'Bearer ' + SUPA_KEY,
      'Content-Type': file.type || 'application/octet-stream'
    },
    body: file
  });
  if (!res.ok) throw new Error('Upload falhou: ' + res.status + ' ' + await res.text());
  return {
    path,
    url: SUPA_URL + '/storage/v1/object/public/microciclo-planos/' + path,
    filename: file.name,
    size: file.size
  };
}

async function mv2_deletePlano(path) {
  const res = await fetch(SUPA_URL + '/storage/v1/object/microciclo-planos/' + path, {
    method: 'DELETE',
    headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY }
  });
  if (!res.ok && res.status !== 404) throw new Error('Delete falhou: ' + res.status);
}

// Persiste um dia inteiro (upsert em `dia`, upsert/delete em `jogo` conforme necessário)
async function mv2_saveDia(dateStr, flat, categoria) {
  const micro = await mv2_ensureMicrociclo(dateStr, categoria);
  const payload = {
    microciclo_id: micro.id,
    data: dateStr,
    periodo_manha: mv2_flatToPeriodo(flat, 'am'),
    periodo_tarde: mv2_flatToPeriodo(flat, 'pm'),
    periodo_noite: mv2_flatToPeriodo(flat, 'pn'),
    notas: flat.notes || null
  };
  const rDia = await api.upsert('dia', payload, 'microciclo_id,data');
  const diaId = (rDia && rDia[0] && rDia[0].id) || null;
  if (!diaId) throw new Error('Falha ao upsertar dia ' + dateStr);
  for (const m of MV2_PERIOD_MAP) {
    const p = m.flat;
    if (flat[p + '_type'] === 'jogo') {
      const mandoRaw = flat[p + '_game_location'];
      const dados = {
        adversario: flat[p + '_opponent'] || '(a definir)',
        placar: flat[p + '_score'] || null,
        competicao: flat[p + '_competition'] || null,
        mando: mandoRaw === 'Fora' ? 'fora' : 'casa',
        escudo_url: null
      };
      await apiV2.upsertJogo(diaId, m.db, dados);
    } else {
      await apiV2.deleteJogo(diaId, m.db);
    }
  }
  return diaId;
}

// ── Math ─────────────────────────────────────────────────────────────────────
function linReg(xs, ys) {
  const n = xs.length;
  if (n < 5 || new Set(xs).size < 3) return null;
  const mx = xs.reduce((a,b)=>a+b)/n, my = ys.reduce((a,b)=>a+b)/n;
  let num=0, den=0;
  xs.forEach((x,i)=>{ num+=(x-mx)*(ys[i]-my); den+=(x-mx)**2; });
  if (!den) return null;
  const slope=num/den, intercept=my-slope*mx;
  let sr=0, st=0;
  xs.forEach((x,i)=>{ sr+=(ys[i]-(intercept+slope*x))**2; st+=(ys[i]-my)**2; });
  return { slope, intercept, r2: st?+(1-sr/st).toFixed(3):0 };
}

function loadAtVel(reg, vel) {
  if (!reg || reg.slope >= 0) return null;
  const l = (vel - reg.intercept) / reg.slope;
  return (l>20 && l<400) ? l : null;
}

function roundToPlates(load, barW) {
  if (!load || load <= barW) return barW;
  const perSide = (load - barW) / 2;
  const rounded = Math.round(perSide / 5) * 5;
  return barW + rounded * 2;
}

// Equação generalizada %1RM a partir de MPV
// Back Squat: González-Badillo & Sánchez-Medina (2010), R²=0.94
// Trap Bar DL: adaptado de Lake et al. (2017), MVT ~0.50 m/s
// Hip Thrust: adaptado, MVT ~0.30 m/s (similar ao squat)
function pct1RM(mpv, exercise) {
  if (exercise === "Trap Bar Deadlift") return Math.max(30, Math.min(100, -8.0*mpv*mpv - 42.0*mpv + 112.0));
  // Back Squat e Hip Thrust: mesma curva
  return Math.max(30, Math.min(100, -5.961*mpv*mpv - 50.71*mpv + 117.0));
}

// Peso corporal estimado por posição (futebol masculino profissional brasileiro)
const POS_BW = {
  "Goleiro":85,"Zagueiro":82,"Lateral":73,"Volante":76,"Meia":73,"Atacante":76
};
function defaultBW(position) { return POS_BW[position] || 75; }

function prescribe(prof, vel, exercise, bars, bodyWeight, position) {
  const barW = exercise === "Trap Bar Deadlift" ? (bars.trapbar_kg||bars.trapbar||30) : (bars.olympic_kg||bars.olympic||20);
  const snap = l => roundToPlates(l, barW);

  // ════════════════════════════════════════════════════════════
  //  PASSO 1: ESTIMAR e1RM DO ATLETA
  // ════════════════════════════════════════════════════════════
  let e1rm = null;
  let method = "pc";

  if (prof) {
    const maxLoad = prof.maxLoad || prof.max_load;
    const maxMpv  = prof.maxMpv  || prof.max_mpv;

    // Método A: Regressão individual → e1RM na MVT (0.30 m/s)
    // Só usa se slope íngreme (|slope| > 0.004) e R² ≥ 0.35
    if (prof.reg && prof.reg.slope < -0.004 && prof.reg.r2 >= 0.35) {
      const mvt = 0.30; // Minimum Velocity Threshold
      const e1rmReg = loadAtVel(prof.reg, mvt);
      if (e1rmReg && e1rmReg > 20 && e1rmReg < 400) {
        // Sanity: e1RM da regressão não pode ser > 2× o maxLoad testado
        // Se for, a regressão está extrapolando demais
        if (!maxLoad || e1rmReg <= maxLoad * 1.5) {
          e1rm = e1rmReg;
          method = prof.reg.r2 >= 0.70 ? "reg" : "reg_low";
        }
      }
    }

    // Método B: Equação generalizada (maxLoad + maxMpv → e1RM)
    if (!e1rm && maxLoad) {
      if (maxMpv) {
        const pctAtMax = pct1RM(maxMpv, exercise) / 100;
        if (pctAtMax > 0.3 && pctAtMax <= 1.05) {
          const est = maxLoad / pctAtMax;
          if (est <= maxLoad * 1.5) {
            // Estimativa razoável: maxMpv indica carga próxima do máximo
            e1rm = est;
            method = "gen";
          } else {
            // Dados muito submáximos (ex: 150kg@1.23m/s → e1RM=312!)
            // Usa maxLoad como proxy conservador
            e1rm = maxLoad;
            method = "max";
          }
        }
      }
      // Se não tem maxMpv, usa maxLoad diretamente
      if (!e1rm) {
        e1rm = maxLoad;
        method = "max";
      }
    }
  }

  // Método C: Peso corporal × coeficiente por exercício
  if (!e1rm) {
    const bw = (bodyWeight && bodyWeight > 30) ? bodyWeight : defaultBW(position);
    if (!bw) return null;
    if (exercise === "Back Squat")          e1rm = bw * 1.2;
    else if (exercise === "Trap Bar Deadlift") e1rm = bw * 1.5;
    else                                     e1rm = bw * 1.3; // Hip Thrust
    method = "pc";
  }

  if (!e1rm || e1rm < barW) return null;

  // ════════════════════════════════════════════════════════════
  //  PASSO 2: CARGA = e1RM × %1RM(velocidade)
  // ════════════════════════════════════════════════════════════
  const pctTarget = pct1RM(vel, exercise) / 100;
  let load = e1rm * pctTarget;

  // ════════════════════════════════════════════════════════════
  //  PASSO 3: CAPS DE SEGURANÇA
  // ════════════════════════════════════════════════════════════
  load = Math.min(load, e1rm * 1.05); // Nunca > 105% e1RM
  load = Math.min(load, 300);          // Nunca > 300 kg
  if (load < barW) return null;

  // ════════════════════════════════════════════════════════════
  //  RESULTADO
  // ════════════════════════════════════════════════════════════
  return {
    load: snap(load),
    reliable: method === "reg",
    r2: (prof && prof.reg) ? prof.reg.r2 : null,
    method
  };
}

// ── CSV Parser ───────────────────────────────────────────────────────────────
const STOP = new Set(["do","da","de","dos","das","e"]);
const normStr = s => s ? s.normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^\w\s]/g,"").toLowerCase().trim() : "";
const tokens  = s => normStr(s).split(/\s+/).filter(t=>t&&!STOP.has(t));

function nameScore(a, b) {
  const na=normStr(a), nb=normStr(b);
  if (na===nb) return 100;
  const ta=tokens(a), tb=tokens(b);
  const setA=new Set(ta), setB=new Set(tb);
  if (ta.every(t=>setB.has(t)) && tb.every(t=>setA.has(t))) return 95;
  // Sobrenome (último token) deve obrigatoriamente bater para score alto
  const lastA=ta.at(-1), lastB=tb.at(-1);
  if (!lastA||!lastB||lastA!==lastB) return 0; // sobrenome diferente = não é a mesma pessoa
  const overlap=[...setA].filter(t=>setB.has(t)).length;
  const union=new Set([...setA,...setB]).size;
  const s=(overlap/union)*70 + 30; // +30 base por sobrenome bater
  return Math.round(s);
}

function matchName(csv, regNames) {
  if (regNames.includes(csv)) return { name:csv, score:100 };
  let best=null, score=0;
  regNames.forEach(r=>{ const s=nameScore(csv,r); if(s>score){score=s;best=r;} });
  return score>=60 ? { name:best, score } : null;
}

function resolveProfile(athleteName, profiles) {
  if (!athleteName || !profiles) return null;
  if (profiles[athleteName]) return profiles[athleteName];
  const keys = Object.keys(profiles);
  const m = matchName(athleteName, keys);
  return m ? profiles[m.name] : null;
}

function buildProfile(pts, ex) {
  const xs=pts.map(p=>p.load), ys=pts.map(p=>p.mpv);
  const reg=linReg(xs,ys);
  const maxLoad=Math.max(...xs);
  const maxMpvArr=ys.filter((_,i)=>xs[i]===maxLoad);
  const maxMpv=+(maxMpvArr.reduce((a,b)=>a+b,0)/maxMpvArr.length).toFixed(3);
  const mvt=MVT_REF[ex]; let e1rm=null;
  if (reg&&reg.slope<0) { const l=(mvt-reg.intercept)/reg.slope; if(l>20&&l<400) e1rm=Math.round(l/5)*5; }
  return { reg, reliable:!!(reg&&reg.r2>=0.35), e1rm, maxLoad, maxMpv, nReps:pts.length, pts, updatedAt:new Date().toISOString() };
}

function parseCSV(text, regNames) {
  const { data } = window.Papa.parse(text, { header:true, skipEmptyLines:true, dynamicTyping:true });
  const raw = {};
  data.forEach(r => {
    const ex=r["Exercise Name"], name=r["Full Name"]||r["Athlete"]||r["Name"];
    const load=parseFloat(r["Weight (kg)"]||r["Load (kg)"]);
    const mpv=parseFloat(r["Mean Propulsive Velocity (m/s)"]||r["MPV"]);
    if (!EXERCISES.includes(ex)||!name||isNaN(load)||isNaN(mpv)) return;
    if (mpv<0.15||mpv>3.5||load<20) return;
    if (!raw[name]) raw[name]={};
    if (!raw[name][ex]) raw[name][ex]=[];
    raw[name][ex].push({load,mpv});
  });
  const profiles={}, log=[];
  Object.entries(raw).forEach(([csv,exMap])=>{
    const m = matchName(csv, regNames);
    const target = m ? m.name : csv;
    const type = !m?"novo":m.score===100?"exato":m.score>=80?"normalizado":"proximidade";
    log.push({csvName:csv, registeredName:target, score:m?m.score:null, type});
    if (!profiles[target]) profiles[target]={};
    Object.entries(exMap).forEach(([ex,pts])=>{
      profiles[target][ex] = buildProfile(pts, ex);
    });
  });
  return { profiles, log };
}

const avatarColor = n => { let h=0; for(const c of (n||"")) h=(h*31+c.charCodeAt(0))%PAL.length; return PAL[Math.abs(h)]; };

const DAY_TYPES = [
  {id:"treino", label:"Treino", color:"#2563EB", bg:"#EFF6FF", border:"#BFDBFE"},
  {id:"jogo",   label:"Jogo",   color:"#C53030", bg:"#FEF2F2", border:"#FECACA"},
  {id:"folga",  label:"Folga",  color:"#64748B", bg:"#F8FAFC", border:"#E2E8F0"},
  {id:"viagem", label:"Viagem", color:"#D97706", bg:"#FFFBEB", border:"#FDE68A"},
];
const WEEKDAYS = ["Seg","Ter","Qua","Qui","Sex","Sáb","Dom"];

function getMonthDates(year, month) {
  const first = new Date(year, month, 1);
  const last = new Date(year, month + 1, 0);
  const startDay = first.getDay() === 0 ? 6 : first.getDay() - 1;
  // Calcula quantas linhas o mês realmente precisa (5 ou 6)
  const totalNeeded = startDay + last.getDate();
  const rowsNeeded = Math.ceil(totalNeeded / 7);
  const totalCells = rowsNeeded * 7;
  const dates = [];
  for (let i = startDay - 1; i >= 0; i--) {
    const d = new Date(year, month, -i);
    dates.push({ date: d.toISOString().slice(0,10), day: d.getDate(), cur: false });
  }
  for (let i = 1; i <= last.getDate(); i++) {
    const d = new Date(year, month, i);
    dates.push({ date: d.toISOString().slice(0,10), day: i, cur: true });
  }
  while (dates.length < totalCells) {
    const d = new Date(year, month + 1, dates.length - last.getDate() - startDay + 1);
    dates.push({ date: d.toISOString().slice(0,10), day: d.getDate(), cur: false });
  }
  return dates;
}

// Deriva am_type / pm_type / pn_type de um registro (com fallback para day_type legado)
function derivePeriodTypes(dd) {
  if (!dd) return { am_type:null, pm_type:null, pn_type:null };
  const pn_type = dd.pn_type || null;
  if (dd.am_type || dd.pm_type) return { am_type: dd.am_type||null, pm_type: dd.pm_type||null, pn_type };
  if (dd.day_type === "folga")  return { am_type:"folga",  pm_type:"folga",  pn_type };
  if (dd.day_type === "viagem") return { am_type:"viagem", pm_type:"viagem", pn_type };
  if (dd.day_type === "jogo")   return { am_type:null,     pm_type:"jogo",   pn_type };
  if (dd.day_type === "treino") {
    return {
      am_type: (dd.am_activities || dd.am_methodology) ? "treino" : null,
      pm_type: (dd.pm_activities || dd.pm_methodology) ? "treino" : "treino",
      pn_type
    };
  }
  return { am_type:null, pm_type:null, pn_type };
}

// Retorna grupos de um período com fallback pro campo legado `groups`
function getPeriodGroups(dd, period) {
  const key = period + "_groups"; // am_groups, pm_groups, pn_groups
  if (dd[key] !== undefined && dd[key] !== null) return dd[key] || "";
  return dd.groups || "";
}

// Retorna zone_id do período com fallback pro campo legado `zone_id`
function getPeriodZoneId(dd, period) {
  const key = period + "_zone_id";
  if (dd[key] !== undefined && dd[key] !== null) return dd[key];
  if (dd.am_zone_id === undefined && dd.pm_zone_id === undefined && dd.pn_zone_id === undefined) return dd.zone_id || null;
  return null;
}
function getPeriodSeries(dd, period) {
  const key = period + "_series";
  if (dd[key] !== undefined && dd[key] !== null) return dd[key];
  if (dd.am_series === undefined && dd.pm_series === undefined && dd.pn_series === undefined) return dd.series || null;
  return null;
}
function getPeriodReps(dd, period) {
  const key = period + "_reps";
  if (dd[key] !== undefined && dd[key] !== null) return dd[key];
  if (dd.am_reps === undefined && dd.pm_reps === undefined && dd.pn_reps === undefined) return dd.reps || null;
  return null;
}

      const { am_type, pm_type, pn_type } = derivePeriodTypes(dy);

        a.rx&&a.rx.method==="reg" ? el(Badge,{color:"#2563EB",xs:true},"R²="+a.rx.r2)
        : a.rx&&a.rx.method==="reg_low" ? el(Badge,{color:"#D69E2E",xs:true},"R²="+a.rx.r2)
        : a.rx&&a.rx.method==="gen" ? el(Badge,{color:"#DD6B20",xs:true},"eq. geral")
        : a.rx&&a.rx.method==="max" ? el(Badge,{color:"#DD6B20",xs:true},"máx. obs.")

      )
    ))

// ── REPORT MODAL ─────────────────────────────────────────────────────────────
function ReportModal({grouped,zone,vel,ser,rep,bars,date,onClose}) {
  const el=React.createElement;
  const tRef=useRef();
  const [saving,setSaving]=useState(false);
  const [copied,setCopied]=useState(false);

  const RED="#C8102E", BLACK="#111111", WHITE="#FFFFFF", LGRAY="#F4F4F4", MGRAY="#E0E0E0", DGRAY="#444444";

  const dateObj=new Date((date||new Date().toISOString().slice(0,10))+"T12:00:00");
  const dateStr=dateObj.toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit",year:"numeric"});

  const barW=ex=>ex==="Trap Bar Deadlift"?(bars.trapbar_kg||bars.trapbar||30):(bars.olympic_kg||bars.olympic||20);
  const fmtLoad=(load,ex)=>{
    if(!load) return null;
    const b=barW(ex),total=roundToPlates(load,b),lado=(total-b)/2;
    return {total,lado};
  };
  // Usar velocidade real selecionada, não o meio da zona
  const targetVel = vel;
  const groupKeys=Object.keys(grouped).filter(k=>grouped[k]&&grouped[k].length>0);

  const rows=[];
  groupKeys.forEach((grp,gi)=>{
    grouped[grp].forEach((a,ai)=>{
      const prof=resolveProfile(a.name,window._vbtProfiles||{});
      const rxSq=prescribe(prof&&prof["Back Squat"],targetVel,"Back Squat",bars,a.body_weight,a.position);
      const rxTb=prescribe(prof&&prof["Trap Bar Deadlift"],targetVel,"Trap Bar Deadlift",bars,a.body_weight,a.position);
      const rxHt=prescribe(prof&&prof["Hip Thrust"],targetVel,"Hip Thrust",bars,a.body_weight,a.position);
      rows.push({
        a,gi,color:GRP_COLORS[gi%GRP_COLORS.length],grpNum:gi+1,
        sq:fmtLoad(rxSq&&rxSq.load,"Back Squat"),
        tb:fmtLoad(rxTb&&rxTb.load,"Trap Bar Deadlift"),
        ht:fmtLoad(rxHt&&rxHt.load,"Hip Thrust"),
      });
    });
  });

  // Always 2 columns
  const half = Math.ceil(rows.length / 2);
  const columns = [rows.slice(0, half), rows.slice(half)];

  // Font sizes auto-adjust based on number of rows per column
  const maxRows = half;
  const sz = {
    name:   maxRows<=6?24 : maxRows<=10?20 : maxRows<=14?16 : 14,
    value:  maxRows<=6?22 : maxRows<=10?18 : maxRows<=14?16 : 15,
    paren:  maxRows<=6?18 : maxRows<=10?15 : maxRows<=14?13 : 12,
    header: maxRows<=6?16 : maxRows<=10?15 : 13,
    pad:    maxRows<=6?"14px 12px" : maxRows<=10?"11px 12px" : "8px 10px",
  };

  const savePNG=()=>{
    const node=tRef.current; if(!node) return;
    if(!window.html2canvas){alert("html2canvas não carregou.");return;}
    setSaving(true);

    // Alvo: 14.04cm × 15.12cm @ 300 DPI
    const DPI=300;
    const W=Math.round(14.04/2.54*DPI); // 1658
    const H=Math.round(15.12/2.54*DPI); // 1786

    // Renderizar numa div oculta com proporção exata
    const RENDER_W=900;
    const RENDER_H=Math.round(RENDER_W*(15.12/14.04)); // ~969
    const scale=W/RENDER_W; // ~1.84

    // Clonar o nó e fixar dimensões
    const clone=node.cloneNode(true);
    clone.style.position="absolute";
    clone.style.left="-9999px";
    clone.style.top="0";
    clone.style.width=RENDER_W+"px";
    clone.style.height=RENDER_H+"px";
    clone.style.display="flex";
    clone.style.flexDirection="column";
    clone.style.overflow="hidden";
    clone.style.borderRadius="0";

    // Forçar layout flex no clone para preencher espaço vertical
    document.body.appendChild(clone);

    // Estrutura do tRef:
    // children[0] = info strip (vermelho)
    // children[1] = columns container (flex row)
    //   └─ wrapper div (flex:1)
    //       └─ MiniTable div (header + rows)
    //       └─ separator (maybe)
    // children[2] = footer (preto)
    const chs=clone.children;
    if(chs.length>=3){
      chs[0].style.flexShrink="0"; // info strip fixo
      chs[chs.length-1].style.flexShrink="0"; // footer fixo

      // Columns container
      const colContainer=chs[1];
      colContainer.style.flex="1";
      colContainer.style.display="flex";
      colContainer.style.alignItems="stretch";

      // Cada wrapper de coluna
      for(let j=0;j<colContainer.children.length;j++){
        const wrapper=colContainer.children[j];
        if(wrapper.offsetWidth<5) continue; // separator
        wrapper.style.display="flex";
        wrapper.style.flexDirection="column";
        wrapper.style.flex="1";

        // Primeiro filho = MiniTable div
        const mt=wrapper.children[0];
        if(!mt) continue;
        mt.style.display="flex";
        mt.style.flexDirection="column";
        mt.style.flex="1";

        // Dentro do MiniTable: filho[0]=header, filho[1..n]=rows
        for(let k=0;k<mt.children.length;k++){
          if(k===0){ mt.children[k].style.flexShrink="0"; }
          else { mt.children[k].style.flex="1"; mt.children[k].style.alignContent="center"; }
        }
      }
    }

    // Aguardar reflow
    requestAnimationFrame(()=>{
      window.html2canvas(clone,{
        scale:scale,
        backgroundColor:WHITE,
        useCORS:true,
        logging:false,
        width:RENDER_W,
        height:RENDER_H
      }).then(canvas=>{
        document.body.removeChild(clone);
        const out=document.createElement("canvas");
        out.width=W; out.height=H;
        const ctx=out.getContext("2d");
        ctx.imageSmoothingEnabled=true;
        ctx.imageSmoothingQuality="high";
        ctx.fillStyle=WHITE;
        ctx.fillRect(0,0,W,H);
        ctx.drawImage(canvas,0,0,W,H);
        const a=document.createElement("a");
        a.download="vbt_sessao_"+dateStr.replace(/\//g,"-")+".png";
        a.href=out.toDataURL("image/png",1.0);
        a.click();
        setSaving(false);
      }).catch(e=>{
        document.body.removeChild(clone);
        console.error(e);
        setSaving(false);
      });
    });
  };

  const copy=()=>{
    const node=tRef.current; if(!node) return;
    const r=document.createRange(); r.selectNode(node);
    window.getSelection().removeAllRanges(); window.getSelection().addRange(r);
    document.execCommand("copy");
    window.getSelection().removeAllRanges();
    setCopied(true); setTimeout(()=>setCopied(false),2500);
  };

  // Reusable mini-table column
  const MiniTable=({colRows})=>el("div",{style:{flex:1,minWidth:0}},
    // Column header
    el("div",{style:{display:"grid",gridTemplateColumns:"120px 1fr 1fr 1fr",
      background:"#2A2A2A",borderBottom:"2px solid "+RED}},
      ...["ATLETA","BACK SQUAT","TRAP BAR DL","HIP THRUST"].map((h,i)=>
        el("div",{key:h,style:{
          padding:sz.pad,fontSize:sz.header,fontWeight:800,letterSpacing:".06em",
          color:i===0?"#DDD":WHITE,textAlign:i===0?"left":"center",
          borderRight:i<3?"1px solid #444":"none",textTransform:"uppercase"
        }},h)
      )
    ),
    // Rows
    ...colRows.map((r,ri)=>
      el("div",{key:ri,style:{
        display:"grid",gridTemplateColumns:"120px 1fr 1fr 1fr",
        background:ri%2===0?WHITE:LGRAY,
        borderBottom:"1px solid "+MGRAY,
        borderLeft:"3px solid "+r.color
      }},
        el("div",{style:{padding:sz.pad,display:"flex",alignItems:"center",borderRight:"1px solid "+MGRAY}},
          el("span",{style:{fontWeight:700,
            fontSize:(()=>{const n=r.a.nickname||r.a.name.split(" ")[0]; return n.length>10?sz.name-2:sz.name;})(),
            color:BLACK,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}},
            r.a.nickname||r.a.name.split(" ")[0])
        ),
        ...[r.sq,r.tb,r.ht].map((v,vi)=>
          el("div",{key:vi,style:{
            padding:sz.pad,display:"flex",alignItems:"center",justifyContent:"center",
            borderLeft:"1px solid "+MGRAY,flexDirection:"column",gap:0
          }},
            v
              ? el("div",{style:{display:"flex",alignItems:"baseline",gap:3,justifyContent:"center"}},
                  el("span",{style:{fontWeight:900,fontSize:sz.value,color:BLACK,letterSpacing:"-.01em"}},v.total),
                  el("span",{style:{fontSize:sz.paren,color:DGRAY}},"("+v.lado+")")
                )
              : el("span",{style:{color:MGRAY,fontSize:sz.value}},"—")
          )
        )
      )
    )
  );

  return el("div",{style:{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:300,
    display:"flex",alignItems:"center",justifyContent:"center",padding:16,backdropFilter:"blur(4px)"}},
    el("div",{style:{background:"#1A1A1A",borderRadius:12,width:"100%",maxWidth:1100,
      maxHeight:"95vh",display:"flex",flexDirection:"column",
      boxShadow:"0 40px 100px rgba(0,0,0,0.6)",border:"1px solid #333"}},

      // Header
      el("div",{style:{display:"flex",alignItems:"center",padding:"12px 18px",
        borderBottom:"2px solid "+RED,background:"#111",flexShrink:0,gap:10}},
        el("div",{style:{flex:1}},
          el("div",{style:{fontWeight:900,fontSize:14,color:WHITE}},"📋 Relatório · "+dateStr),
          el("div",{style:{fontSize:11,color:"#888",marginTop:1}},
            zone.min.toFixed(2)+"–"+zone.max.toFixed(2)+" m/s · "+zone.label+" · "+ser+"×"+rep+" · "+rows.length+" atletas")
        ),
        el("button",{onClick:savePNG,style:{padding:"7px 14px",borderRadius:8,border:"1.5px solid #555",
          background:"#222",color:"#ccc",fontSize:12,fontWeight:700,cursor:"pointer",opacity:saving?.6:1}},
          saving?"Gerando…":"🖼 PNG"),
        el("button",{onClick:copy,style:{padding:"7px 14px",borderRadius:8,border:"none",
          background:copied?"#38A169":RED,color:WHITE,fontSize:12,fontWeight:700,cursor:"pointer"}},
          copied?"✓ Copiado!":"📋 PPT"),
        el("button",{onClick:onClose,style:{width:30,height:30,borderRadius:8,border:"1px solid #444",
          background:"#222",color:"#888",fontSize:18,cursor:"pointer"}},"×")
      ),

      // Scroll — preview only, PNG captures tRef directly
      el("div",{style:{overflowY:"auto",flex:1,padding:"14px 18px",background:"#0F0F0F"}},
        el("div",{ref:tRef,style:{background:WHITE,borderRadius:8,overflow:"hidden",
          fontFamily:"'Segoe UI',Arial,sans-serif",display:"inline-block",width:"100%"}},

          // Info strip
          el("div",{style:{background:RED,padding:"0"}},
            // Top row: velocity big + zone label
            el("div",{style:{padding:"14px 20px 8px",display:"flex",alignItems:"center",gap:14}},
              el("div",{style:{display:"flex",alignItems:"baseline",gap:6}},
                el("span",{style:{fontSize:36,fontWeight:900,color:WHITE,letterSpacing:"-.03em",lineHeight:1}},zone.min.toFixed(2)+"–"+zone.max.toFixed(2)),
                el("span",{style:{fontSize:16,color:"rgba(255,255,255,0.8)",marginLeft:3}},"m/s")
              ),
              el("div",{style:{height:36,width:2,background:"rgba(255,255,255,0.35)",margin:"0 6px"}}),
              el("div",{style:{fontWeight:900,fontSize:22,color:WHITE,textTransform:"uppercase",letterSpacing:".04em"}},zone.label)
            ),
            // Bottom row: metadata
            el("div",{style:{background:"rgba(0,0,0,0.15)",padding:"8px 20px",display:"flex",gap:28,alignItems:"center"}},
              el("div",{style:{display:"flex",gap:6,alignItems:"center"}},
                el("span",{style:{fontSize:12,color:"rgba(255,255,255,0.7)",textTransform:"uppercase",letterSpacing:".06em"}},"Séries × Reps"),
                el("span",{style:{fontSize:16,fontWeight:900,color:WHITE}},ser+" × "+rep)
              ),
              el("div",{style:{width:1,height:18,background:"rgba(255,255,255,0.3)"}}),
              el("div",{style:{display:"flex",gap:6,alignItems:"center"}},
                el("span",{style:{fontSize:12,color:"rgba(255,255,255,0.7)",textTransform:"uppercase",letterSpacing:".06em"}},"VDT"),
                el("span",{style:{fontSize:16,fontWeight:900,color:WHITE}},"−"+zone.vdt+"%")
              ),
              el("div",{style:{width:1,height:18,background:"rgba(255,255,255,0.3)"}}),
              el("div",{style:{display:"flex",gap:6,alignItems:"center"}},
                el("span",{style:{fontSize:12,color:"rgba(255,255,255,0.7)",textTransform:"uppercase",letterSpacing:".06em"}},"Data"),
                el("span",{style:{fontSize:15,fontWeight:700,color:WHITE}},dateStr)
              ),
              el("div",{style:{marginLeft:"auto",fontSize:11,color:"rgba(255,255,255,0.6)",fontWeight:700,letterSpacing:".06em"}},"CAP · PERFORMANCE")
            )
          ),

          // Columns side by side
          el("div",{style:{display:"flex",gap:0}},
            columns.map((colRows, i) =>
              el("div",{key:i,style:{flex:1,minWidth:0}},
                el(MiniTable,{colRows}),
                i < columns.length - 1 && el("div",{style:{width:2,background:MGRAY}})
              )
            )
          ),

          // Footer
          el("div",{style:{padding:"6px 14px",background:"#2A2A2A",display:"flex",alignItems:"center",gap:16}},
            el("span",{style:{fontSize:10,color:"#DDD",letterSpacing:".04em"}},"— SEM PERFIL VBT"),
            el("span",{style:{fontSize:10,color:"#DDD",letterSpacing:".04em"}},"(lado) = KG CADA LADO"),
            el("div",{style:{marginLeft:"auto",fontSize:10,color:"#BBB",fontWeight:700,letterSpacing:".06em"}},"VBT·FORCE · CAP")
          )
        )
      )
    )
  );
}

// ── ATHLETES VIEW ─────────────────────────────────────────────────────────────
function AthletesView({athletes,setAthletes,profiles,setProfiles,saveAthlete,deleteAthlete,saveProfiles}) {
  const el=React.createElement;
  const [modal,setModal]=useState(null);
  const [log,setLog]=useState(null);
  const [search,setSearch]=useState("");
  const [catFilter,setCat]=useState("Todas");
  const [importing,setImporting]=useState(false);
  const [showWeights,setShowWeights]=useState(false);
  const fileRef=useRef();

  const handleCSV=useCallback(e=>{
    const file=e.target.files[0]; if(!file) return;
    setImporting(true);
    const reader=new FileReader();
    reader.onload=async ev=>{
      const {profiles:newP,log:newLog}=parseCSV(ev.target.result,athletes.map(a=>a.name));
      await saveProfiles(newP, athletes);
      setLog(newLog); setImporting(false);
    };
    reader.readAsText(file,"utf-8");
    e.target.value="";
  },[athletes,saveProfiles]);

  const planilhaFileRef = useRef();

  // Download planilha unificada (ExcelJS: suporta data validation, ao contrário de SheetJS free)
  const downloadPlanilha = async () => {
    if (!window.ExcelJS) { alert("Biblioteca ExcelJS não carregou. Recarregue a página (Ctrl+Shift+R)."); return; }
    const positions = ["Goleiro","Zagueiro","Lateral","Volante","Meia","Extremo","Atacante"];
    const statuses  = ["ativo","inativo"];
    const wb = new ExcelJS.Workbook();
    wb.creator = 'VBT·force';
    wb.created = new Date();

    // === ABA 1: Atletas ===
    const ws = wb.addWorksheet('Atletas');
    ws.columns = [
      { header: 'id', key: 'id', width: 36 },
      { header: 'name', key: 'name', width: 26 },
      { header: 'nickname', key: 'nickname', width: 16 },
      { header: 'dob', key: 'dob', width: 14 },
      { header: 'position', key: 'position', width: 14 },
      { header: 'categoria_1', key: 'categoria_1', width: 16 },
      { header: 'categoria_2', key: 'categoria_2', width: 16 },
      { header: 'categoria_3', key: 'categoria_3', width: 16 },
      { header: 'status', key: 'status', width: 12 },
      { header: 'body_weight', key: 'body_weight', width: 16 },
      { header: 'height_cm', key: 'height_cm', width: 12 }
    ];
    // Header estilizado
    ws.getRow(1).eachCell(cell => {
      cell.font = { bold: true, color: {argb: 'FFFFFFFF'}, size: 11 };
      cell.fill = { type: 'pattern', pattern: 'solid', fgColor: {argb: 'FFC8102E'} }; // vermelho CAP
      cell.alignment = { vertical: 'middle', horizontal: 'center' };
      cell.border = {
        bottom: { style: 'medium', color: {argb: 'FF000000'} }
      };
    });
    ws.getRow(1).height = 22;

    // Popula linhas — distribui categorias do array nas 3 colunas
    athletes.forEach(a => {
      const dobDate = a.dob ? new Date(a.dob + 'T12:00:00') : null;
      const cats = a.categories || [];
      ws.addRow({
        id: a.id || '',
        name: a.name || '',
        nickname: a.nickname || '',
        dob: dobDate,
        position: a.position || '',
        categoria_1: cats[0] || '',
        categoria_2: cats[1] || '',
        categoria_3: cats[2] || '',
        status: a.status || 'ativo',
        body_weight: a.body_weight != null ? a.body_weight : null,
        height_cm: a.height_cm != null ? a.height_cm : null
      });
    });

    // Formata coluna dob como DD/MM/YYYY (padrão BR)
    ws.getColumn('dob').numFmt = 'dd/mm/yyyy';
    // ID em cinza claro pra sinalizar "não mexer"
    ws.getColumn('id').eachCell({includeEmpty:false}, (cell, rowNumber) => {
      if (rowNumber === 1) return;
      cell.font = { color: {argb: 'FF999999'}, size: 10 };
    });

    // Data validations até 500 linhas
    const lastRow = 500;
    // Position (coluna E)
    ws.dataValidations.add('E2:E' + lastRow, {
      type: 'list', allowBlank: true, showErrorMessage: true,
      formulae: ['"' + positions.join(',') + '"'],
      errorStyle: 'error', errorTitle: 'Posição inválida',
      error: 'Escolha uma da lista: ' + positions.join(', ')
    });
    // Categorias 1, 2, 3 (colunas F, G, H)
    const catFormula = ['"' + CATEGORIES.join(',') + '"'];
    ['F','G','H'].forEach(col => {
      ws.dataValidations.add(col + '2:' + col + lastRow, {
        type: 'list', allowBlank: true, showErrorMessage: true,
        formulae: catFormula,
        errorStyle: 'error', errorTitle: 'Categoria inválida',
        error: 'Escolha uma da lista: ' + CATEGORIES.join(', ')
      });
    });
    // Status (coluna I)
    ws.dataValidations.add('I2:I' + lastRow, {
      type: 'list', allowBlank: true, showErrorMessage: true,
      formulae: ['"' + statuses.join(',') + '"'],
      errorStyle: 'error', errorTitle: 'Status inválido',
      error: 'Use ativo ou inativo'
    });
    // body_weight (J) e height_cm (K): só números
    ws.dataValidations.add('J2:J' + lastRow, {
      type: 'decimal', allowBlank: true, operator: 'between', showErrorMessage: true,
      formulae: [30, 200], errorStyle: 'error', errorTitle: 'Peso inválido',
      error: 'Digite um número entre 30 e 200 kg'
    });
    ws.dataValidations.add('K2:K' + lastRow, {
      type: 'decimal', allowBlank: true, operator: 'between', showErrorMessage: true,
      formulae: [100, 230], errorStyle: 'error', errorTitle: 'Altura inválida',
      error: 'Digite um número entre 100 e 230 cm'
    });
    // Comentários explicativos nos headers (não altera o texto, aparece ao passar mouse)
    ws.getCell('A1').note = { texts: [{ font: {bold:true, size:10}, text: 'ID interno. NÃO EDITAR — se apagar, será criado atleta duplicado.' }] };
    ws.getCell('D1').note = { texts: [{ font: {bold:true, size:10}, text: 'Data de nascimento. Formato: DD/MM/AAAA' }] };
    ws.getCell('J1').note = { texts: [{ font: {bold:true, size:10}, text: 'Peso corporal em quilogramas (kg). Entre 30 e 200.' }] };
    ws.getCell('K1').note = { texts: [{ font: {bold:true, size:10}, text: 'Altura em centímetros (cm). Entre 100 e 230.' }] };
    // Comentário no header das categorias
    ws.getCell('F1').note = {
      texts: [{
        font: { bold: true, size: 10 },
        text: 'Cada coluna aceita UMA categoria via dropdown.\n\nSe o atleta pertence a várias, preencha categoria_2 e categoria_3.\n\nCategorias válidas:\n' + CATEGORIES.join('\n')
      }]
    };

    // Congela primeira linha e primeira coluna
    ws.views = [{ state: 'frozen', xSplit: 1, ySplit: 1 }];

    // === ABA 2: Referência ===
    const wsRef = wb.addWorksheet('Referência');
    wsRef.columns = [
      { header: 'Tipo', key: 'tipo', width: 24 },
      { header: 'Valor válido', key: 'valor', width: 32 }
    ];
    wsRef.getRow(1).font = { bold: true, color: {argb:'FFFFFFFF'} };
    wsRef.getRow(1).fill = { type: 'pattern', pattern: 'solid', fgColor: {argb:'FF2D3748'} };
    CATEGORIES.forEach(c => wsRef.addRow({ tipo: 'Categoria', valor: c }));
    positions.forEach(p => wsRef.addRow({ tipo: 'Posição', valor: p }));
    statuses.forEach(s => wsRef.addRow({ tipo: 'Status', valor: s }));

    // Salva
    const buffer = await wb.xlsx.writeBuffer();
    const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'atletas_vbtforce_' + new Date().toISOString().slice(0,10) + '.xlsx';
    a.click();
    URL.revokeObjectURL(url);
  };

  // Upload da planilha: atualiza atletas existentes (matching por id) e cria novos (id vazio)
  const [uploadingPlanilha, setUploadingPlanilha] = useState(false);
  const handleUploadPlanilha = async (e) => {
    const f = e.target.files[0];
    if (!f) return;
    if (!window.XLSX) { alert("Biblioteca XLSX não carregou. Recarregue a página."); e.target.value=''; return; }
    setUploadingPlanilha(true);
    try {
      const buffer = await f.arrayBuffer();
      const wb = XLSX.read(buffer, {type:'array', cellDates: true});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {defval: ''});
      let novos = 0, atualizados = 0, erros = 0;
      const errosDetalhes = [];
      const catsInvalidas = new Set();
      const catsValidas = new Set(CATEGORIES);
      for (const r of rows) {
        const nome = String(r.name || '').trim();
        if (!nome) continue;
        // dob pode vir como Date (cellDates:true), string ISO, DD/MM/YYYY, ou vazio
        let dobFinal = null;
        if (r.dob instanceof Date && !isNaN(r.dob)) {
          dobFinal = r.dob.toISOString().slice(0,10);
        } else if (r.dob) {
          const s = String(r.dob).trim();
          // Detecta DD/MM/YYYY ou DD-MM-YYYY
          const brMatch = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
          if (brMatch) {
            const [, d, m, y] = brMatch;
            dobFinal = y + '-' + m.padStart(2,'0') + '-' + d.padStart(2,'0');
          } else {
            // Assume ISO YYYY-MM-DD
            dobFinal = s.slice(0,10);
          }
        }
        // Filtra categorias: coleta das 3 colunas separadas, valida contra CATEGORIES
        const catsRaw = [r.categoria_1, r.categoria_2, r.categoria_3]
          .map(c => c ? String(c).trim() : '')
          .filter(Boolean);
        const catsFiltradas = [];
        catsRaw.forEach(c => {
          if (catsValidas.has(c)) {
            if (!catsFiltradas.includes(c)) catsFiltradas.push(c); // evita duplicatas
          } else {
            catsInvalidas.add(c);
          }
        });
        const payload = {
          id: r.id && String(r.id).trim() ? String(r.id).trim() : null,
          name: nome,
          nickname: r.nickname ? String(r.nickname).trim() : null,
          dob: dobFinal,
          position: r.position ? String(r.position).trim() : null,
          categories: catsFiltradas,
          status: r.status ? String(r.status).trim() : 'ativo',
          body_weight: (r.body_weight !== '' && r.body_weight != null) ? Number(r.body_weight) : null,
          height_cm: (r.height_cm !== '' && r.height_cm != null) ? Number(r.height_cm) : null,
          photo: null
        };
        // Preserva foto atual se atleta já existe
        if (payload.id) {
          const existing = athletes.find(a => a.id === payload.id);
          if (existing) payload.photo = existing.photo_url || null;
        }
        try {
          await saveAthlete(payload);
          if (payload.id) atualizados++; else novos++;
        } catch(err) {
          erros++;
          errosDetalhes.push(nome + ': ' + err.message);
          console.error("Erro na linha", r, err);
        }
      }
      let msg = `Planilha processada:\n\n• ${atualizados} atualizado(s)\n• ${novos} novo(s)`;
      if (catsInvalidas.size > 0) {
        msg += `\n\nCategorias ignoradas (não existem no sistema):\n${[...catsInvalidas].join(', ')}`;
      }
      if (erros > 0) msg += `\n\n${erros} erro(s):\n` + errosDetalhes.slice(0,5).join('\n');
      alert(msg);
    } catch(err) {
      alert("Erro ao processar planilha: " + err.message);
    } finally {
      setUploadingPlanilha(false);
      e.target.value = '';
    }
  };

  const norm=normStr;
  const filtered=useMemo(()=>{
    let base=athletes;
    if(catFilter!=="Todas") base=base.filter(a=>(a.categories||[]).includes(catFilter));
    if(!search) return base;
    const s=norm(search);
    return base.filter(a=>norm(a.name).includes(s)||norm(a.nickname||"").includes(s));
  },[athletes,search,catFilter]);

  const active=filtered.filter(a=>a.status==="ativo");
  const inactive=filtered.filter(a=>a.status!=="ativo");
  const matchColor=t=>t==="exato"?"#2563EB":t==="normalizado"?T.accent:t==="proximidade"?"#D69E2E":"#A0AEC0";

  return el("div",{style:{display:"flex",flexDirection:"column",flex:1,minHeight:0,overflowY:"auto",background:T.bg}},
    // Top bar
    el("div",{style:{padding:"10px 16px",borderBottom:"1px solid "+T.border,background:T.card,display:"flex",gap:8,flexWrap:"nowrap",alignItems:"center",overflowX:"auto"}},
      el(Btn,{primary:true,onClick:()=>setModal({id:null,name:"",nickname:"",dob:"",position:"",status:"ativo",photo:null,categories:[]})},"+ Atleta"),
      el("div",null,
        el("input",{type:"file",accept:".csv",ref:fileRef,onChange:handleCSV,style:{display:"none"}}),
        el(Btn,{onClick:()=>fileRef.current&&fileRef.current.click()},importing?"Importando…":"↑ CSV Output Sports")
      ),
      // Bloco: atualização em lote via planilha
      el("div",{title:"Baixe a planilha, edite peso/estatura/dados de todos os atletas de uma vez no Excel, e envie de volta.",
        style:{display:"flex",alignItems:"center",gap:6,padding:"4px 8px",
        border:"1px solid "+T.border,borderRadius:8,background:"#F7FAFC"}},
        el("span",{style:{fontSize:10,fontWeight:800,color:T.muted,textTransform:"uppercase",letterSpacing:".05em",marginRight:2}},"Atualizar em lote"),
        el(Btn,{onClick:downloadPlanilha,title:"Baixa planilha Excel com todos os atletas preenchidos"},"⬇ Baixar Excel"),
        el("div",null,
          el("input",{type:"file",accept:".xlsx,.xls",ref:planilhaFileRef,onChange:handleUploadPlanilha,style:{display:"none"}}),
          el(Btn,{onClick:()=>planilhaFileRef.current&&planilhaFileRef.current.click(),
            title:"Envia planilha editada de volta pro sistema"},
            uploadingPlanilha ? "Enviando…" : "⬆ Enviar Excel")
        )
      ),
      el("input",{value:search,onChange:e=>setSearch(e.target.value),placeholder:"Buscar atleta…",style:{flex:1,minWidth:140,padding:"7px 10px",borderRadius:7,border:"1.5px solid "+T.border,background:"#fff",color:T.text,fontSize:13,outline:"none"}}),
      // Storage status
      el("div",{style:{display:"flex",alignItems:"center",gap:5,padding:"4px 10px",borderRadius:6,background:"#F0FFF4",border:"1px solid #9AE6B4"},title:"Dados salvos no navegador"},
        el("div",{style:{width:7,height:7,borderRadius:"50%",background:"#38A169"}}),
        el("span",{style:{fontSize:11,color:"#2F855A",fontWeight:700,whiteSpace:"nowrap"}},
          athletes.filter(a=>a.status==="ativo").length+"at · "+Object.keys(profiles).length+"p"
        )
      ),
      el("span",{style:{fontSize:11,color:T.muted}},athletes.length+" atletas")
    ),
    // Category filter strip
    el("div",{style:{padding:"8px 16px",borderBottom:"1px solid "+T.border,background:"#FAFBFF",display:"flex",gap:5,overflowX:"auto",flexShrink:0}},
      ...["Todas",...CATEGORIES].map(c=>{
        const cnt=c==="Todas"?athletes.length:athletes.filter(a=>(a.categories||[]).includes(c)).length;
        return el("button",{key:c,onClick:()=>setCat(c),style:{
          padding:"4px 12px",borderRadius:20,fontSize:11,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap",
          border:"1.5px solid "+(catFilter===c?T.accent:T.border),
          background:catFilter===c?T.accent+"18":"#fff",
          color:catFilter===c?T.accent:T.sub,transition:"all .15s"
        }},c+(cnt>0?" ("+cnt+")":""));
      })
    ),
    el("div",{style:{flex:1,overflowY:"auto",padding:"14px 18px",display:"flex",flexDirection:"column",gap:14}},
      // Match log
      log&&el("div",{style:{border:"1px solid "+T.border,borderRadius:10,overflow:"hidden",background:T.card}},
        el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 14px",background:"#F7FAFF",borderBottom:"1px solid "+T.border}},
          el("span",{style:{fontWeight:700,fontSize:13,color:T.text}},"Resultado do import"),
          el("button",{onClick:()=>setLog(null),style:{background:"none",border:"none",color:T.muted,fontSize:20,cursor:"pointer"}},"×")
        ),
        el("div",{style:{display:"flex",gap:12,padding:"6px 14px",flexWrap:"wrap",borderBottom:"1px solid "+T.border}},
          ...["exato","normalizado","proximidade","novo"].map(t=>el("div",{key:t,style:{display:"flex",alignItems:"center",gap:4,fontSize:11,color:T.sub}},
            el("div",{style:{width:7,height:7,borderRadius:"50%",background:matchColor(t)}}),t
          ))
        ),
        ...log.map((m,i)=>el("div",{key:i,style:{display:"grid",gridTemplateColumns:"1fr 1fr 60px 90px",padding:"7px 14px",borderTop:"1px solid "+T.border,alignItems:"center",gap:8}},
          el("span",{style:{fontSize:12,color:T.sub}},m.csvName),
          el("span",{style:{fontSize:12,fontWeight:m.type!=="novo"?700:400,color:m.type!=="novo"?T.text:T.muted}},m.type==="novo"?"— não cadastrado":m.registeredName),
          el("span",{style:{fontSize:11,color:T.muted,textAlign:"center"}},m.score!==null?m.score+"%":"—"),
          el("div",{style:{textAlign:"center"}},el(Badge,{color:matchColor(m.type),xs:true},m.type))
        ))
      ),
      // Athlete cards
      ...[["Ativos",active],["Inativos",inactive]].map(([label,list])=>list.length>0&&el("div",{key:label},
        el("div",{style:{fontSize:10,fontWeight:700,letterSpacing:".08em",color:T.muted,textTransform:"uppercase",marginBottom:8}},label),
        el("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(190px,1fr))",gap:10}},
          ...list.map(a=>{
            const hasP=!!resolveProfile(a.name,profiles);
            return el("div",{key:a.id,onClick:()=>setModal({...a,categories:a.categories||[]}),style:{border:"1.5px solid "+T.border,borderRadius:10,padding:"13px",cursor:"pointer",background:T.card,opacity:a.status==="ativo"?1:.55,transition:"border-color .15s"},
              onMouseEnter:e=>e.currentTarget.style.borderColor=T.accent,
              onMouseLeave:e=>e.currentTarget.style.borderColor=T.border},
              el("div",{style:{display:"flex",alignItems:"center",gap:10,marginBottom:8}},
                el(Avatar,{name:a.name,photo:a.photo,size:38}),
                el("div",{style:{minWidth:0}},
                  el("div",{style:{fontWeight:800,fontSize:13,color:T.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},a.nickname||a.name.split(" ")[0]),
                  el("div",{style:{fontSize:10,color:T.muted,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},a.name)
                )
              ),
              el("div",{style:{display:"flex",gap:4,flexWrap:"wrap"}},
                a.position&&el(Badge,{color:T.muted,xs:true},a.position),
                a.body_weight&&el(Badge,{color:"#6B7280",xs:true},a.body_weight+"kg"),
                (a.categories||[]).slice(0,1).map(c=>el(Badge,{key:c,color:T.muted,xs:true},c)),
                hasP?el(Badge,{color:"#2563EB",xs:true},"Perfil VBT"):el(Badge,{color:"#D69E2E",xs:true},"Sem perfil")
              ),
              a.dob&&el("div",{style:{fontSize:10,color:T.muted,marginTop:5}},calcAge(a.dob)+" anos"),
              (a.categories||[]).length>0&&el("div",{style:{fontSize:10,color:T.muted,marginTop:3}},(a.categories||[]).join(" · "))
            );
          })
        )
      )),
      filtered.length===0&&el(Empty,{icon:"🔍",title:"Nenhum resultado",sub:"\""+search+"\""})
    ),
    modal&&el(AthleteModal,{data:modal,profiles,
      onSave:async d=>{ await saveAthlete(d); setModal(null); },
      onDelete:async id=>{ await deleteAthlete(id); setModal(null); },
      onClose:()=>setModal(null)
    }),
    showWeights&&el(WeightsModal,{
      athletes:athletes.filter(a=>a.status==="ativo"),
      saveAthlete,
      onClose:()=>setShowWeights(false)
    })
  );
}

function WeightsModal({athletes,saveAthlete,onClose}) {
  const el=React.createElement;
  const [data,setData]=useState(()=>{
    const d={};
    athletes.forEach(a=>{ d[a.id]={bw:a.body_weight||"",ht:a.height_cm||""}; });
    return d;
  });
  const [saving,setSaving]=useState(false);
  const [search,setSearch]=useState("");
  const [cat,setCat]=useState("Todas");

  const catFiltered=useMemo(()=>{
    if(cat==="Todas") return athletes;
    return athletes.filter(a=>(a.categories||[]).includes(cat));
  },[athletes,cat]);

  const filtered=useMemo(()=>{
    if(!search) return catFiltered;
    const s=search.toLowerCase();
    return catFiltered.filter(a=>(a.nickname||a.name).toLowerCase().includes(s));
  },[catFiltered,search]);

  const allCats=useMemo(()=>{
    const s=new Set();
    athletes.forEach(a=>(a.categories||[]).forEach(c=>s.add(c)));
    return ["Todas",...Array.from(s).sort()];
  },[athletes]);

  const changed=athletes.filter(a=>{
    const d=data[a.id]||{};
    return (String(d.bw)!==String(a.body_weight||"") && d.bw!=="") ||
           (String(d.ht)!==String(a.height_cm||"") && d.ht!=="");
  });

  const saveAll=async()=>{
    setSaving(true);
    for(const a of changed){
      const d=data[a.id]||{};
      const updates={...a};
      if(d.bw!=="") updates.body_weight=+d.bw;
      if(d.ht!=="") updates.height_cm=+d.ht;
      await saveAthlete(updates);
    }
    setSaving(false);
    onClose();

  const setField=(id,key,val)=>setData(d=>({...d,[id]:{...d[id],[key]:val}}));
