// LineChart usando Recharts com anotações contextuais
function LineChart({ series, height, unit, showArea, showAnnotations }) {
  const el = React.createElement;
  const RC = window.Recharts;
  if (!RC) return el("div", { style: { padding: 40, textAlign: "center", color: R.textMuted } }, "Carregando gráfico...");

  const H = height || 260;

  const allDates = new Set();
  series.forEach(s => s.points.forEach(p => allDates.add(p.date)));
  if (allDates.size === 0) {
    return el("div", { style: { display: "flex", alignItems: "center", justifyContent: "center", height: H, color: R.textMuted, fontSize: 12, background: "#FAFAFA", borderRadius: 4 } },
      "Sem dados no período");
  }

  const sortedDates = [...allDates].sort();
  const dataset = sortedDates.map(date => {
    const row = { date };
    series.forEach((s, i) => {
      const pt = s.points.find(p => p.date === date);
      if (pt && pt.value != null) row["s" + i] = pt.value;
    });
    return row;
  });

  const xTickFormatter = (d) => {
    const dt = new Date(d);
    return dt.toLocaleDateString("pt-BR", { day: "2-digit", month: "short" }).replace(".", "");
  };

  // Calcula média e recorde da primeira série (só se 1 série ativa)
  let avgValue = null, recordPoint = null;
  if (showAnnotations && series.length === 1) {
    const vals = series[0].points.map(p => p.value).filter(v => v != null);
    if (vals.length >= 3) {
      avgValue = vals.reduce((a, b) => a + b, 0) / vals.length;
      const maxV = Math.max(...vals);
      recordPoint = series[0].points.find(p => p.value === maxV);
    }
  }

  const chartType = showArea ? RC.AreaChart : RC.LineChart;
  const seriesElement = showArea ? RC.Area : RC.Line;

  return el(RC.ResponsiveContainer, { width: "100%", height: H },
    el(chartType, { data: dataset, margin: { top: 15, right: 20, left: 5, bottom: 5 } },
      el("defs", null,
        ...series.map((s, i) => {
          const color = REPORT_COLORS[i % REPORT_COLORS.length];
          return el("linearGradient", { key: i, id: "gradS" + i, x1: 0, y1: 0, x2: 0, y2: 1 },
            el("stop", { offset: "0%", stopColor: color, stopOpacity: 0.18 }),
            el("stop", { offset: "100%", stopColor: color, stopOpacity: 0 })
          );
        })
      ),
      el(RC.CartesianGrid, { strokeDasharray: "0", stroke: "#F5F5F5", vertical: false }),
      el(RC.XAxis, {
        dataKey: "date", tickFormatter: xTickFormatter,
        tick: { fontSize: 10, fill: R.textMuted, fontWeight: 500 },
        axisLine: false, tickLine: false,
        tickMargin: 8
      }),
      el(RC.YAxis, {
        tick: { fontSize: 10, fill: R.textMuted, fontWeight: 500 },
        axisLine: false, tickLine: false,
        domain: ["dataMin - 5%", "dataMax + 5%"],
        tickMargin: 4,
        width: 40
      }),
      el(RC.Tooltip, { content: el(PremiumTooltip, { unit }), cursor: { stroke: "#E5E5E5", strokeWidth: 1 } }),
      // Linha de média
      avgValue != null && el(RC.ReferenceLine, {
        y: avgValue, stroke: "#A3A3A3", strokeDasharray: "3 3", strokeWidth: 1,
        label: { value: "média " + avgValue.toFixed(avgValue >= 100 ? 0 : 2), position: "insideTopRight", fontSize: 9, fill: "#737373", fontWeight: 500 }
      }),
      // Marcador de recorde
      recordPoint && el(RC.ReferenceDot, {
        x: recordPoint.date, y: recordPoint.value,
        r: 6, fill: "#0A0A0B", stroke: "#fff", strokeWidth: 2
      }),
      ...series.map((s, i) => {
        const color = s.isBenchmark ? "#737373" : REPORT_COLORS[i % REPORT_COLORS.length];
        const props = {
          key: i, type: "monotone", dataKey: "s" + i, name: s.name,
          stroke: color, strokeWidth: s.isBenchmark ? 1.5 : 2,
          strokeDasharray: s.isBenchmark ? "4 4" : "0",
          dot: s.isBenchmark ? false : { r: 2.5, fill: color, strokeWidth: 0 },

        };
        if (showArea && !s.isBenchmark) {

        }
        return el(seriesElement, props);
      })
    )
  );
}

// Gera insight interpretativo com base nas séries
function generateInsight(series, metric, mode) {
  if (!series || series.length === 0) return "Sem dados suficientes para insight.";
  // Só considera séries com >= 3 pontos
  const validSeries = series.filter(s => s.points.filter(p => p.value != null).length >= 3);
  if (validSeries.length === 0) return "Poucos dados no período. Precisa pelo menos 3 sessões por atleta/grupo.";

  const analyzeOne = (s) => {
    const pts = s.points.filter(p => p.value != null).sort((a,b) => new Date(a.date) - new Date(b.date));
    if (pts.length < 3) return null;
    const first = pts[0].value;
    const last = pts.at(-1).value;
    const delta = last - first;
    const deltaPct = first > 0 ? (delta / first) * 100 : 0;
    // Tendência recente (últimos 3 vs primeiros 3)
    const nEnd = Math.min(3, Math.floor(pts.length / 2));
    const avgEnd = pts.slice(-nEnd).reduce((s,p) => s + p.value, 0) / nEnd;
    const avgStart = pts.slice(0, nEnd).reduce((s,p) => s + p.value, 0) / nEnd;
    const trendPct = avgStart > 0 ? ((avgEnd - avgStart) / avgStart) * 100 : 0;
    // Max e min do período
    const maxV = Math.max(...pts.map(p => p.value));
    const minV = Math.min(...pts.map(p => p.value));
    return { name: s.name, first, last, delta, deltaPct, trendPct, maxV, minV, nPoints: pts.length };
  };

  const analyses = validSeries.map(analyzeOne).filter(a => a);
  if (analyses.length === 0) return "Sem tendência clara nos dados.";

  // Um único (modo individual ou 1 série)
  if (analyses.length === 1) {
    const a = analyses[0];
    const dir = a.deltaPct > 3 ? "evoluiu" : a.deltaPct < -3 ? "regrediu" : "manteve-se estável";
    const cor = a.deltaPct > 3 ? "positiva" : a.deltaPct < -3 ? "negativa" : "neutra";
    const mag = Math.abs(a.deltaPct).toFixed(1);
    if (Math.abs(a.deltaPct) < 3) {
      return a.name + " " + dir + " em " + metric.label + " (variação " + mag + "% em " + a.nPoints + " sessões). Estabilidade pode indicar plateau ou fase de manutenção.";
    }
    return a.name + " " + dir + " " + mag + "% em " + metric.label + " ao longo de " + a.nPoints + " sessões. Tendência " + cor + ".";
  }

  // Comparação múltipla
  const bestUp = [...analyses].sort((a,b) => b.deltaPct - a.deltaPct)[0];
  const worstDown = [...analyses].sort((a,b) => a.deltaPct - b.deltaPct)[0];
  if (bestUp.deltaPct > 3 && worstDown.deltaPct < -3) {
    return "Divergência clara: " + bestUp.name + " avança (+" + bestUp.deltaPct.toFixed(1) + "%) enquanto " + worstDown.name + " recua (" + worstDown.deltaPct.toFixed(1) + "%). Vale checar carga, fadiga ou individualização.";
  }
  if (bestUp.deltaPct > 3) {
    return bestUp.name + " lidera evolução (+" + bestUp.deltaPct.toFixed(1) + "%). Os demais oscilam entre " + worstDown.deltaPct.toFixed(1) + "% e " + bestUp.deltaPct.toFixed(1) + "%.";
  }
  return "Grupo estável no período — variação máxima entre " + worstDown.deltaPct.toFixed(1) + "% e " + bestUp.deltaPct.toFixed(1) + "%. Sem tendência marcante.";
}

function ReportsView({ athletes, snapshots }) {
  const el = React.createElement;

  // ── Filtros ──
  const [mode, setMode] = useState("grupo"); // atleta | grupo | posicao - default categoria
  const [selected, setSelected] = useState(["Profissional"]); // default: Profissional carregado
  const [exercise, setExercise] = useState("Back Squat");
  const [period, setPeriod] = useState("30d");
  const [customStart, setCustomStart] = useState("");
  const [customEnd, setCustomEnd] = useState("");
  const [editedInsights, setEditedInsights] = useState({});
  const [primaryMetric, setPrimaryMetric] = useState("e1rm");
  const [editedSummary, setEditedSummary] = useState(null);
  // Benchmark: comparação de referência sobreposta ao gráfico
  const [benchmarkType, setBenchmarkType] = useState("none"); // none | team_avg | team_max | athlete
  const [benchmarkAthlete, setBenchmarkAthlete] = useState(null);
  const [showAlerts, setShowAlerts] = useState(false);

  const activeAthletes = useMemo(() => athletes.filter(a => a.status === "ativo"), [athletes]);

  // Range de datas
  const dateRange = useMemo(() => {
    const now = new Date();
    if (period === "30d") {
      const s = new Date(now); s.setDate(s.getDate() - 30);
      return [s.toISOString().slice(0,10), now.toISOString().slice(0,10)];
    }
    if (period === "90d") {
      const s = new Date(now); s.setDate(s.getDate() - 90);
      return [s.toISOString().slice(0,10), now.toISOString().slice(0,10)];
    }
    if (period === "temporada") {
      return [now.getFullYear() + "-01-01", now.toISOString().slice(0,10)];
    }
    if (period === "custom") {
      return [customStart || "1900-01-01", customEnd || now.toISOString().slice(0,10)];
    }
    return ["1900-01-01", now.toISOString().slice(0,10)];
  }, [period, customStart, customEnd]);

  // Opções pra dropdown de seleção
  const options = useMemo(() => {
    if (mode === "atleta") return activeAthletes.map(a => ({ id: a.id, label: a.nickname || a.name, athlete: a }));
    if (mode === "grupo") return CATEGORIES.map(g => ({ id: g, label: g }));
    if (mode === "posicao") return REPORT_POSITIONS.map(p => ({ id: p, label: p }));
    return [];
  }, [mode, activeAthletes]);

  // Ao mudar modo, seta seleção default apropriada
  React.useEffect(() => {
    if (mode === "grupo") setSelected(["Profissional"]);
    else if (mode === "posicao") setSelected([]);
    else setSelected([]);
    setBenchmarkAthlete(null);
  }, [mode]);

  const toggleSelected = (id) => {
    setSelected(prev => {
      if (prev.includes(id)) return prev.filter(x => x !== id);
      if (prev.length >= 4) return prev; // limite 4
      return [...prev, id];
    });
  };

  // Constrói séries pra um gráfico dado a métrica
  const buildSeries = React.useCallback((metric) => {
    if (selected.length === 0) return [];
    const [dMin, dMax] = dateRange;
    const inRange = (d) => d >= dMin && d <= dMax;

    // Filtra snapshots do exercício + período
    const relevantSnaps = snapshots.filter(s =>
      s.exercise === exercise &&
      s.session_date >= dMin && s.session_date <= dMax
    );

    if (mode === "atleta") {
      return selected.map(athId => {
        const ath = activeAthletes.find(a => a.id === athId);
        if (!ath) return null;
        // Agrupa por dia, pega valor máximo do dia
        const byDate = {};
        relevantSnaps.filter(s => s.athlete_id === athId).forEach(s => {
          const val = metric.getValue(s, ath);
          if (val == null) return;
          if (byDate[s.session_date] == null || val > byDate[s.session_date]) byDate[s.session_date] = val;
        });
        const points = Object.entries(byDate).map(([date, value]) => ({ date, value }));
        return { name: ath.nickname || ath.name, points };
      }).filter(Boolean);
    }

    // Modo grupo/posição: média dos atletas selecionados a cada data
    // Como o snapshot não tem grupo/posição, precisamos cruzar com o cadastro:
    // - posição: athlete.position === selected[i]
    // - grupo: mais complexo (grupo vem da presença diária). Simplificação: usa athlete.categories
    // Como fallback, se não tiver mapeamento por grupo real, agrupa por posição.
    return selected.map(key => {
      const athIds = activeAthletes.filter(a => {
        if (mode === "posicao") return a.position === key;
        // Grupo: aproximação usa nickname/categorias — não temos grupo diário aqui, então tratamos como categorias
        if (mode === "grupo") return (a.categories || []).includes(key);
        return false;
      }).map(a => a.id);
      if (athIds.length === 0) return { name: key, points: [] };
      // Agrupa por data: média dos valores dos atletas
      const byDate = {};
      relevantSnaps.filter(s => athIds.includes(s.athlete_id)).forEach(s => {
        const ath = activeAthletes.find(a => a.id === s.athlete_id);
        const val = metric.getValue(s, ath);
        if (val == null) return;
        if (!byDate[s.session_date]) byDate[s.session_date] = [];
        byDate[s.session_date].push(val);
      });
      const points = Object.entries(byDate).map(([date, vals]) => ({
        date, value: +(vals.reduce((a,b) => a+b, 0) / vals.length).toFixed(2)
      }));
      return { name: key + " (n=" + athIds.length + ")", points };
    });
  }, [mode, selected, exercise, dateRange, snapshots, activeAthletes]);

  // ── Benchmark: constrói série de referência ──
  const buildBenchmark = React.useCallback((metric) => {
    if (benchmarkType === "none") return null;
    const [dMin, dMax] = dateRange;
    const relevantSnaps = snapshots.filter(s =>
      s.exercise === exercise && s.session_date >= dMin && s.session_date <= dMax
    );
    let athIds = [];
    let benchLabel = "";
    if (benchmarkType === "athlete" && benchmarkAthlete) {
      athIds = [benchmarkAthlete];
      const ath = activeAthletes.find(a => a.id === benchmarkAthlete);
      benchLabel = "Referência: " + (ath ? (ath.nickname || ath.name) : "?");
    } else if (benchmarkType === "team_avg") {
      athIds = activeAthletes.map(a => a.id);
      benchLabel = "Média do time";
    } else if (benchmarkType === "team_max") {
      athIds = activeAthletes.map(a => a.id);
      benchLabel = "Máximo do time";
    }
    if (athIds.length === 0) return null;

    const byDate = {};
    relevantSnaps.filter(s => athIds.includes(s.athlete_id)).forEach(s => {
      const ath = activeAthletes.find(a => a.id === s.athlete_id);
      const val = metric.getValue(s, ath);
      if (val == null) return;
      if (!byDate[s.session_date]) byDate[s.session_date] = [];
      byDate[s.session_date].push(val);
    });
    const agg = benchmarkType === "team_max" ? Math.max : (arr => arr.reduce((a,b)=>a+b,0) / arr.length);
    const points = Object.entries(byDate).map(([date, vals]) => ({
      date, value: +(agg === Math.max ? Math.max(...vals) : agg(vals)).toFixed(2)
    }));
    return { name: benchLabel, points, isBenchmark: true };
  }, [benchmarkType, benchmarkAthlete, exercise, dateRange, snapshots, activeAthletes]);

  // ── Contexto pro KPI card: média do time e delta vs última sessão ──
  const computeContext = React.useCallback((metric) => {
    const [dMin, dMax] = dateRange;
    const relevantSnaps = snapshots.filter(s =>
      s.exercise === exercise && s.session_date >= dMin && s.session_date <= dMax
    );
    // Média do time no período
    const teamVals = [];
    relevantSnaps.forEach(s => {
      const ath = activeAthletes.find(a => a.id === s.athlete_id);
      if (!ath) return;
      const v = metric.getValue(s, ath);
      if (v != null) teamVals.push(v);
    });
    const teamAvg = teamVals.length > 0 ? teamVals.reduce((a,b)=>a+b,0) / teamVals.length : null;
    return { teamAvg, teamAvgStr: teamAvg != null ? (teamAvg >= 100 ? teamAvg.toFixed(0) : teamAvg.toFixed(2)) : null };
  }, [exercise, dateRange, snapshots, activeAthletes]);

  // Reset resumo automático quando filtros críticos mudam
  React.useEffect(() => { setEditedSummary(null); }, [mode, selected, exercise, period, primaryMetric]);

  // ── Alertas: atletas em queda >5% no período ──
  const alerts = useMemo(() => {
    const [dMin, dMax] = dateRange;
    const relevantSnaps = snapshots.filter(s => s.session_date >= dMin && s.session_date <= dMax);
    const list = [];
    activeAthletes.forEach(ath => {
      EXERCISES.forEach(exName => {
        const athSnaps = relevantSnaps.filter(s => s.athlete_id === ath.id && s.exercise === exName);
        if (athSnaps.length < 3) return;
        athSnaps.sort((a,b) => new Date(a.session_date) - new Date(b.session_date));
        // Delta de força relativa (métrica chave)
        const getVal = (s) => {
          const bw = s.body_weight_session || ath.body_weight;
          if (!bw || bw < 40 || !s.e1rm) return null;
          return s.e1rm / bw;
        };
        const vals = athSnaps.map(getVal).filter(v => v != null);
        if (vals.length < 3) return;
        const nEnd = Math.min(2, Math.floor(vals.length / 2));
        const start = vals.slice(0, nEnd).reduce((a,b)=>a+b,0) / nEnd;
        const end = vals.slice(-nEnd).reduce((a,b)=>a+b,0) / nEnd;
        if (start === 0) return;
        const deltaPct = ((end - start) / start) * 100;
        if (deltaPct < -5) {
          list.push({
            athlete: ath, exercise: exName,
            deltaPct: +deltaPct.toFixed(1),
            sessions: vals.length,
            severity: deltaPct < -10 ? 2 : 1
          });
        }
      });
    });
    return list.sort((a,b) => a.deltaPct - b.deltaPct);
  }, [activeAthletes, snapshots, dateRange]);

  // ── Resumo executivo automático ──
  const executiveSummary = useMemo(() => {
    if (editedSummary != null) return editedSummary;
    if (selected.length === 0) return "";
    const primary = METRICS.find(m => m.key === primaryMetric) || METRICS[0];
    const series = buildSeries(primary);
    if (series.length === 0) return "";
    // Analisa a primeira série
    const s = series[0];
    const pts = s.points.filter(p => p.value != null).sort((a,b) => new Date(a.date) - new Date(b.date));
    if (pts.length < 3) return "Poucos dados no período para análise conclusiva.";
    const nEnd = Math.min(3, Math.ceil(pts.length / 2));
    const start = pts.slice(0, nEnd).reduce((sm,p) => sm + p.value, 0) / nEnd;
    const end = pts.slice(-nEnd).reduce((sm,p) => sm + p.value, 0) / nEnd;
    const deltaPct = start > 0 ? ((end - start) / start) * 100 : 0;
    const dir = deltaPct > 3 ? "evoluiu" : deltaPct < -3 ? "regrediu" : "manteve-se estável";
    const mag = Math.abs(deltaPct).toFixed(1);
    const label = primary.label.replace(/\s*\([^)]*\)/, "");
    if (Math.abs(deltaPct) < 3) {
      return s.name + " " + dir + " em " + label + " ao longo de " + pts.length + " sessões no período analisado.";
    }
    return s.name + " " + dir + " " + mag + "% em " + label + " ao longo de " + pts.length + " sessões (" + exercise + ").";
  }, [selected, primaryMetric, buildSeries, editedSummary, exercise]);

  // Exportar PDF do dashboard atual
  const exportPDF = async () => {
    const node = document.querySelector('[data-reports-content]');
    if (!node || !window.html2canvas || !window.jspdf) return;
    try {
      const canvas = await window.html2canvas(node, { scale: 2, backgroundColor: '#FAFAFA', useCORS: true, logging: false });
      const imgData = canvas.toDataURL('image/png');
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF({ orientation: 'p', unit: 'mm', format: 'a4' });
      const pageW = 210, pageH = 297;
      const margin = 10;
      const imgW = pageW - margin * 2;
      const imgH = (canvas.height * imgW) / canvas.width;
      // Header do PDF
      pdf.setFillColor(10, 10, 11);
      pdf.rect(0, 0, pageW, 20, 'F');
      pdf.setTextColor(255, 255, 255);
      pdf.setFont('helvetica', 'bold');
      pdf.setFontSize(11);
      pdf.text('RELATORIO DE PERFORMANCE', margin, 8);
      pdf.setFont('helvetica', 'normal');
      pdf.setFontSize(8);
      pdf.setTextColor(180, 180, 180);
      pdf.text(exercise + ' | ' + dateRange[0].split('-').reverse().join('/') + ' - ' + dateRange[1].split('-').reverse().join('/'), margin, 14);
      pdf.setTextColor(180, 180, 180);
      pdf.text('CAP Performance', pageW - margin, 8, { align: 'right' });
      pdf.setFontSize(7);
      pdf.text(new Date().toLocaleDateString('pt-BR'), pageW - margin, 14, { align: 'right' });
      // Imagem do dashboard
      let y = 25;
      if (imgH <= pageH - y - 15) {
        pdf.addImage(imgData, 'PNG', margin, y, imgW, imgH);
      } else {
        // Multi-page
        let remaining = imgH;
        let sourceY = 0;
        const availH = pageH - y - 15;
        while (remaining > 0) {
          const chunkH = Math.min(availH, remaining);
          const chunkCanvas = document.createElement('canvas');
          chunkCanvas.width = canvas.width;
          chunkCanvas.height = (chunkH / imgH) * canvas.height;
          const ctx = chunkCanvas.getContext('2d');
          ctx.drawImage(canvas, 0, sourceY, canvas.width, chunkCanvas.height, 0, 0, canvas.width, chunkCanvas.height);
          pdf.addImage(chunkCanvas.toDataURL('image/png'), 'PNG', margin, y, imgW, chunkH);
          sourceY += chunkCanvas.height;
          remaining -= chunkH;
          if (remaining > 0) { pdf.addPage(); y = margin; }
        }
      }
      // Rodape
      pdf.setFontSize(7);
      pdf.setTextColor(140, 140, 140);
      pdf.text('VBT-force | vbtforce.vercel.app', margin, pageH - 5);
      pdf.save('relatorio-' + exercise.replace(/\s+/g, '-').toLowerCase() + '-' + new Date().toISOString().slice(0,10) + '.pdf');
    } catch(e) { console.error('Erro PDF:', e); alert('Erro ao gerar PDF: ' + e.message); }
  };

  return el("div", { style: { display: "flex", flexDirection: "column", flex: 1, minHeight: 0, overflow: "hidden", background: R.bg } },
    // ─── HEADER de filtros (minimalista) ───
    el("div", { style: { padding: "16px 24px", background: "#fff", borderBottom: "1px solid " + R.border, flexShrink: 0 } },
      el("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 } },
        el("div", null,
          el("h1", { style: { fontSize: 18, fontWeight: 600, color: R.text, margin: 0, letterSpacing: "-.02em" } }, "Relatórios"),
          el("div", { style: { fontSize: 12, color: R.textSub, marginTop: 2, fontWeight: 400 } }, "Evolução de performance por atleta, categoria ou posição")
        ),
        el("div", { style: { display: "flex", alignItems: "center", gap: 8 } },
          // Badge de alertas
          alerts.length > 0 && el("button", { onClick: () => setShowAlerts(true), style: {
            display: "flex", alignItems: "center", gap: 6,
            padding: "7px 12px", background: "#fff", color: R.text,
            border: "1px solid " + R.border, borderRadius: 6, fontSize: 12, fontWeight: 500,
            cursor: "pointer", position: "relative"
          }},
            el("span", { style: { width: 6, height: 6, borderRadius: "50%", background: R.negative, display: "inline-block" } }),
            el("span", null, alerts.length + " " + (alerts.length === 1 ? "alerta" : "alertas"))
          ),
          selected.length > 0 && el("button", { onClick: exportPDF, style: {
            display: "flex", alignItems: "center", gap: 6,
            padding: "7px 14px", background: R.text, color: "#fff",
            border: "none", borderRadius: 6, fontSize: 12, fontWeight: 500,
            cursor: "pointer", letterSpacing: ".01em"
          }},
            Icon.Download(12, "#fff"),
            el("span", null, "Exportar PDF")
          )
        )
      ),
      // Linha de filtros
      el("div", { style: { display: "flex", flexWrap: "wrap", gap: 20, alignItems: "flex-end" } },
        // Modo
        el("div", { style: { display: "flex", flexDirection: "column", gap: 5 } },
          el("span", { style: { fontSize: 10, fontWeight: 500, color: R.textMuted, letterSpacing: ".06em", textTransform: "uppercase" } }, "Modo"),
          el("div", { style: { display: "flex", gap: 2, background: "#F5F5F5", padding: 2, borderRadius: 5 } },
            ...[["atleta","Atleta"],["grupo","Categoria"],["posicao","Posicao"]].map(([v,l]) =>
              el("button", { key: v, onClick: () => setMode(v), style: {
                padding: "5px 10px", borderRadius: 4, fontSize: 11, fontWeight: 500, cursor: "pointer",
                border: "none",
                background: mode === v ? "#fff" : "transparent",
                color: mode === v ? R.text : R.textSub,
                boxShadow: mode === v ? "0 1px 2px rgba(0,0,0,0.05)" : "none",
                transition: "all .15s"
              }}, l)
            )
          )
        ),
        // Exercicio
        el("div", { style: { display: "flex", flexDirection: "column", gap: 5 } },
          el("span", { style: { fontSize: 10, fontWeight: 500, color: R.textMuted, letterSpacing: ".06em", textTransform: "uppercase" } }, "Exercicio"),
          el("select", { value: exercise, onChange: e => setExercise(e.target.value), style: {
            padding: "6px 26px 6px 10px", borderRadius: 5, border: "1px solid " + R.border,
            fontSize: 11.5, fontWeight: 500, color: R.text, background: "#fff",
            minWidth: 150, cursor: "pointer",
            appearance: "none",
            backgroundImage: "url(\"data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 12 12'%3e%3cpath d='M3 5l3 3 3-3' stroke='%23A3A3A3' stroke-width='1.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3e%3c/svg%3e\")",
            backgroundRepeat: "no-repeat", backgroundPosition: "right 8px center"
          }},
            ...EXERCISES.map(e => el("option", { key: e, value: e }, e))
          )
        ),
        // Periodo
        el("div", { style: { display: "flex", flexDirection: "column", gap: 5 } },
          el("span", { style: { fontSize: 10, fontWeight: 500, color: R.textMuted, letterSpacing: ".06em", textTransform: "uppercase" } }, "Periodo"),
          el("div", { style: { display: "flex", gap: 2, background: "#F5F5F5", padding: 2, borderRadius: 5 } },
            ...[["30d","30d"],["90d","90d"],["temporada","Temporada"],["custom","Custom"]].map(([v,l]) =>
              el("button", { key: v, onClick: () => setPeriod(v), style: {
                padding: "5px 10px", borderRadius: 4, fontSize: 11, fontWeight: 500, cursor: "pointer",
                border: "none",
                background: period === v ? "#fff" : "transparent",
                color: period === v ? R.text : R.textSub,
                boxShadow: period === v ? "0 1px 2px rgba(0,0,0,0.05)" : "none",
                transition: "all .15s"
              }}, l)
            )
          )
        ),
        period === "custom" && el("div", { style: { display: "flex", gap: 6, alignItems: "center" } },
          el("input", { type: "date", value: customStart, onChange: e => setCustomStart(e.target.value), style: { padding: "5px 8px", borderRadius: 5, border: "1px solid " + R.border, fontSize: 11 } }),
          el("span", { style: { fontSize: 10, color: R.textMuted } }, "->"),
          el("input", { type: "date", value: customEnd, onChange: e => setCustomEnd(e.target.value), style: { padding: "5px 8px", borderRadius: 5, border: "1px solid " + R.border, fontSize: 11 } })
        )
      ),
      // Selecao de atletas/categorias
      el("div", { style: { marginTop: 14, paddingTop: 14, borderTop: "1px solid " + R.border, display: "flex", flexDirection: "column", gap: 6 } },
        el("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center" } },
          el("span", { style: { fontSize: 10, fontWeight: 500, color: R.textMuted, letterSpacing: ".06em", textTransform: "uppercase" } },
            "Selecionar ate 4 " + (mode === "atleta" ? "atletas" : mode === "grupo" ? "categorias" : "posicoes") + " (" + selected.length + "/4)"),
          selected.length > 0 && el("button", { onClick: () => setSelected([]), style: {
            padding: "3px 8px", borderRadius: 4, border: "none", background: "transparent", fontSize: 10, fontWeight: 500, color: R.textSub, cursor: "pointer"

          ...options.map(opt => {
            const isSel = selected.includes(opt.id);

            const color = isSel ? REPORT_COLORS[idx % REPORT_COLORS.length] : null;

            }}, opt.label);
          })
        )
      ),
      // ── Benchmark de referência ──
      el("div", { style: { marginTop: 14, paddingTop: 14, borderTop: "1px solid " + R.border, display: "flex", alignItems: "center", gap: 12, flexWrap: "wrap" } },
        el("span", { style: { fontSize: 10, fontWeight: 500, color: R.textMuted, letterSpacing: ".06em", textTransform: "uppercase" } }, "Referência"),
        el("div", { style: { display: "flex", gap: 2, background: "#F5F5F5", padding: 2, borderRadius: 5 } },
          ...[["none","Nenhuma"],["team_avg","Média do time"],["team_max","Máximo do time"],["athlete","Atleta"]].map(([v,l]) =>
            el("button", { key: v, onClick: () => setBenchmarkType(v), style: {

              color: benchmarkType === v ? R.text : R.textSub,
              boxShadow: benchmarkType === v ? "0 1px 2px rgba(0,0,0,0.05)" : "none"
            }}, l)
          )
        ),
        benchmarkType === "athlete" && el("select", {
          value: benchmarkAthlete || "",
          onChange: e => setBenchmarkAthlete(e.target.value || null),

                  return el("div", { key: metric.key, onClick: () => setPrimaryMetric(metric.key), style: {

                        el("div", { style: { display: "flex", alignItems: "baseline", gap: 6 } },
                          el("span", { style: { fontSize: 18, fontWeight: 600, color: R.text, fontVariantNumeric: "tabular-nums", lineHeight: 1 } },

function App() {
  const el = React.createElement;
  const [view, setView] = useState("dashboard");
  const [athletes, setAthletes] = useState([]);
  const [profiles, setProfiles] = useState({});
  const [bars, setBars] = useState({olympic_kg:20, trapbar_kg:30});
  const [microDays, setMicroDays] = useState({});
  const [dataLoaded, setDataLoaded] = useState(false);
  const [syncing, setSyncing] = useState(false);
  const [showBars, setShowBars] = useState(false);
  const [error, setError] = useState(null);

  // Load all data on mount
  useEffect(() => {
    (async () => {
      setSyncing(true);
      try {
        const ath = await api.get("athletes", "club_id=eq." + CLUB_ID + "&order=name");
        const profs = await api.get("vbt_profiles", "club_id=eq." + CLUB_ID + "&select=*,athletes(name)");
        const barsData = await api.get("bars_config", "club_id=eq." + CLUB_ID);

        setAthletes(ath || []);

        const pmap = {};
        (profs || []).forEach(p => {
          const name = p.athletes && p.athletes.name;
          if (!name) return;
          if (!pmap[name]) pmap[name] = {};
          pmap[name][p.exercise] = {
            reg: p.reg, reliable: p.reliable, e1rm: p.e1rm,
            maxLoad: p.max_load, maxMpv: p.max_mpv, nReps: p.n_reps,
            pts: p.pts || [], _id: p.id, _athlete_id: p.athlete_id
          };
        });
        setProfiles(pmap);

        if (barsData && barsData[0]) setBars(barsData[0]);

        // Load inicial de microciclo v2 é sob demanda (loadMonth via MicrocycleView)
        // Carrega snapshots históricos de sessão VBT
        await loadSnapshots();
        setDataLoaded(true);
      } catch (e) {
        console.error("Load error:", e);
        setError(e.message);
      }
      setSyncing(false);
    })();
  }, []);

  // === Presença ===
  const importPresenca = async (records, datasAfetadas) => {
    // Deduplica por (atleta_id, data, periodo, contexto) mantendo o "mais completo"
    // — se dois registros da planilha viraram o mesmo atleta na mesma data,
    // mantém o que tem grupo preenchido; se ambos têm, o último ganha.
    const dedup = new Map();
    for (const r of records) {
      const key = r.atleta_id + '|' + r.data + '|' + (r.periodo||'') + '|' + (r.contexto||'');
      const existing = dedup.get(key);
      if (!existing) { dedup.set(key, r); continue; }
      // Prefere quem tem grupo/motivo/observacao preenchido
      const scoreExisting = (existing.grupo?1:0) + (existing.motivo?1:0) + (existing.observacao?1:0);
      const scoreNew = (r.grupo?1:0) + (r.motivo?1:0) + (r.observacao?1:0);
      if (scoreNew >= scoreExisting) dedup.set(key, r);
    }
    const dedupedRecords = [...dedup.values()];

    const BATCH = 200;
    let inseridos = 0, falhas = 0;
    const errosDetalhe = [];
    for (let i = 0; i < dedupedRecords.length; i += BATCH) {
      const chunk = dedupedRecords.slice(i, i + BATCH).map(r => ({ ...r, club_id: CLUB_ID }));
      try {
        const res = await api.upsert('presenca_sessao', chunk, 'atleta_id,data,periodo,contexto');
        if (Array.isArray(res)) inseridos += res.length;
        else {
          falhas += chunk.length;
          errosDetalhe.push('Batch ' + i + ': falha (ver console)');
        }
      } catch(e) {
        falhas += chunk.length;
        errosDetalhe.push('Batch ' + i + ': ' + e.message);
      }
    }
    return { inseridos, falhas, errosDetalhe, duplicatasRemovidas: records.length - dedupedRecords.length };
  };

  const loadPresencaDia = React.useCallback(async (dataStr) => {
    if (!dataStr) return [];
    const rows = await api.get('presenca_sessao',
      'club_id=eq.' + CLUB_ID + '&data=eq.' + dataStr + '&order=grupo.asc,atleta_id.asc');
    return (rows || []).map(r => ({
      ...r,
      athlete_id: r.atleta_id || r.athlete_id
    }));
  }, []);

  const updatePresenca = React.useCallback(async (recordId, updates) => {
    const body = { ...updates, updated_at: new Date().toISOString(), source: 'manual' };
    await api.patch('presenca_sessao', 'id', recordId, body);
  }, []);

  // Salva presença de sessão VBT (contexto='vbt')
  const savePresencaSessao = React.useCallback(async (dateStr, presencaMap, source) => {
    const records = Object.entries(presencaMap).map(([atleta_id, status]) => ({
      atleta_id, data: dateStr, periodo: 'sessao_vbt', contexto: 'vbt',
      status, source: source || 'manual', club_id: CLUB_ID
    }));
    if (records.length === 0) return { inseridos: 0 };
    try {
      const res = await api.upsert('presenca_sessao', records, 'atleta_id,data,periodo,contexto');
      return { inseridos: Array.isArray(res) ? res.length : records.length };
    } catch(e) {
      console.error("Erro ao salvar presença VBT:", e);
      return { inseridos: 0, erro: e.message };
    }
  }, []);

  // Carrega presença de sessão VBT do dia
  const loadPresencaSessao = React.useCallback(async (dateStr) => {
    if (!dateStr) return [];
    try {
      const rows = await api.get('presenca_sessao',
        'club_id=eq.' + CLUB_ID + '&data=eq.' + dateStr + '&contexto=eq.vbt');
      return rows || [];
    } catch(e) { console.error("Erro load presença VBT:", e); return []; }
  }, []);

  // CRUD operations
  const saveAthlete = async (data) => {
    setSyncing(true);
    const body = {
      name: data.name, nickname: data.nickname || null,
      dob: data.dob || null, position: data.position || null,
      categories: data.categories || [], status: data.status || "ativo",
      photo_url: data.photo || null,
      body_weight: data.body_weight != null ? data.body_weight : null,
      height_cm: data.height_cm != null ? data.height_cm : null,
      club_id: CLUB_ID
    };

    if (data.id) {
      const res = await api.patch("athletes", "id", data.id, body);
      if (res && res[0]) setAthletes(a => a.map(x => x.id === data.id ? res[0] : x));
    } else {
      const res = await api.post("athletes", body);
      if (res && res[0]) setAthletes(a => [...a, res[0]]);
    }
    setSyncing(false);
  };

  const deleteAthlete = async (id) => {
    setSyncing(true);
    await api.del("athletes", id);
    setAthletes(a => a.filter(x => x.id !== id));
    setSyncing(false);
  };

  // CSV import: takes parsed profiles + athletes, saves to Supabase
  const saveProfiles = async (newProfilesMap, athletesList, snapshotsArr) => {
    setSyncing(true);
    const updatedProfiles = {...profiles};

    for (const [name, exMap] of Object.entries(newProfilesMap)) {
      // Find athlete by name (exact match — fuzzy was already done in parseCSV)
      const athlete = athletesList.find(a => a.name === name);
      if (!athlete) {
        console.warn("Athlete not found for profile:", name);
        continue;
      }

      for (const [ex, newProf] of Object.entries(exMap)) {
        // Merge with existing points if any
        const existing = updatedProfiles[name] && updatedProfiles[name][ex];
        let finalProf = newProf;
        if (existing) {
          const existingPts = existing.pts || [];
          const newPts = newProf.pts || [];
          const seen = new Set(existingPts.map(p => p.load + "_" + p.mpv.toFixed(3)));
          const added = newPts.filter(p => !seen.has(p.load + "_" + p.mpv.toFixed(3)));
          const allPts = [...existingPts, ...added];
          finalProf = buildProfile(allPts, ex);
        }

        const body = {
          athlete_id: athlete.id,
          club_id: CLUB_ID,
          exercise: ex,
          pts: finalProf.pts,
          reg: finalProf.reg,
          reliable: finalProf.reliable,
          e1rm: finalProf.e1rm,
          max_load: finalProf.maxLoad,
          max_mpv: finalProf.maxMpv,
          n_reps: finalProf.nReps,
          updated_at: new Date().toISOString()
        };

        const res = await api.upsert("vbt_profiles", body, "athlete_id,exercise");
        if (res && res[0]) {
          if (!updatedProfiles[name]) updatedProfiles[name] = {};
          updatedProfiles[name][ex] = {
            ...finalProf,
            _id: res[0].id,
            _athlete_id: athlete.id
          };
        }
      }
    }

    // Grava snapshots de sessão (evolução histórica)
    if (Array.isArray(snapshotsArr) && snapshotsArr.length > 0) {
      let snapOk = 0, snapErr = 0;
      for (const s of snapshotsArr) {
        const athlete = athletesList.find(a => a.name === s.athleteName);
        if (!athlete) { snapErr++; continue; }
        try {
          await api.upsert("vbt_session_snapshots", {
            athlete_id: athlete.id,
            club_id: CLUB_ID,
            exercise: s.exercise,
            session_date: s.session_date,
            e1rm: s.e1rm,
            mean_power: s.mean_power,
            mean_velocity: s.mean_velocity,
            max_load: s.max_load,
            reps_count: s.reps_count,
            // Novos campos (só serão gravados se a coluna existir no banco)
            peak_power: s.peak_power,
            peak_power_rel: s.peak_power_rel,
            peak_velocity: s.peak_velocity,
            body_weight_session: s.body_weight_session,
            min_velocity: s.min_velocity,
            max_load_session: s.max_load_session
          }, "athlete_id,exercise,session_date");
          snapOk++;
        } catch(e) { snapErr++; console.warn("Snapshot erro:", s, e); }
      }
      console.log("Snapshots gravados:", snapOk, "erros:", snapErr);
      // Recarrega snapshots do banco após inserir
      await loadSnapshots();
    }

    setProfiles(updatedProfiles);
    setSyncing(false);
  };

  // Snapshots de sessão VBT (evolução histórica)
  const [snapshots, setSnapshots] = useState([]);
  const loadSnapshots = React.useCallback(async () => {
    try {
      const rows = await api.get("vbt_session_snapshots",
        "club_id=eq." + CLUB_ID + "&order=session_date.asc&limit=5000");
      setSnapshots(rows || []);
    } catch(e) { console.error("Erro ao carregar snapshots:", e); }
  }, []);

  const saveBars = async (newBars) => {
    setBars(newBars);
    await api.upsert("bars_config", {...newBars, club_id: CLUB_ID, updated_at: new Date().toISOString()}, "club_id");
  };

  // Debounce map: dateStr -> timeoutId
  const mv2SaveTimersRef = React.useRef({});
  const mv2LastCatRef = React.useRef(null);
  const [selectedCategoria, setSelectedCategoria] = useState('Profissional');

  const saveMicroDay = (dateStr, dayData) => {
    // Estado local imediato (UI reativa)
    setMicroDays(prev => ({ ...prev, [dateStr]: dayData }));
    // Debounce da chamada ao Supabase
    const timers = mv2SaveTimersRef.current;
    const cat = selectedCategoria;
    if (timers[dateStr]) clearTimeout(timers[dateStr]);
    timers[dateStr] = setTimeout(async () => {
      try {
        await mv2_saveDia(dateStr, dayData, cat);
      } catch(e) { console.error("Erro ao salvar dia " + dateStr + ":", e); }
      delete timers[dateStr];
    }, 400);
  };

  // Carrega os 42 dias visíveis no calendário de um mês, filtrados por categoria
  const loadMonth = React.useCallback(async (year, month0, categoria) => {
    const cat = categoria || 'Profissional';
    // Range = primeira segunda da grid ao último domingo (42 dias)
    const first = new Date(year, month0, 1);
    const startDay = first.getDay() === 0 ? 6 : first.getDay() - 1;
    const rangeStart = new Date(year, month0, 1 - startDay);
    const rangeEnd = new Date(rangeStart);
    rangeEnd.setDate(rangeEnd.getDate() + 41);
    const fmt = d => localDateStr(d);
    try {
      const dias = await mv2_loadDiasRange(fmt(rangeStart), fmt(rangeEnd), cat);
      // Se categoria mudou, resetar tudo antes de mesclar (evita ver dados de outra categoria)
      if (mv2LastCatRef.current !== cat) {
        mv2LastCatRef.current = cat;
        setMicroDays(dias);
      } else {
        setMicroDays(prev => ({ ...prev, ...dias }));
      }
    } catch(e) { console.error("Erro ao carregar mês:", e); }
  }, []);

  // Expose for fuzzy lookup
  window._vbtProfiles = profiles;

  const TABS = [
    {id: "dashboard", icon: "📈", label: "Início"},
    {id: "session",  icon: "⚡", label: "Sessão"},
    {id: "micro",    icon: "📅", label: "Microciclo"},
    {id: "athletes", icon: "👤", label: "Atletas"},
    {id: "presenca", icon: "✓", label: "Presença"},
    {id: "profiles", icon: "📊", label: "Perfis LV"},
    {id: "reports",  icon: "📋", label: "Relatórios"}
  ];

  return el("div", {style: {fontFamily: "'Inter',system-ui,sans-serif", background: T.bg, height: "100vh", display: "flex", flexDirection: "column"}},
    // Nav bar
    el("nav", {style: {display: "flex", alignItems: "center", padding: "0 18px", height: 50, background: "#fff", boxShadow: "0 1px 3px rgba(0,0,0,0.06)", flexShrink: 0, gap: 4}},
      el("div", {style: {fontWeight: 900, fontSize: 15, letterSpacing: "-.03em", marginRight: 14, color: T.text}},
        "VBT", el("span", {style: {color: T.accent}}, "·"), "force"
      ),
      ...TABS.map(t => el("button", {key: t.id, onClick: () => setView(t.id),
        style: {
          padding: "5px 13px", borderRadius: 8, border: "none", fontSize: 13, cursor: "pointer",
          background: view === t.id ? "#EBF4FF" : "transparent",
          color: view === t.id ? T.accent : T.sub,
          fontWeight: view === t.id ? 700 : 400,
          display: "flex", alignItems: "center", gap: 5
        }},
        el("span", null, t.icon),
        el("span", {className: "tab-label"}, t.label)
      )),
      el("div", {style: {marginLeft: "auto", display: "flex", alignItems: "center", gap: 8}},
        el("button", {onClick: () => setShowBars(true),
          style: {
            display: "flex", alignItems: "center", gap: 5, padding: "4px 10px", borderRadius: 6,
            border: "1px solid " + T.border, background: "#fff", color: T.sub,
            fontSize: 11, fontWeight: 700, cursor: "pointer"
          }},
          "🏋️ OL " + bars.olympic_kg + "kg · TB " + bars.trapbar_kg + "kg"
        ),
        syncing && el("span", {style: {fontSize: 11, color: T.muted}}, "⟳"),
        el("div", {style: {display: "flex", alignItems: "center", gap: 5, padding: "4px 9px",
          borderRadius: 6, background: "#F0FFF4", border: "1px solid #9AE6B4"}, title: "Supabase conectado"},
          el("div", {style: {width: 6, height: 6, borderRadius: "50%", background: "#38A169"}}),
          el("span", {style: {fontSize: 11, color: "#2F855A", fontWeight: 700}},
            athletes.filter(a => a.status === "ativo").length + " ativos · " + Object.keys(profiles).length + " perfis"
          )
        )
      )
    ),

    // Content
    el("div", {style: {flex: 1, overflow: "hidden", display: "flex", flexDirection: "column", minHeight: 0}},
      error && el("div", {style: {padding: "10px 20px", background: "#FFF5F5", color: "#C53030", fontSize: 13}}, "Erro: " + error),
      !dataLoaded && el(Spinner),
      dataLoaded && view === "dashboard" && el(DashboardView, {athletes, profiles, loadMonth, microDays, snapshots}),
      dataLoaded && view === "session"  && el(SessionView,  {athletes, profiles, bars, snapshots, savePresencaSessao, loadPresencaSessao}),
      dataLoaded && view === "micro"    && el(MicrocycleView, {microDays, saveMicroDay, loadMonth, selectedCategoria, setSelectedCategoria}),
      dataLoaded && view === "athletes" && el(AthletesView, {athletes, setAthletes, profiles, setProfiles, saveAthlete, deleteAthlete, saveProfiles}),
      dataLoaded && view === "presenca" && el(PresencaView, {athletes, importPresenca, loadPresencaDia, updatePresenca}),
      dataLoaded && view === "profiles" && el(ProfilesView, {athletes, profiles}),
      dataLoaded && view === "reports"  && el(ReportsView,  {athletes, snapshots})
    ),

    // Mobile bottom nav
    el("div", {className: "mobile-nav", style: {display: "none", borderTop: "1px solid " + T.border, background: "#fff", padding: "6px 0"}},
      ...TABS.map(t => el("button", {key: t.id, onClick: () => setView(t.id),
        style: {
          flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 2,
          padding: "5px 0", border: "none", background: "none", cursor: "pointer",
          color: view === t.id ? T.accent : T.muted
        }},
        el("span", {style: {fontSize: 20}}, t.icon),
        el("span", {style: {fontSize: 10, fontWeight: 700}}, t.label)
      ))
    ),

    showBars && el(BarsModal, {bars, setBars: saveBars, onClose: () => setShowBars(false)})
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));

</script>
</body>
</html>
