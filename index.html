const headers = () => ({
  "apikey": SUPA_KEY,
  "Authorization": "Bearer " + SUPA_KEY,
  "Content-Type": "application/json",
  "Prefer": "return=representation"
});

const api = {
  async get(table, query) {
    try {
      const url = SUPA_URL + "/rest/v1/" + table + (query ? "?" + query : "");
      const r = await fetch(url, { headers: headers() });
      if (!r.ok) { console.error("GET", table, r.status, await r.text()); return []; }
      return r.json();
    } catch(e) { console.error("GET error:", e); return []; }
  },
  async post(table, body) {
    try {
      const r = await fetch(SUPA_URL + "/rest/v1/" + table, {
        method: "POST", headers: headers(), body: JSON.stringify(body)
      });
      if (!r.ok) { console.error("POST", table, r.status, await r.text()); return null; }
      return r.json();
    } catch(e) { console.error("POST error:", e); return null; }
  },
  async patch(table, col, val, body) {
    try {
      const r = await fetch(SUPA_URL + "/rest/v1/" + table + "?" + col + "=eq." + val, {
        method: "PATCH", headers: headers(), body: JSON.stringify(body)
      });
      if (!r.ok) { console.error("PATCH", table, r.status, await r.text()); return null; }
      return r.json();
    } catch(e) { console.error("PATCH error:", e); return null; }
  },
  async upsert(table, body, onConflict) {
    try {
      const h = {...headers(), "Prefer": "resolution=merge-duplicates,return=representation"};
      const url = SUPA_URL + "/rest/v1/" + table + (onConflict ? "?on_conflict=" + onConflict : "");
      const r = await fetch(url, { method: "POST", headers: h, body: JSON.stringify(body) });
      if (!r.ok) { console.error("UPSERT", table, r.status, await r.text()); return null; }
      return r.json();
    } catch(e) { console.error("UPSERT error:", e); return null; }
  },
  async del(table, id) {
    try {
      await fetch(SUPA_URL + "/rest/v1/" + table + "?id=eq." + id, {
        method: "DELETE", headers: headers()
      });
    } catch(e) { console.error("DEL error:", e); }
  },
  async delete(table, query) {
    try {
      const r = await fetch(SUPA_URL + "/rest/v1/" + table + "?" + query, {
        method: "DELETE", headers: headers()
      });
      if (!r.ok) console.error("DELETE", table, r.status, await r.text());
    } catch(e) { console.error("DELETE error:", e); }
  }
};

// MICROCICLO V2 — API
// ═══════════════════════════════════════════════════════════════════════════
const apiV2 = {
  async getMesociclo(id) {
    const r = await api.get('mesociclo', 'id=eq.' + id);
    return r[0] || null;
  },
  async listMesociclos(temporada, categoria) {
    let q = 'temporada=eq.' + temporada + '&order=data_inicio.asc';
    if (categoria) q += '&categoria_id=eq.' + encodeURIComponent(categoria);
    return api.get('mesociclo', q);
  },
  async createMesociclo(payload) {
    const r = await api.post('mesociclo', payload);
    return r && r[0];
  },
  async createMicrociclo({ mesociclo_id, semana_numero }) {
    const meso = await apiV2.getMesociclo(mesociclo_id);
    if (!meso) throw new Error('Mesociclo nao encontrado.');
    const r = await api.post('microciclo', {
      mesociclo_id, semana_numero,
      fase: meso.fase, carga_alvo: meso.carga_alvo,
      overridden: false, override_reason: null
    });
    return r && r[0];
  },
  async listMicrociclos(mesociclo_id) {
    return api.get('microciclo', 'mesociclo_id=eq.' + mesociclo_id + '&order=semana_numero.asc');
  },
  async updateMicrocicloField(microciclo_id, campo, valor, override_reason = null) {
    if (!['fase','carga_alvo'].includes(campo)) throw new Error('Campo nao overridable.');
    const micro = await api.get('microciclo', 'id=eq.' + microciclo_id);
    if (!micro[0]) throw new Error('Microciclo nao encontrado.');
    const meso = await apiV2.getMesociclo(micro[0].mesociclo_id);
    const divergiu = valor !== meso[campo];
    if (divergiu && (!override_reason || !override_reason.trim())) {
      throw new Error('override_reason obrigatorio ao divergir do mesociclo.');
    }
    const r = await api.patch('microciclo', 'id', microciclo_id, {
      [campo]: valor,
      overridden: divergiu,
      override_reason: divergiu ? override_reason.trim() : null
    });
    return r && r[0];
  },
  async listDiasDoMicrociclo(microciclo_id) {
    return api.get('dia', 'microciclo_id=eq.' + microciclo_id + '&select=*,jogo(*)&order=data.asc');
  },
  async upsertPeriodoDoDia(microciclo_id, data_dia, periodo, conteudo) {
    if (!['periodo_manha','periodo_tarde'].includes(periodo)) throw new Error('Periodo invalido.');
    const existente = await api.get('dia', 'microciclo_id=eq.' + microciclo_id + '&data=eq.' + data_dia);
    const atual = existente[0] || { periodo_manha: {}, periodo_tarde: {} };
    const payload = {
      microciclo_id, data: data_dia,
      periodo_manha: periodo === 'periodo_manha' ? conteudo : atual.periodo_manha,
      periodo_tarde: periodo === 'periodo_tarde' ? conteudo : atual.periodo_tarde
    };
    const r = await api.upsert('dia', payload, 'microciclo_id,data');
    return r && r[0];
  },
  async upsertGrupoNoPeriodo(microciclo_id, data_dia, periodo, grupo) {
    const existente = await api.get('dia', 'microciclo_id=eq.' + microciclo_id + '&data=eq.' + data_dia);
    const atual = (existente[0] && existente[0][periodo]) || { tipo: 'treino', grupos: [] };
    const grupos = atual.grupos || [];
    const idx = grupos.findIndex(g => g.categoria === grupo.categoria);
    const novos = idx >= 0
      ? grupos.map((g,i) => i === idx ? { ...g, ...grupo } : g)
      : [...grupos, grupo];
    return apiV2.upsertPeriodoDoDia(microciclo_id, data_dia, periodo, { ...atual, grupos: novos });
  },
  async upsertJogo(dia_id, periodo, dados) {
    const r = await api.upsert('jogo', { dia_id, periodo, ...dados }, 'dia_id,periodo');
    return r && r[0];
  },
  async deleteJogo(dia_id, periodo) {
    await fetch(SUPA_URL + '/rest/v1/jogo?dia_id=eq.' + dia_id + '&periodo=eq.' + periodo, {
      method: 'DELETE', headers: headers()
    });
  }
};

// MICROCICLO V2 — HELPERS (semana, cache, conversão flat<->nested)
// ═══════════════════════════════════════════════════════════════════════════
// Regra de semana: começa na segunda. Semana pertence ao mês em que cai a segunda.

// Converte Date object para YYYY-MM-DD usando hora LOCAL (não UTC)
// Evita bug do "dia trocado à noite" que toISOString().slice(0,10) causa
function localDateStr(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return y + '-' + m + '-' + day;
}

function mv2_getMonday(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const dow = d.getDay(); // 0=dom
  const diff = dow === 0 ? -6 : 1 - dow;
  d.setDate(d.getDate() + diff);
  return localDateStr(d);
}
function mv2_getWeekMonthKey(dateStr) {
  return mv2_getMonday(dateStr).slice(0,7); // "YYYY-MM"
}
function mv2_getSemanaNumero(dateStr) {
  const monday = mv2_getMonday(dateStr);
  const [y, mo] = monday.split('-').map(Number);
  const first = new Date(y, mo-1, 1, 12);
  const dow0 = first.getDay();
  const firstMondayDay = dow0 === 1 ? 1 : ((8 - dow0) % 7 || 7);
  const mondayDay = new Date(monday + 'T12:00:00').getDate();
  return Math.max(1, Math.floor((mondayDay - firstMondayDay) / 7) + 1);
}
function mv2_monthKey(year, month0) {
  return year + '-' + String(month0+1).padStart(2,'0');
}
function mv2_monthName(monthKey) {
  const [y, m] = monthKey.split('-').map(Number);
  return new Date(y, m-1, 1).toLocaleDateString('pt-BR', {month:'long', year:'numeric'});
}

// Caches em memória (não persistentes; recarregam ao dar F5)
const mv2_mesocicloCache = {}; // "categoria/YYYY-MM" -> mesociclo
const mv2_microcicloCache = {}; // "mesocicloId/semana" -> microciclo (mesocicloId já é único por categoria)

async function mv2_ensureMesociclo(monthKey, categoria) {
  const cat = categoria || 'Profissional';
  const cacheKey = cat + '/' + monthKey;
  if (mv2_mesocicloCache[cacheKey]) return mv2_mesocicloCache[cacheKey];
  const [y, mo] = monthKey.split('-').map(Number);
  const temporada = String(y);
  const dataInicio = monthKey + '-01';
  const lastDay = new Date(y, mo, 0).getDate();
  const dataFim = monthKey + '-' + String(lastDay).padStart(2,'0');
  const existentes = await apiV2.listMesociclos(temporada, cat);
  const found = existentes.find(m => m.data_inicio === dataInicio);
  if (found) { mv2_mesocicloCache[cacheKey] = found; return found; }
  const novo = await apiV2.createMesociclo({
    nome: mv2_monthName(monthKey),
    fase: 'in_season', carga_alvo: 'moderada',
    data_inicio: dataInicio, data_fim: dataFim, temporada,
    categoria_id: cat
  });
  mv2_mesocicloCache[cacheKey] = novo;
  return novo;
}

async function mv2_ensureMicrociclo(dateStr, categoria) {
  const cat = categoria || 'Profissional';
  const monthKey = mv2_getWeekMonthKey(dateStr);
  const semanaNumero = mv2_getSemanaNumero(dateStr);
  const meso = await mv2_ensureMesociclo(monthKey, cat);
  const key = meso.id + '/' + semanaNumero;
  if (mv2_microcicloCache[key]) return mv2_microcicloCache[key];
  const existentes = await apiV2.listMicrociclos(meso.id);
  const found = existentes.find(m => m.semana_numero === semanaNumero);
  if (found) { mv2_microcicloCache[key] = found; return found; }
  const novo = await apiV2.createMicrociclo({ mesociclo_id: meso.id, semana_numero: semanaNumero });
  mv2_microcicloCache[key] = novo;
  return novo;
}

// Helper: gera id local pra key React de um sub-bloco
function mv2_blockId() { return 'b' + Math.random().toString(36).slice(2, 10); }

// Converte um período flat (am_blocks/pm_blocks/pn_blocks + planos) em objeto jsonb.
// Formato jsonb: { blocks: [...], planos: [...] }
function mv2_flatToPeriodo(flat, p) {
  const blocksIn = Array.isArray(flat[p + '_blocks']) ? flat[p + '_blocks'] : [];
  const planos   = Array.isArray(flat[p + '_planos']) ? flat[p + '_planos'] : [];
  const cleanBlocks = blocksIn
    .filter(b => b && b.tipo)
    .map(b => {
      const c = { tipo: b.tipo };
      if (b.grupos) c.grupos = b.grupos;
      if (b.tipo === 'treino') {
        if (b.atividades) c.atividades = b.atividades;
        if (b.metodologia) c.metodologia = b.metodologia;
        if (b.duracao) c.duracao = b.duracao;
        if (b.zone_id) c.zone_id = b.zone_id;
        if (b.zone_label) c.zone_label = b.zone_label;
        if (b.series) c.series = b.series;
        if (b.reps) c.reps = b.reps;
      }
      if (b.tipo === 'jogo') {
        if (b.opponent) c.opponent = b.opponent;
        if (b.game_location) c.game_location = b.game_location;
        if (b.score) c.score = b.score;
        if (b.competition) c.competition = b.competition;
      }
      return c;
    });
  const out = {};
  if (cleanBlocks.length) out.blocks = cleanBlocks;
  if (planos.length) out.planos = planos;
  return out;
}

// Mapa: chave no jsonb dia -> prefixo flat
const MV2_PERIOD_MAP = [
  { db: 'manha', flat: 'am' },
  { db: 'tarde', flat: 'pm' },
  { db: 'noite', flat: 'pn' }
];

function mv2_nestedToFlat(dia) {
  const flat = {};
  if (dia.notas) flat.notes = dia.notas;
  MV2_PERIOD_MAP.forEach(({db, flat: p}) => {
    const o = dia['periodo_' + db] || {};
    let blocks = [];

    // FORMATO NOVO: já vem com .blocks
    if (Array.isArray(o.blocks)) {
      blocks = o.blocks.map(b => ({ ...b, _id: b._id || mv2_blockId() }));
    }
    // FORMATO ANTIGO: .tipo direto no objeto — migra para 1 bloco
    else if (o.tipo) {
      blocks = [{
        _id: mv2_blockId(),
        tipo: o.tipo,
        grupos: o.grupos,
        atividades: o.atividades,
        metodologia: o.metodologia,
        duracao: o.duracao,
        zone_id: o.zone_id,
        zone_label: o.zone_label,
        series: o.series,
        reps: o.reps
      }];
    }

    // Mescla dados legados da tabela `jogo` (persistidos separadamente antes da mudança)
    if (Array.isArray(dia.jogo)) {
      dia.jogo.forEach(j => {
        if (j.periodo !== db) return;
        let bJogo = blocks.find(b => b.tipo === 'jogo');
        if (!bJogo) {
          bJogo = { _id: mv2_blockId(), tipo: 'jogo' };
          blocks.push(bJogo);
        }
        if (j.adversario && !bJogo.opponent) bJogo.opponent = j.adversario;
        if (j.placar && !bJogo.score) bJogo.score = j.placar;
        if (j.competicao && !bJogo.competition) bJogo.competition = j.competicao;
        if (j.mando && !bJogo.game_location) bJogo.game_location = j.mando === 'casa' ? 'Casa' : 'Fora';
      });
    }

    if (blocks.length) flat[p + '_blocks'] = blocks;

    // Planos anexados (nível do período)
    if (Array.isArray(o.planos) && o.planos.length > 0) {
      flat[p + '_planos'] = o.planos;
    } else if (o.plano_url) {
      // Compat retro
      flat[p + '_planos'] = [{
        url: o.plano_url, path: o.plano_path,
        filename: o.plano_filename, size: o.plano_size
      }];
    }
  });
  return flat;
}

// Carrega dias por range de datas [firstDate, lastDate], inclusive
async function mv2_loadDiasRange(firstDate, lastDate, categoria) {
  const cat = categoria || 'Profissional';
  const rows = await api.get('dia',
    'data=gte.' + firstDate + '&data=lte.' + lastDate +
    '&microciclo.mesociclo.categoria_id=eq.' + encodeURIComponent(cat) +
    '&select=*,jogo(*),microciclo!inner(mesociclo!inner(categoria_id))' +
    '&order=data.asc');
  const result = {};
  (rows || []).forEach(d => { result[d.data] = mv2_nestedToFlat(d); });
  return result;
}

// Upload de plano de treino no Supabase Storage
async function mv2_uploadPlano(dateStr, period, file) {
  const ext = (file.name.split('.').pop() || 'bin').toLowerCase();
  const periodoDb = period === 'am' ? 'manha' : period === 'pm' ? 'tarde' : 'noite';
  // Timestamp no path evita colisão quando há múltiplos arquivos por período
  const path = dateStr + '/' + periodoDb + '/' + Date.now() + '.' + ext;
  const res = await fetch(SUPA_URL + '/storage/v1/object/microciclo-planos/' + path, {
    method: 'POST',
    headers: {
      'apikey': SUPA_KEY,
      'Authorization': 'Bearer ' + SUPA_KEY,
      'Content-Type': file.type || 'application/octet-stream'
    },
    body: file
  });
  if (!res.ok) throw new Error('Upload falhou: ' + res.status + ' ' + await res.text());
  return {
    path,
    url: SUPA_URL + '/storage/v1/object/public/microciclo-planos/' + path,
    filename: file.name,
    size: file.size
  };
}

async function mv2_deletePlano(path) {
  const res = await fetch(SUPA_URL + '/storage/v1/object/microciclo-planos/' + path, {
    method: 'DELETE',
    headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY }
  });
  if (!res.ok && res.status !== 404) throw new Error('Delete falhou: ' + res.status);
}

// Persiste um dia inteiro (upsert em `dia`, upsert/delete em `jogo` conforme necessário)
async function mv2_saveDia(dateStr, flat, categoria) {
  const micro = await mv2_ensureMicrociclo(dateStr, categoria);
  const payload = {
    microciclo_id: micro.id,
    data: dateStr,
    periodo_manha: mv2_flatToPeriodo(flat, 'am'),
    periodo_tarde: mv2_flatToPeriodo(flat, 'pm'),
    periodo_noite: mv2_flatToPeriodo(flat, 'pn'),
    notas: flat.notes || null
  };
  const rDia = await api.upsert('dia', payload, 'microciclo_id,data');
  const diaId = (rDia && rDia[0] && rDia[0].id) || null;
  if (!diaId) throw new Error('Falha ao upsertar dia ' + dateStr);
  return diaId;
}

// ── Math ─────────────────────────────────────────────────────────────────────
function linReg(xs, ys) {
  const n = xs.length;
  if (n < 4 || new Set(xs).size < 3) return null;
  const mx = xs.reduce((a,b)=>a+b)/n, my = ys.reduce((a,b)=>a+b)/n;
  let num=0, den=0;
  xs.forEach((x,i)=>{ num+=(x-mx)*(ys[i]-my); den+=(x-mx)**2; });
  if (!den) return null;
  const slope=num/den, intercept=my-slope*mx;
  let sr=0, st=0;
  xs.forEach((x,i)=>{ sr+=(ys[i]-(intercept+slope*x))**2; st+=(ys[i]-my)**2; });
  return { slope, intercept, r2: st?+(1-sr/st).toFixed(3):0 };
}

function loadAtVel(reg, vel) {
  if (!reg || reg.slope >= 0) return null;
  const l = (vel - reg.intercept) / reg.slope;
  return (l>20 && l<400) ? l : null;
}

function roundToPlates(load, barW) {
  if (!load || load <= barW) return barW;
  const perSide = (load - barW) / 2;
  const rounded = Math.round(perSide / 5) * 5;
  return barW + rounded * 2;
}

// Equação generalizada %1RM a partir de MPV
// Back Squat: González-Badillo & Sánchez-Medina (2010), R²=0.94
// Trap Bar DL: adaptado de Lake et al. (2017), MVT ~0.50 m/s
// Hip Thrust: adaptado, MVT ~0.30 m/s (similar ao squat)
function pct1RM(mpv, exercise) {
  if (exercise === "Trap Bar Deadlift") return Math.max(30, Math.min(100, -8.0*mpv*mpv - 42.0*mpv + 112.0));
  // Back Squat e Hip Thrust: mesma curva
  return Math.max(30, Math.min(100, -5.961*mpv*mpv - 50.71*mpv + 117.0));
}

// Peso corporal estimado por posição (futebol masculino profissional brasileiro)
const POS_BW = {
  "Goleiro":85,"Zagueiro":82,"Lateral":73,"Volante":76,"Meia":73,"Atacante":76
};
function defaultBW(position) { return POS_BW[position] || 75; }

function prescribe(prof, vel, exercise, bars, bodyWeight, position) {
  const barW = exercise === "Trap Bar Deadlift" ? (bars.trapbar_kg||bars.trapbar||30) : (bars.olympic_kg||bars.olympic||20);
  const snap = l => roundToPlates(l, barW);

  // ════════════════════════════════════════════════════════════
  //  PASSO 1: ESTIMAR e1RM DO ATLETA
  // ════════════════════════════════════════════════════════════
  let e1rm = null;
  let method = "pc";

  if (prof) {
    const maxLoad = prof.maxLoad || prof.max_load;
    const maxMpv  = prof.maxMpv  || prof.max_mpv;

    // Método A: Regressão individual → e1RM na MVT (0.30 m/s)
    // Só usa se slope íngreme (|slope| > 0.004) e R² ≥ 0.35
    if (prof.reg && prof.reg.slope < -0.004 && prof.reg.r2 >= 0.35) {
      const mvt = 0.30; // Minimum Velocity Threshold
      const e1rmReg = loadAtVel(prof.reg, mvt);
      if (e1rmReg && e1rmReg > 20 && e1rmReg < 400) {
        // Sanity: e1RM da regressão não pode ser > 2× o maxLoad testado
        // Se for, a regressão está extrapolando demais
        if (!maxLoad || e1rmReg <= maxLoad * 1.5) {
          e1rm = e1rmReg;
          method = prof.reg.r2 >= 0.70 ? "reg" : "reg_low";
        }
      }
    }

    // Método B: Equação generalizada (maxLoad + maxMpv → e1RM)
    if (!e1rm && maxLoad) {
      if (maxMpv) {
        const pctAtMax = pct1RM(maxMpv, exercise) / 100;
        if (pctAtMax > 0.3 && pctAtMax <= 1.05) {
          const est = maxLoad / pctAtMax;
          if (est <= maxLoad * 1.5) {
            // Estimativa razoável: maxMpv indica carga próxima do máximo
            e1rm = est;
            method = "gen";
          } else {
            // Dados muito submáximos (ex: 150kg@1.23m/s → e1RM=312!)
            // Usa maxLoad como proxy conservador
            e1rm = maxLoad;
            method = "max";
          }
        }
      }
      // Se não tem maxMpv, usa maxLoad diretamente
      if (!e1rm) {
        e1rm = maxLoad;
        method = "max";
      }
    }
  }

  // Método C: Peso corporal × coeficiente por exercício
  if (!e1rm) {
    const bw = (bodyWeight && bodyWeight > 30) ? bodyWeight : defaultBW(position);
    if (!bw) return null;
    if (exercise === "Back Squat")          e1rm = bw * 1.6;
    else if (exercise === "Trap Bar Deadlift") e1rm = bw * 2.0;
    else                                     e1rm = bw * 2.0; // Hip Thrust
    method = "pc";
  }

  if (!e1rm || e1rm < barW) return null;

  // ════════════════════════════════════════════════════════════
  //  PASSO 2: CARGA = e1RM × %1RM(velocidade)
  // ════════════════════════════════════════════════════════════
  const pctTarget = pct1RM(vel, exercise) / 100;
  let load = e1rm * pctTarget;

  // ════════════════════════════════════════════════════════════
  //  PASSO 3: CAPS DE SEGURANÇA
  // ════════════════════════════════════════════════════════════
  load = Math.min(load, e1rm * 1.05); // Nunca > 105% e1RM
  load = Math.min(load, 300);          // Nunca > 300 kg
  if (load < barW) return null;

  // ════════════════════════════════════════════════════════════
  //  RESULTADO
  // ════════════════════════════════════════════════════════════
  return {
    load: snap(load),
    reliable: method === "reg",
    r2: (prof && prof.reg) ? prof.reg.r2 : null,
    method
  };
}

// ── CSV Parser ───────────────────────────────────────────────────────────────
const STOP = new Set(["do","da","de","dos","das","e"]);
const normStr = s => s ? s.normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^\w\s]/g,"").toLowerCase().trim() : "";
const tokens  = s => normStr(s).split(/\s+/).filter(t=>t&&!STOP.has(t));

function nameScore(a, b) {
  const na=normStr(a), nb=normStr(b);
  if (na===nb) return 100;
  const ta=tokens(a), tb=tokens(b);
  const setA=new Set(ta), setB=new Set(tb);
  if (ta.every(t=>setB.has(t)) && tb.every(t=>setA.has(t))) return 95;
  // Caso especial: 1 dos nomes tem só 1 token (típico de apelido/nome curto)
  if (ta.length === 1 && tb.length > 1 && setB.has(ta[0])) return 85;
  if (tb.length === 1 && ta.length > 1 && setA.has(tb[0])) return 85;
  // Caso "Gilberto M." vs "Gilberto Moraes Junior":
  // primeiro token bate + algum token do outro lado começa com a inicial
  const initialMatch = (short, long) => {
    if (short.length < 2 || long.length < 2) return false;
    if (short[0] !== long[0]) return false;
    // Segundo token do short é inicial (1 letra) que bate início de algum token do long
    const initial = short[1];
    if (initial.length !== 1) return false;
    return long.slice(1).some(t => t.startsWith(initial));
  };
  if (ta.length >= 2 && tb.length >= 2 &&
      (initialMatch(ta, tb) || initialMatch(tb, ta))) return 80;
  // Sobrenome (último token) deve obrigatoriamente bater para score alto
  const lastA=ta.at(-1), lastB=tb.at(-1);
  if (!lastA||!lastB||lastA!==lastB) return 0;
  const overlap=[...setA].filter(t=>setB.has(t)).length;
  const union=new Set([...setA,...setB]).size;
  const s=(overlap/union)*70 + 30;
  return Math.round(s);
}

function matchName(csv, regNames) {
  if (regNames.includes(csv)) return { name:csv, score:100 };
  let best=null, score=0;
  regNames.forEach(r=>{ const s=nameScore(csv,r); if(s>score){score=s;best=r;} });
  return score>=60 ? { name:best, score } : null;
}

function resolveProfile(athleteName, profiles) {
  if (!athleteName || !profiles) return null;
  if (profiles[athleteName]) return profiles[athleteName];
  const keys = Object.keys(profiles);
  const m = matchName(athleteName, keys);
  return m ? profiles[m.name] : null;
}

function buildProfile(pts, ex) {
  const xs=pts.map(p=>p.load), ys=pts.map(p=>p.mpv);
  const reg=linReg(xs,ys);
  const maxLoad=Math.max(...xs);
  const maxMpvArr=ys.filter((_,i)=>xs[i]===maxLoad);
  const maxMpv=+(maxMpvArr.reduce((a,b)=>a+b,0)/maxMpvArr.length).toFixed(3);
  const mvt=MVT_REF[ex]; let e1rm=null;
  if (reg&&reg.slope<0) { const l=(mvt-reg.intercept)/reg.slope; if(l>20&&l<400) e1rm=Math.round(l/5)*5; }
  return { reg, reliable:!!(reg&&reg.r2>=0.35), e1rm, maxLoad, maxMpv, nReps:pts.length, pts, updatedAt:new Date().toISOString() };
}

// Lê arquivo CSV detectando encoding (BOM UTF-8, UTF-8 puro, ou Windows-1252/Latin1)
async function readCSVFileWithEncoding(file) {
  const buf = await file.arrayBuffer();
  const bytes = new Uint8Array(buf);
  // BOM UTF-8: EF BB BF
  if (bytes[0] === 0xEF && bytes[1] === 0xBB && bytes[2] === 0xBF) {
    return new TextDecoder('utf-8').decode(bytes.slice(3));
  }
  // Tenta UTF-8 estrito; se falhar, cai pra Windows-1252 (Excel BR)
  try {
    return new TextDecoder('utf-8', { fatal: true }).decode(bytes);
  } catch(e) {
    return new TextDecoder('windows-1252').decode(bytes);
  }
}

// Parse da planilha CAP (DBgrupos): retorna { records, stats } sem inserir em banco
function parsePresencaCAP(text, athletesList) {
  // Constrói lista de aliases (name + nickname) → athlete_id
  const aliases = [];
  athletesList.forEach(a => {
    if (a.name) aliases.push({ id: a.id, alias: a.name });
    if (a.nickname && a.nickname !== a.name) aliases.push({ id: a.id, alias: a.nickname });
  });
  const aliasNames = aliases.map(x => x.alias);

  // Match determinístico do formato "X I." — aceita ambos:
  //  Padrão A: "Sobrenome I." (ex: "Peixoto R.")  → último token = sobrenome, primeiro começa com I
  //  Padrão B: "Nome I."      (ex: "Renan V.")    → primeiro token = nome, último começa com I
  const matchCatapultFormat = (csvName) => {
    if (!csvName) return null;
    const m = String(csvName).trim().match(/^(.+?)\s+([A-Za-zÀ-ú])\.?$/);
    if (!m) return null;
    const parte1 = normStr(m[1]);
    const inicial = normStr(m[2]);
    if (!parte1 || !inicial) return null;
    // Padrão A: último token = parte1, primeiro começa com inicial
    const matchA = athletesList.filter(a => {
      const t = tokens(a.name);
      return t.length >= 2 && t.at(-1) === parte1 && t[0].startsWith(inicial);
    });
    // Padrão B: primeiro token = parte1, último começa com inicial
    const matchB = athletesList.filter(a => {
      const t = tokens(a.name);
      return t.length >= 2 && t[0] === parte1 && t.at(-1).startsWith(inicial);
    });
    // Junta matches únicos (por id)
    const idsA = new Set(matchA.map(a => a.id));
    const idsB = new Set(matchB.map(a => a.id));
    const idsUnion = new Set([...idsA, ...idsB]);
    if (idsUnion.size === 1) {
      const id = [...idsUnion][0];
      return athletesList.find(a => a.id === id) || null;
    }
    // Se A tem exatamente 1 e B tem 0 (ou vice versa), usa o único
    if (matchA.length === 1 && matchB.length === 0) return matchA[0];
    if (matchB.length === 1 && matchA.length === 0) return matchB[0];
    // Ambíguo: dois atletas diferentes matchando por caminhos diferentes → null
    return null;
  };

  // Match padrão via matchName (aliases = name + nickname)
  const findAthlete = (csvName) => {
    if (!csvName) return null;
    const m = matchName(csvName, aliasNames);
    if (!m) return null;
    const hit = aliases.find(x => x.alias === m.name);
    return hit ? athletesList.find(a => a.id === hit.id) : null;
  };

  const { data } = window.Papa.parse(text, { header: true, skipEmptyLines: true });

  const records = [];
  let ignoradas = 0, semAtleta = 0, comAtleta = 0, dataInvalida = 0;
  let brDetectado = 0, usDetectado = 0;
  const naoEncontrados = new Set();
  const datasAfetadas = new Set();

  const parseDataFlex = (s) => {
    if (!s) return null;
    const m = String(s).trim().match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
    if (!m) return null;
    let [, aStr, bStr, yStr] = m;
    const A = +aStr, B = +bStr;
    let y = yStr;
    if (y.length === 2) y = (Number(y) >= 70 ? '19' : '20') + y;
    let day, month;
    if (A > 12 && B <= 12) { day = A; month = B; brDetectado++; }
    else if (B > 12 && A <= 12) { day = B; month = A; usDetectado++; }
    else if (A <= 12 && B <= 12) {
      if (yStr.length === 4) { day = B; month = A; usDetectado++; }
      else { day = A; month = B; brDetectado++; }
    } else return null;
    if (day < 1 || day > 31 || month < 1 || month > 12) return null;
    return y + '-' + String(month).padStart(2,'0') + '-' + String(day).padStart(2,'0');
  };

  (data || []).forEach(row => {
    const nome = String(row['Nome'] || row['Atleta'] || '').trim();
    const nomeCatapult = String(row['Nome catapult'] || row['nome catapult'] || row['Nome Catapult'] || '').trim();
    const dataStr = row['Data'] || row['DATA'] || row['data'];
    const grupo = String(row['Grupo'] || row['GRUPO'] || '').trim();
    const tipoDia = String(row['Dia'] || row['DIA'] || row['Tipo'] || '').trim();
    const quadro = String(row['Quadro'] || row['QUADRO'] || '').trim();
    const lesao = String(row['Lesão'] || row['Lesao'] || row['lesao'] || '').trim();

    if (!nome || !dataStr) { ignoradas++; return; }

    const dataISO = parseDataFlex(dataStr);
    if (!dataISO) { dataInvalida++; return; }

    // Estratégia de match (ordem):
    // 1. Nome catapult com padrão determinístico (A ou B)
    // 2. Nome (apelido curto) via matchName com detecção de empate
    // 3. Nome catapult via matchName (fallback)
    let athlete = null;
    if (nomeCatapult) athlete = matchCatapultFormat(nomeCatapult);
    if (!athlete) athlete = findAthlete(nome);
    if (!athlete && nomeCatapult) athlete = findAthlete(nomeCatapult);
    if (!athlete) {
      semAtleta++;
      naoEncontrados.add(nomeCatapult ? (nome + ' (' + nomeCatapult + ')') : nome);
      return;
    }

    const tipoLower = tipoDia.toLowerCase();
    const isAusente = tipoLower.includes('folga') || tipoLower.includes('ausen');

    let motivo = null;
    if (isAusente) motivo = 'folga';
    else if (lesao) motivo = lesao;
    else if (quadro && (grupo === 'DM' || grupo === 'RTP')) motivo = quadro;

    records.push({
      atleta_id: athlete.id,
      data: dataISO,
      periodo: 'dia',
      grupo: grupo || null,
      tipo_dia: tipoDia || null,
      status: isAusente ? 'ausente' : 'presente',
      motivo,
      contexto: 'geral',
      source: 'planilha_cap',
      observacao: quadro && grupo !== 'DM' && grupo !== 'RTP' ? quadro : null
    });
    comAtleta++;
    datasAfetadas.add(dataISO);
  });

  const formatoLabel = usDetectado > 0 && brDetectado > 0
    ? 'misto (' + brDetectado + ' BR + ' + usDetectado + ' US)'
    : usDetectado > 0 ? 'MM/DD/AAAA (americano)' : 'DD/MM/AAAA (brasileiro)';

  return {
    records,
    stats: {
      total: (data || []).length,
      comAtleta, semAtleta, ignoradas, dataInvalida,
      naoEncontrados: [...naoEncontrados],
      datasAfetadas: [...datasAfetadas].sort(),
      formatoDetectado: formatoLabel
    }
  };
}

function parseCSV(text, regNames) {
  const { data } = window.Papa.parse(text, { header:true, skipEmptyLines:true, dynamicTyping:true });
  const raw = {};
  // Sessions: { name: { ex: { date: [{load, mpv, power}, ...] } } }
  const sessions = {};

  // Helper: extrai YYYY-MM-DD de qualquer formato razoável
  const parseDate = (val) => {
    if (!val) return null;
    if (val instanceof Date && !isNaN(val)) return val.toISOString().slice(0,10);
    const s = String(val).trim();
    if (!s) return null;
    // ISO: YYYY-MM-DD ou YYYY-MM-DDTHH:MM:SS
    const isoMatch = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
    if (isoMatch) return isoMatch[0];
    // YYYY/MM/DD (formato Output Sports: "2026/07/15 12:34:21")
    const ymdMatch = s.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
    if (ymdMatch) {
      return ymdMatch[1] + '-' + ymdMatch[2].padStart(2,'0') + '-' + ymdMatch[3].padStart(2,'0');
    }
    // DD/MM/YYYY ou DD-MM-YYYY (com hora opcional)
    const brMatch = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})/);
    if (brMatch) {
      return brMatch[3] + '-' + brMatch[2].padStart(2,'0') + '-' + brMatch[1].padStart(2,'0');
    }
    // MM/DD/YYYY (formato US, deixo como fallback)
    const parsed = new Date(s);
    if (!isNaN(parsed)) return parsed.toISOString().slice(0,10);
    return null;
  };

  data.forEach(r => {
    const ex=r["Exercise Name"], name=r["Full Name"]||r["Athlete"]||r["Name"];
    const load=parseFloat(r["Weight (kg)"]||r["Load (kg)"]);
    const mpv=parseFloat(r["Mean Propulsive Velocity (m/s)"]||r["MPV"]);
    if (!EXERCISES.includes(ex)||!name||isNaN(load)||isNaN(mpv)) return;
    if (mpv<0.15||mpv>3.5||load<20) return;
    // Métricas extras do CSV Output (todas opcionais)
    const meanPower = parseFloat(r["Mean Power (W)"] || r["Mean Power"] || r["MP"]);
    const peakPower = parseFloat(r["Peak Power (W)"] || r["Peak Power"] || r["PP"]);
    const peakPowerRel = parseFloat(r["Relative Peak Power (W/kg)"] || r["Peak Power Rel"]);
    const meanPowerRel = parseFloat(r["Relative Mean Power (W/kg)"] || r["Mean Power Rel"]);
    const peakVelocity = parseFloat(r["Peak Velocity (m/s)"] || r["Peak Velocity"] || r["PV"]);
    const meanForce = parseFloat(r["Mean Force (N)"] || r["Mean Force"]);
    const peakForce = parseFloat(r["Peak Force (N)"] || r["Peak Force"]);
    // Peso corporal do dia (se CSV traz — Output Sports não traz por rep, mas pode vir)
    const bwSession = parseFloat(r["Body Weight (kg)"] || r["Body Weight"] || r["BW"]);
    // Data da sessão
    const date = parseDate(
      r["Date"] || r["Session Date"] || r["Timestamp"] || r["Data"] || r["Session Datetime"] || r["Completed Date"]
    );

    if (!raw[name]) raw[name]={};
    if (!raw[name][ex]) raw[name][ex]=[];
    raw[name][ex].push({load,mpv});

    // Snapshot só é criado se tiver data
    if (date) {
      if (!sessions[name]) sessions[name]={};
      if (!sessions[name][ex]) sessions[name][ex]={};
      if (!sessions[name][ex][date]) sessions[name][ex][date]=[];
      sessions[name][ex][date].push({
        load, mpv,
        meanPower: isNaN(meanPower) ? null : meanPower,
        peakPower: isNaN(peakPower) ? null : peakPower,
        peakPowerRel: isNaN(peakPowerRel) ? null : peakPowerRel,
        meanPowerRel: isNaN(meanPowerRel) ? null : meanPowerRel,
        peakVelocity: isNaN(peakVelocity) ? null : peakVelocity,
        meanForce: isNaN(meanForce) ? null : meanForce,
        peakForce: isNaN(peakForce) ? null : peakForce,
        bwSession: isNaN(bwSession) ? null : bwSession
      });
    }
  });

  const profiles={}, log=[];
  Object.entries(raw).forEach(([csv,exMap])=>{
    const m = matchName(csv, regNames);
    const target = m ? m.name : csv;
    const type = !m?"novo":m.score===100?"exato":m.score>=80?"normalizado":"proximidade";
    log.push({csvName:csv, registeredName:target, score:m?m.score:null, type});
    if (!profiles[target]) profiles[target]={};
    Object.entries(exMap).forEach(([ex,pts])=>{
      profiles[target][ex] = buildProfile(pts, ex);
    });
  });

  // Constrói array de snapshots achatado com nome de atleta já resolvido (via mesmo matchName)
  const snapshots = [];
  Object.entries(sessions).forEach(([csv, exMap]) => {
    const m = matchName(csv, regNames);
    const target = m ? m.name : csv;
    Object.entries(exMap).forEach(([ex, dateMap]) => {
      Object.entries(dateMap).forEach(([date, reps]) => {
        const loads = reps.map(r=>r.load);
        const mpvs  = reps.map(r=>r.mpv);
        const nonNull = (arr) => arr.filter(v => v != null && !isNaN(v));
        const meanPowers = nonNull(reps.map(r=>r.meanPower));
        const peakPowers = nonNull(reps.map(r=>r.peakPower));
        const peakPowerRels = nonNull(reps.map(r=>r.peakPowerRel));
        const meanPowerRels = nonNull(reps.map(r=>r.meanPowerRel));
        const peakVelocities = nonNull(reps.map(r=>r.peakVelocity));
        const bwSessions = nonNull(reps.map(r=>r.bwSession));
        const sessionProfile = buildProfile(reps.map(r=>({load:r.load, mpv:r.mpv})), ex);
        // Melhor rep = maior mpv (velocidade concentrica maior = intenção máxima)
        const maxMpv = Math.max(...mpvs);
        // Menor mpv (na maior carga) — usado pra velocity loss
        const minMpv = Math.min(...mpvs);
        snapshots.push({
          athleteName: target,
          exercise: ex,
          session_date: date,
          e1rm: sessionProfile && sessionProfile.e1rm ? Math.round(sessionProfile.e1rm) : null,
          mean_velocity: mpvs.length ? +(mpvs.reduce((s,v)=>s+v,0)/mpvs.length).toFixed(3) : null,
          mean_power: meanPowers.length ? Math.round(meanPowers.reduce((s,v)=>s+v,0)/meanPowers.length) : null,
          max_load: Math.max(...loads),
          reps_count: reps.length,
          // Novos campos (pico da sessão)
          peak_power: peakPowers.length ? Math.round(Math.max(...peakPowers)) : null,
          peak_power_rel: peakPowerRels.length ? +Math.max(...peakPowerRels).toFixed(2) : null,
          mean_power_rel: meanPowerRels.length ? +(meanPowerRels.reduce((s,v)=>s+v,0)/meanPowerRels.length).toFixed(2) : null,
          peak_velocity: peakVelocities.length ? +Math.max(...peakVelocities).toFixed(3) : +maxMpv.toFixed(3),
          max_mpv: +maxMpv.toFixed(3),
          min_velocity: +minMpv.toFixed(3),
          body_weight_session: bwSessions.length ? +(bwSessions.reduce((s,v)=>s+v,0)/bwSessions.length).toFixed(1) : null,
          max_load_session: Math.max(...loads)
        });
      });
    });
  });

  return { profiles, log, snapshots };
}

function SelectAthletesModal({allActive,selected,setSelected,catFilter,onClose}) {
  const el=React.createElement;
  // Local state: copy of selection or all if null
  const [local,setLocal]=useState(()=>selected!==null?new Set(selected):new Set(allActive.map(a=>a.id)));
  const [search,setSearch]=useState("");

  // Base list filtered by category
  const catFiltered=useMemo(()=>{
    if(!catFilter||catFilter==="Todas") return allActive;
    return allActive.filter(a=>(a.categories||[]).includes(catFilter));
  },[allActive,catFilter]);

  const filtered=useMemo(()=>{
    if(!search) return catFiltered;
    const s=search.toLowerCase();
    return catFiltered.filter(a=>(a.nickname||a.name).toLowerCase().includes(s));
  },[catFiltered,search]);

  const allChecked=catFiltered.every(a=>local.has(a.id));

  const toggle=(id)=>setLocal(prev=>{
    const next=new Set(prev);
    next.has(id)?next.delete(id):next.add(id);
    return next;
  });

  const toggleAll=()=>{
    if(allChecked){
      // Deselect only those in current category
      setLocal(prev=>{
        const next=new Set(prev);
        catFiltered.forEach(a=>next.delete(a.id));

        const next=new Set(prev);
        catFiltered.forEach(a=>next.add(a.id));
        return next;

  const apply=()=>{
    const isAll=allActive.every(a=>local.has(a.id));

function getMonthDates(year, month) {
  const first = new Date(year, month, 1);
  const last = new Date(year, month + 1, 0);
  const startDay = first.getDay() === 0 ? 6 : first.getDay() - 1;
  // Calcula quantas linhas o mês realmente precisa (5 ou 6)
  const totalNeeded = startDay + last.getDate();
  const rowsNeeded = Math.ceil(totalNeeded / 7);
  const totalCells = rowsNeeded * 7;
  const dates = [];
  for (let i = startDay - 1; i >= 0; i--) {
    const d = new Date(year, month, -i);
    dates.push({ date: localDateStr(d), day: d.getDate(), cur: false });
  }
  for (let i = 1; i <= last.getDate(); i++) {
    const d = new Date(year, month, i);
    dates.push({ date: localDateStr(d), day: i, cur: true });
  }
  while (dates.length < totalCells) {
    const d = new Date(year, month + 1, dates.length - last.getDate() - startDay + 1);
    dates.push({ date: localDateStr(d), day: d.getDate(), cur: false });
  }
  return dates;
}

// Deriva am_type / pm_type / pn_type de um registro (com fallback para day_type legado)
function derivePeriodTypes(dd) {
  if (!dd) return { am_type:null, pm_type:null, pn_type:null };
  const pn_type = dd.pn_type || null;
  if (dd.am_type || dd.pm_type) return { am_type: dd.am_type||null, pm_type: dd.pm_type||null, pn_type };
  if (dd.day_type === "folga")  return { am_type:"folga",  pm_type:"folga",  pn_type };
  if (dd.day_type === "viagem") return { am_type:"viagem", pm_type:"viagem", pn_type };
  if (dd.day_type === "jogo")   return { am_type:null,     pm_type:"jogo",   pn_type };
  if (dd.day_type === "treino") {
    return {
      am_type: (dd.am_activities || dd.am_methodology) ? "treino" : null,
      pm_type: (dd.pm_activities || dd.pm_methodology) ? "treino" : "treino",
      pn_type
    };
  }
  return { am_type:null, pm_type:null, pn_type };
}

// Retorna grupos de um período com fallback pro campo legado `groups`
function getPeriodGroups(dd, period) {
  const key = period + "_groups"; // am_groups, pm_groups, pn_groups
  if (dd[key] !== undefined && dd[key] !== null) return dd[key] || "";
  return dd.groups || "";
}

// Retorna zone_id do período com fallback pro campo legado `zone_id`
function getPeriodZoneId(dd, period) {
  const key = period + "_zone_id";
  if (dd[key] !== undefined && dd[key] !== null) return dd[key];
  if (dd.am_zone_id === undefined && dd.pm_zone_id === undefined && dd.pn_zone_id === undefined) return dd.zone_id || null;
  return null;
}
function getPeriodSeries(dd, period) {
  const key = period + "_series";
  if (dd[key] !== undefined && dd[key] !== null) return dd[key];
  if (dd.am_series === undefined && dd.pm_series === undefined && dd.pn_series === undefined) return dd.series || null;
  return null;
}
function getPeriodReps(dd, period) {
  const key = period + "_reps";
  if (dd[key] !== undefined && dd[key] !== null) return dd[key];
  if (dd.am_reps === undefined && dd.pm_reps === undefined && dd.pn_reps === undefined) return dd.reps || null;
  return null;
}

function MicrocycleView({microDays, saveMicroDay, loadMonth, selectedCategoria, setSelectedCategoria}) {
  const el = React.createElement;

  const [year, setYear] = useState(today.getFullYear());
  const [month, setMonth] = useState(today.getMonth());
  const [sel, setSel] = useState(null);
  const [exporting, setExporting] = useState(false);
  const [metodologias, setMetodologias] = useState([]);
  const [showAnexos, setShowAnexos] = useState(false);
  const todayStr = localDateStr(today);

  // Carrega memória de metodologias uma vez ao montar
  React.useEffect(() => {
    mv2_listMetodologias().then(setMetodologias).catch(()=>{});
  }, []);

  // Handler para gravar nova metodologia quando o usuário sai do campo
  const handleMethBlur = async (value) => {
    const t = (value || '').trim();
    if (!t) return;
    if (metodologias.includes(t)) return;
    try {
      await mv2_addMetodologia(t);
      setMetodologias(prev => [t, ...prev.filter(x => x !== t)]);
    } catch(e) { console.error('Erro ao gravar metodologia:', e); }
  };

  // Carrega dias do mês atual ao montar, ao trocar year/month, e ao trocar categoria
  React.useEffect(() => {
    if (loadMonth) loadMonth(year, month, selectedCategoria);
  }, [year, month, loadMonth, selectedCategoria]);

  const dates = useMemo(() => getMonthDates(year, month), [year, month]);
  const monthLabel = new Date(year, month).toLocaleDateString("pt-BR", {month:"long", year:"numeric"});

  const prevMonth = () => { if (month===0){setYear(y=>y-1);setMonth(11);}else setMonth(m=>m-1); };
  const nextMonth = () => { if (month===11){setYear(y=>y+1);setMonth(0);}else setMonth(m=>m+1); };
  const goToday = () => { setYear(today.getFullYear()); setMonth(today.getMonth()); };

  const stats = useMemo(() => {
    let campo=0, aca=0, corr=0, fisio=0, jogos=0, treinos=0;
    dates.filter(d=>d.cur).forEach(d=>{
      const dy=microDays[d.date];
      if(!dy) return;
      let hasTreinoDia = false, hasJogoDia = false;
      ["am","pm","pn"].forEach(p => {
        const blocks = Array.isArray(dy[p + "_blocks"]) ? dy[p + "_blocks"] : [];
        blocks.forEach(b => {
          if (b.tipo === "treino") {
            hasTreinoDia = true;
            const acts = b.atividades || "";
            if (acts.includes("Campo"))      campo++;
            if (acts.includes("Academia"))   aca++;
            if (acts.includes("Corretivos")) corr++;
            if (acts.includes("Fisio"))      fisio++;
          }
          if (b.tipo === "jogo") hasJogoDia = true;
        });
      });
      if (hasTreinoDia) treinos++;
      if (hasJogoDia) jogos++;
    });
    return {treinos, jogos, campo, aca, corr, fisio};
  }, [dates, microDays]);

  // Lista todos os anexos do mês visualizado (múltiplos por período possíveis)
  const anexosDoMes = useMemo(() => {
    const list = [];
    dates.filter(d => d.cur).forEach(d => {
      const dy = microDays[d.date];
      if (!dy) return;
      ["am","pm","pn"].forEach(p => {
        const planos = Array.isArray(dy[p + "_planos"]) ? dy[p + "_planos"] : [];
        planos.forEach(pl => {
          if (!pl.url) return;
          list.push({
            date: d.date, day: d.day, periodo: p,
            filename: pl.filename || "arquivo",
            size: pl.size || 0,
            url: pl.url,
            path: pl.path || null
          });
        });
      });
    });
    return list;
  }, [dates, microDays]);

  const setDT = (ds,period,type) => {
    const cur = microDays[ds]||{};

    saveMicroDay(ds,{...cur, [key]: cur[key]===type ? null : type});
  };
  const setDZ = (ds, period, zid) => {
    const cur = microDays[ds]||{};
    const key = period + "_zone_id";
    const lkey = period + "_zone_label";
    if (cur[key] === zid) {
      saveMicroDay(ds,{...cur, [key]:null, [lkey]:""});
    } else {
      const z=ZONES.find(z=>z.id===zid);
      saveMicroDay(ds,{...cur, [key]:zid, [lkey]:z?z.label:""});

  const setDV = (ds,k,v) => saveMicroDay(ds,{...(microDays[ds]||{}),[k]:v});
  const setDN = (ds,n) => saveMicroDay(ds,{...(microDays[ds]||{}),notes:n});

      ...planos.map((p, idx) => el("div",{key:p.path||idx,style:{
        display:"flex",alignItems:"center",gap:6,padding:"6px 8px",

        el("button",{onClick:async ()=>{
          if (!confirm("Remover " + (p.filename||"este arquivo") + "?")) return;
          try {
            if (p.path) await mv2_deletePlano(p.path);
            const cur = microDays[sel] || {};
            const curPlanos = Array.isArray(cur[period + '_planos']) ? cur[period + '_planos'] : [];
            const newPlanos = curPlanos.filter(x => x.path !== p.path);
            saveMicroDay(sel, {...cur,
              [period + '_planos']: newPlanos.length > 0 ? newPlanos : null
            });
          } catch(e) { alert("Erro ao remover: " + e.message); }

          // Clona o grid num container off-screen com largura fixa (1800px).
          // Assim o PNG independe do estado da tela (painel aberto, largura do browser).
          const clone = original.cloneNode(true);
          const cloneTitle = clone.querySelector("[data-micro-export-title]");

          document.body.appendChild(wrapper);
          await new Promise(r => setTimeout(r, 100));
          try {
            const w = clone.scrollWidth;

function GroupCard({grp,gi,athletes,zone,ser,rep}) {

        (()=>{const loads=athletes.filter(a=>a.rx).map(a=>a.rx.load).sort((a,b)=>a-b); return loads[0]+(loads.length>1?"–"+loads[loads.length-1]:"")+" kg";})()
      )
    ),
    el("div",{style:{display:"grid",gridTemplateColumns:cols,padding:"4px 14px",fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",color:T.muted,borderBottom:"1px solid "+T.border}},
